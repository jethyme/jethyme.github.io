<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐡 Memory: Кузовки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #051024;
            overflow-x: hidden;
            position: relative;
            padding: 16px;
        }

        .ocean-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(10, 60, 120, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 30%, rgba(5, 40, 100, 0.8) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 20, 60, 0.9) 0%, transparent 50%),
                linear-gradient(180deg, #051024 0%, #0a1a3a 40%, #0d2247 70%, #0a1a3a 100%);
        }

        .light-rays {
            position: fixed;
            top: -20%;
            left: 0;
            width: 100%;
            height: 120%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .ray {
            position: absolute;
            top: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg,
                rgba(100, 200, 255, 0.15) 0%,
                rgba(100, 200, 255, 0.05) 50%,
                transparent 100%);
            transform-origin: top center;
            animation: raySway 8s ease-in-out infinite;
        }

        .ray:nth-child(1) { left: 10%; animation-delay: 0s; width: 3px; }
        .ray:nth-child(2) { left: 25%; animation-delay: 1s; width: 5px; }
        .ray:nth-child(3) { left: 40%; animation-delay: 2s; width: 2px; }
        .ray:nth-child(4) { left: 55%; animation-delay: 0.5s; width: 4px; }
        .ray:nth-child(5) { left: 70%; animation-delay: 1.5s; width: 3px; }
        .ray:nth-child(6) { left: 85%; animation-delay: 2.5s; width: 4px; }

        @keyframes raySway {
            0%, 100% { transform: rotate(-3deg); opacity: 0.6; }
            50% { transform: rotate(3deg); opacity: 1; }
        }

        .bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -60px;
            width: var(--size);
            height: var(--size);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3), rgba(100, 200, 255, 0.1));
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: bubbleRise var(--duration) linear infinite;
            animation-delay: var(--delay);
            left: var(--left);
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 30%;
            height: 20%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        @keyframes bubbleRise {
            0% {
                transform: translateY(0) scale(1) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-110vh) scale(0.6) translateX(30px);
                opacity: 0;
            }
        }

        .header {
            text-align: center;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #64d8ff, #a78bfa, #64d8ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 4s ease infinite;
            letter-spacing: 2px;
        }

        @keyframes titleShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .settings {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            z-index: 1;
            position: relative;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 10px 18px;
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .size-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 4px;
        }

        .size-btn {
            width: 28px;
            height: 28px;
            border: 1px solid rgba(100, 216, 255, 0.25);
            border-radius: 8px;
            background: rgba(100, 216, 255, 0.08);
            color: #64d8ff;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
            font-weight: 600;
            line-height: 1;
        }

        .size-btn:hover {
            background: rgba(100, 216, 255, 0.2);
            border-color: rgba(100, 216, 255, 0.5);
        }

        .size-btn:active {
            transform: scale(0.9);
        }

        .size-value {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        .size-sep {
            color: rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
            margin: 0 2px;
        }

        .mode-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mode-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .toggle-switch {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .toggle-switch input {
            display: none;
        }

        .toggle-track {
            width: 44px;
            height: 24px;
            background: rgba(100, 216, 255, 0.15);
            border-radius: 12px;
            position: relative;
            transition: background 0.3s;
            border: 1px solid rgba(100, 216, 255, 0.2);
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: #64d8ff;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(100, 216, 255, 0.3);
        }

        .toggle-switch input:checked + .toggle-track {
            background: rgba(251, 71, 71, 0.2);
            border-color: rgba(251, 71, 71, 0.3);
        }

        .toggle-switch input:checked + .toggle-track::after {
            transform: translateX(20px);
            background: #fb4747;
            box-shadow: 0 0 8px rgba(251, 71, 71, 0.4);
        }

        .toggle-text {
            font-size: 0.85rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.3s;
            white-space: nowrap;
        }

        .toggle-text.active {
            color: #64d8ff;
        }

        .toggle-switch input:checked ~ .toggle-text.hard {
            color: #fb4747;
        }

        .toggle-switch input:checked ~ .toggle-text.easy {
            color: rgba(255, 255, 255, 0.4);
        }

        .toggle-switch .toggle-text.hard {
            order: 3;
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 14px;
            z-index: 1;
            position: relative;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #64d8ff;
            text-shadow: 0 0 20px rgba(100, 216, 255, 0.3);
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 2px;
        }

        .grid {
            display: grid;
            gap: var(--gap, 10px);
            perspective: 1000px;
            z-index: 1;
            position: relative;
            width: 100%;
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.matched {
            transform: rotateY(180deg);
        }

        .card.matched .card-front {
            box-shadow:
                0 0 20px rgba(100, 216, 255, 0.4),
                0 0 40px rgba(100, 216, 255, 0.2),
                inset 0 0 20px rgba(100, 216, 255, 0.1);
            border-color: rgba(100, 216, 255, 0.6);
        }

        .card.flipping-back {
            animation: flipBackShake 0.4s ease;
        }

        @keyframes flipBackShake {
            0%, 100% { transform: rotateY(180deg); }
            30% { transform: rotateY(180deg) scale(1.06); }
            60% { transform: rotateY(180deg) scale(0.95); }
        }

        .card-face {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 12px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .card-back {
            background: linear-gradient(145deg, #0f2b5e, #1a3f7a);
            border: 2px solid rgba(100, 216, 255, 0.2);
            box-shadow:
                0 4px 15px rgba(0, 0, 0, 0.3),
                inset 0 0 30px rgba(0, 0, 0, 0.2);
            z-index: 2;
        }

        .card-back::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(100, 216, 255, 0.05),
                transparent,
                rgba(167, 139, 250, 0.05),
                transparent
            );
            animation: cardShimmer 6s linear infinite;
        }

        @keyframes cardShimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .card-back-pattern {
            position: relative;
            z-index: 1;
            width: 55%;
            height: 55%;
            border: 2px solid rgba(100, 216, 255, 0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            opacity: 0.35;
        }

        .card-front {
            background: linear-gradient(145deg, #0a1e45, #112d5e);
            border: 2px solid rgba(100, 216, 255, 0.15);
            transform: rotateY(180deg);
            box-shadow:
                0 4px 15px rgba(0, 0, 0, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .card-front svg {
            width: 70%;
            height: 70%;
            filter: drop-shadow(0 0 6px rgba(100, 216, 255, 0.15));
        }

        .card.flipped .card-front svg,
        .card.matched .card-front svg {
            animation: fishFloat 3s ease-in-out infinite;
        }

        @keyframes fishFloat {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-4px) rotate(2deg); }
        }

        .card:not(.flipped):not(.matched):hover {
            transform: scale(1.05);
        }

        .card:not(.flipped):not(.matched):hover .card-back {
            border-color: rgba(100, 216, 255, 0.4);
            box-shadow:
                0 4px 20px rgba(100, 216, 255, 0.2),
                inset 0 0 30px rgba(0, 0, 0, 0.2);
        }

        .logo-card {
            aspect-ratio: 1;
            border-radius: 12px;
            background: linear-gradient(145deg, rgba(251, 191, 36, 0.08), rgba(167, 139, 250, 0.08));
            border: 2px solid rgba(251, 191, 36, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            box-shadow:
                0 0 20px rgba(251, 191, 36, 0.1),
                inset 0 0 20px rgba(0, 0, 0, 0.2);
            animation: logoPulse 3s ease-in-out infinite;
            pointer-events: none;
            user-select: none;
        }

        @keyframes logoPulse {
            0%, 100% { border-color: rgba(251, 191, 36, 0.2); box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
            50% { border-color: rgba(251, 191, 36, 0.4); box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
        }

        .victory {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(5, 16, 36, 0.85);
            backdrop-filter: blur(10px);
            animation: victoryFadeIn 0.8s ease;
        }

        .victory.show {
            display: flex;
        }

        @keyframes victoryFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .victory-content {
            text-align: center;
            animation: victoryBounce 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes victoryBounce {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .victory-fish {
            font-size: 5rem;
            display: block;
            margin-bottom: 10px;
            animation: victorySpin 3s ease-in-out infinite;
        }

        @keyframes victorySpin {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            75% { transform: translateY(-15px) rotate(-5deg); }
        }

        .victory-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #64d8ff, #fbbf24, #a78bfa, #64d8ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleShimmer 3s ease infinite;
        }

        .victory-stats {
            color: rgba(255, 255, 255, 0.7);
            margin: 15px 0 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .btn-restart {
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #64d8ff, #a78bfa);
            color: #051024;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-restart:hover {
            transform: scale(1.08);
            box-shadow: 0 0 30px rgba(100, 216, 255, 0.4);
        }

        .confetti-bubble {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 99;
            animation: confettiFloat var(--dur) ease-out forwards;
        }

        @keyframes confettiFloat {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(var(--fall)) scale(1) rotate(720deg);
                opacity: 0;
            }
        }

        .reset-flash {
            animation: resetFlash 0.6s ease;
        }

        @keyframes resetFlash {
            0% { transform: rotateY(180deg) scale(1); }
            30% { transform: rotateY(180deg) scale(0.9); opacity: 0.5; }
            100% { transform: rotateY(0) scale(1); opacity: 0; }
        }

        @media (max-width: 500px) {
            .title { font-size: 1.6rem; }
            .settings { padding: 8px 12px; gap: 12px; }
            .stat-value { font-size: 1.4rem; }
            .victory-title { font-size: 2rem; }
            .logo-card { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="ocean-bg"></div>

    <div class="light-rays">
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
        <div class="ray"></div>
    </div>

    <div class="bubbles" id="bubbles"></div>

    <header class="header">
        <h1 class="title">🐡 Memory: Кузовки</h1>
        <p class="subtitle" id="subtitle">Найди всех рыбок</p>
    </header>

    <div class="settings">
        <div class="size-control">
            <span class="size-label">Размер</span>
            <button class="size-btn" onclick="changeSize('cols', -1)">−</button>
            <span class="size-value" id="colsDisplay">4</span>
            <span class="size-sep">×</span>
            <span class="size-value" id="rowsDisplay">4</span>
            <button class="size-btn" onclick="changeSize('cols', 1)">+</button>
        </div>
        <div class="mode-control">
            <span class="mode-label">Режим</span>
            <label class="toggle-switch">
                <span class="toggle-text easy active" id="easyLabel">Простой</span>
                <input type="checkbox" id="modeToggle" onchange="toggleMode()">
                <span class="toggle-track"></span>
                <span class="toggle-text hard" id="hardLabel">Сложный</span>
            </label>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="moves">0</div>
            <div class="stat-label">Ходы</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="pairs">0</div>
            <div class="stat-label">Пары</div>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="victory" id="victory">
        <div class="victory-content">
            <span class="victory-fish">🐡</span>
            <h2 class="victory-title">Победа!</h2>
            <p class="victory-stats" id="victoryStats"></p>
            <button class="btn-restart" onclick="restart()">Сыграть ещё</button>
        </div>
    </div>

    <script>
        // ===== FISH GENERATOR =====
        function generateFish(index) {
            const hue = (index * 137.508) % 360;
            const body = `hsl(${hue}, 72%, 55%)`;
            const spots = `hsl(${hue}, 60%, 38%)`;
            const fin = `hsl(${hue}, 85%, 70%)`;
            const accent = `hsl(${hue}, 65%, 30%)`;
            return { id: index, body, spots, fin, eye: '#1e293b', accent };
        }

        function fishSVG(f) {
            return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="bg${f.id}" cx="40%" cy="35%" r="60%">
                        <stop offset="0%" stop-color="#fff" stop-opacity="0.25"/>
                        <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
                    </radialGradient>
                    <radialGradient id="bod${f.id}" cx="35%" cy="30%" r="70%">
                        <stop offset="0%" stop-color="${f.body}" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="${f.body}" stop-opacity="1"/>
                    </radialGradient>
                </defs>
                <rect x="22" y="30" width="56" height="40" rx="10" fill="url(#bod${f.id})" stroke="${f.spots}" stroke-width="1.5"/>
                <rect x="22" y="30" width="56" height="40" rx="10" fill="url(#bg${f.id})"/>
                <ellipse cx="65" cy="50" rx="18" ry="12" fill="${f.body}" stroke="${f.spots}" stroke-width="1.5"/>
                <ellipse cx="65" cy="50" rx="18" ry="12" fill="url(#bg${f.id})"/>
                <circle cx="38" cy="44" r="4" fill="${f.eye}"/>
                <circle cx="36" cy="42" r="1.5" fill="#fff"/>
                <circle cx="46" cy="44" r="2.5" fill="${f.spots}"/>
                <circle cx="44" cy="54" r="2" fill="${f.spots}"/>
                <circle cx="52" cy="48" r="2.5" fill="${f.spots}"/>
                <circle cx="40" cy="62" r="1.8" fill="${f.spots}"/>
                <circle cx="50" cy="60" r="2" fill="${f.spots}"/>
                <rect x="15" y="38" width="10" height="24" rx="5" fill="${f.fin}" stroke="${f.spots}" stroke-width="1" opacity="0.8"/>
                <polygon points="76,40 92,35 92,65 76,60" fill="${f.fin}" stroke="${f.spots}" stroke-width="1" opacity="0.9"/>
                <polygon points="38,30 44,20 52,30" fill="${f.fin}" stroke="${f.spots}" stroke-width="1" opacity="0.7"/>
                <polygon points="42,70 48,82 54,70" fill="${f.fin}" stroke="${f.spots}" stroke-width="1" opacity="0.7"/>
                <rect x="20" y="58" width="8" height="5" rx="2" fill="${f.fin}" opacity="0.5"/>
            </svg>`;
        }

        // ===== STATE =====
        let rows = 4;
        let cols = 4;
        let hardMode = false;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let totalPairs = 0;
        let moves = 0;
        let hasLogo = false;
        let logoIndex = -1;
        let lockBoard = false;
        let fishList = [];

        // ===== HELPERS =====
        function shuffle(a) {
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function declOfNum(n, words) {
            n = Math.abs(n) % 100;
            if (n > 10 && n < 20) return words[2];
            n = n % 10;
            if (n === 1) return words[0];
            if (n > 1 && n < 5) return words[1];
            return words[2];
        }

        // ===== INIT =====
        function initGame() {
            const total = rows * cols;
            hasLogo = total % 2 === 1;
            const fishCount = hasLogo ? (total - 1) / 2 : total / 2;
            totalPairs = fishCount;
            logoIndex = hasLogo ? Math.floor(rows / 2) * cols + Math.floor(cols / 2) : -1;

            fishList = Array.from({ length: fishCount }, (_, i) => generateFish(i));

            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            grid.style.setProperty('--cols', cols);
            grid.style.setProperty('--gap', cols > 6 ? '6px' : cols > 4 ? '8px' : '10px');
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

            const maxCardSize = cols > 6 ? 72 : cols > 4 ? 82 : 92;
            grid.style.maxWidth = `min(96vw, ${cols * maxCardSize + (cols - 1) * (cols > 6 ? 6 : cols > 4 ? 8 : 10)}px)`;

            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            lockBoard = false;

            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = `0/${totalPairs}`;
            document.getElementById('victory').classList.remove('show');

            document.getElementById('subtitle').textContent =
                `${cols}×${rows} · ${totalPairs} ${declOfNum(totalPairs, ['пара', 'пары', 'пар'])}${hasLogo ? ' · с логотипом' : ''}${hardMode ? ' · сложный' : ''}`;

            const deck = [];
            fishList.forEach((f, i) => {
                deck.push({ fishIdx: i });
                deck.push({ fishIdx: i });
            });
            shuffle(deck);

            cards = [];
            let cardIdx = 0;
            for (let i = 0; i < total; i++) {
                if (i === logoIndex) {
                    const logo = document.createElement('div');
                    logo.className = 'logo-card';
                    logo.textContent = '🐡';
                    grid.appendChild(logo);
                } else {
                    const data = deck[cardIdx++];
                    const el = document.createElement('div');
                    el.className = 'card';
                    el.dataset.index = i;

                    el.innerHTML = `
                        <div class="card-face card-back">
                            <div class="card-back-pattern">🐡</div>
                        </div>
                        <div class="card-face card-front">
                            ${fishSVG(fishList[data.fishIdx])}
                        </div>
                    `;

                    el.addEventListener('click', () => flipCard(i));
                    grid.appendChild(el);

                    cards.push({ ...data, flipped: false, matched: false, el });
                }
            }
        }

        // ===== GAME LOGIC =====
        function flipCard(index) {
            if (lockBoard) return;
            const card = cards[index];
            if (card.flipped || card.matched) return;
            if (flippedCards.length >= 2) return;

            card.flipped = true;
            card.el.classList.add('flipped');
            flippedCards.push(index);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [i1, i2] = flippedCards;
            const c1 = cards[i1];
            const c2 = cards[i2];

            if (c1.fishIdx === c2.fishIdx) {
                setTimeout(() => {
                    c1.matched = true;
                    c2.matched = true;
                    c1.el.classList.add('matched');
                    c2.el.classList.add('matched');
                    matchedPairs++;
                    document.getElementById('pairs').textContent = `${matchedPairs}/${totalPairs}`;
                    flippedCards = [];

                    if (matchedPairs === totalPairs) {
                        setTimeout(victory, 600);
                    }
                }, 400);
            } else {
                lockBoard = true;
                setTimeout(() => {
                    c1.flipped = false;
                    c2.flipped = false;
                    c1.el.classList.remove('flipped');
                    c2.el.classList.remove('flipped');
                    flippedCards = [];

                    if (hardMode) {
                        resetAllMatched();
                    } else {
                        lockBoard = false;
                    }
                }, 800);
            }
        }

        function resetAllMatched() {
            let anyReset = false;
            cards.forEach(c => {
                if (c.matched) {
                    c.matched = false;
                    c.el.classList.remove('matched');
                    c.el.classList.remove('flipped');
                    c.flipped = false;
                    c.el.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                    anyReset = true;
                }
            });

            if (anyReset) {
                cards.forEach(c => {
                    if (!c.matched && !c.flipped) {
                        c.el.classList.add('reset-flash');
                        setTimeout(() => c.el.classList.remove('reset-flash'), 600);
                    }
                });

                matchedPairs = 0;
                document.getElementById('pairs').textContent = `0/${totalPairs}`;
            }

            setTimeout(() => {
                cards.forEach(c => { c.el.style.transition = ''; });
                lockBoard = false;
            }, 100);
        }

        // ===== VICTORY =====
        function victory() {
            const v = document.getElementById('victory');
            const modeText = hardMode ? 'сложном' : 'простом';
            document.getElementById('victoryStats').innerHTML =
                `Все кузовки собраны!<br>${cols}×${rows} · ${totalPairs} пар · ${moves} ${declOfNum(moves, ['ход', 'хода', 'ходов'])}<br>Режим: ${modeText}`;
            v.classList.add('show');
            spawnConfetti();
        }

        function spawnConfetti() {
            const colors = ['#64d8ff', '#fbbf24', '#a78bfa', '#fb7185', '#34d399', '#22d3ee', '#f472b6', '#fb923c'];
            for (let i = 0; i < 60; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-bubble';
                const size = 6 + Math.random() * 14;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + '%';
                el.style.top = Math.random() * 40 + '%';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.setProperty('--dur', (2 + Math.random() * 3) + 's');
                el.style.setProperty('--fall', (200 + Math.random() * 400) + 'px');
                el.style.boxShadow = `0 0 6px ${el.style.background}`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5000);
            }
        }

        // ===== CONTROLS =====
        function changeSize(dim, delta) {
            if (dim === 'cols') {
                cols = Math.max(2, Math.min(8, cols + delta));
            } else {
                rows = Math.max(2, Math.min(8, rows + delta));
            }
            document.getElementById('colsDisplay').textContent = cols;
            document.getElementById('rowsDisplay').textContent = rows;
            initGame();
        }

        function toggleMode() {
            hardMode = document.getElementById('modeToggle').checked;
            document.getElementById('easyLabel').classList.toggle('active', !hardMode);
            document.getElementById('hardLabel').classList.toggle('active', hardMode);
            initGame();
        }

        function restart() {
            initGame();
        }

        // ===== BUBBLES =====
        (function spawnBubbles() {
            const c = document.getElementById('bubbles');
            for (let i = 0; i < 25; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                const size = 6 + Math.random() * 20;
                b.style.setProperty('--size', size + 'px');
                b.style.setProperty('--left', Math.random() * 100 + '%');
                b.style.setProperty('--duration', (8 + Math.random() * 12) + 's');
                b.style.setProperty('--delay', (Math.random() * 15) + 's');
                c.appendChild(b);
            }
        })();

        initGame();
    </script>
</body>
</html>
