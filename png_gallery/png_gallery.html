<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Коллаж | Яндекс.Диск</title>
    <style>
        body { margin:0; overflow:hidden; background:#0a0a12; font-family: system-ui; }
        canvas { display:block; cursor:grab; }
        canvas:active { cursor:grabbing; }
        #ui {
            position:fixed; top:16px; left:16px; background:rgba(0,0,0,0.7); backdrop-filter:blur(12px);
            padding:10px 18px; border-radius:32px; display:flex; gap:12px; z-index:100;
            color:white; font-size:13px; border:1px solid #3a3a4a;
        }
        #ui input, #ui button {
            background:#1e1e2a; border:1px solid #5a5a7a; color:white; padding:4px 10px;
            border-radius:24px; cursor:pointer;
        }
        .status {
            position:fixed; bottom:16px; left:16px; background:#000000aa; backdrop-filter:blur(8px);
            padding:6px 12px; border-radius:40px; font-size:12px; color:#ddd; z-index:100;
        }
    </style>
</head>
<body>
<div id="ui">
    <span>🔑 seed:</span>
    <input id="seedInput" type="text" style="width:100px;">
    <button id="applySeedBtn">применить</button>
    <button id="regenBtn">🎲 новая расстановка</button>
</div>
<div class="status" id="statusMsg">⏳ загрузка...</div>
<canvas id="c"></canvas>

<script>
    // ========== НАСТРОЙКИ (замените на свои) ==========
    const YANDEX_TOKEN = 'ваш_oauth_токен';      // вставьте токен
    const YANDEX_FOLDER = '/disk/Мои картинки';  // путь к папке на Диске

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let images = [];
    let placed = [];
    let camera = { x:0, y:0, zoom:1 };
    let rand = null;
    let currentSeed = null;
    let draggingObj = null, dragType = null, isDragging = false, dragStartWorld = null;

    function resizeCanvas() {
        canvas.width = innerWidth; canvas.height = innerHeight;
        draw();
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    function mulberry32(seedVal) {
        return function() {
            let t = seedVal += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        };
    }

    // Создание маски для точной коллизии
    function createMask(img, scaleFactor = 0.28) {
        const w = Math.max(1, Math.floor(img.width * scaleFactor));
        const h = Math.max(1, Math.floor(img.height * scaleFactor));
        const off = document.createElement('canvas');
        off.width = w; off.height = h;
        const octx = off.getContext('2d');
        octx.drawImage(img, 0, 0, w, h);
        const data = octx.getImageData(0, 0, w, h).data;
        const mask = new Uint8Array(w*h);
        for(let i=0;i<w*h;i++) mask[i] = data[i*4+3] > 15 ? 1 : 0;
        return { mask, w, h, scale: scaleFactor };
    }

    // Пиксельная коллизия с зазором
    function pixelCollision(a, b, gap=3) {
        if(a.x+a.w+gap < b.x || a.x > b.x+b.w+gap || a.y+a.h+gap < b.y || a.y > b.y+b.h+gap) return false;
        const ma = a.img.mask, mb = b.img.mask;
        const x0 = Math.max(a.x,b.x), y0 = Math.max(a.y,b.y);
        const x1 = Math.min(a.x+a.w,b.x+b.w), y1 = Math.min(a.y+a.h,b.y+b.h);
        for(let y=y0; y<y1; y+=2) for(let x=x0; x<x1; x+=2) {
            const ax = Math.floor((x-a.x)*ma.scale), ay = Math.floor((y-a.y)*ma.scale);
            const bx = Math.floor((x-b.x)*mb.scale), by = Math.floor((y-b.y)*mb.scale);
            if(ax>=0 && ax<ma.w && ay>=0 && ay<ma.h && bx>=0 && bx<mb.w && by>=0 && by<mb.h)
                if(ma.mask[ay*ma.w+ax] && mb.mask[by*mb.w+bx]) return true;
        }
        return false;
    }

    // ========== ГЕНЕРАЦИЯ ПОЗИЦИЙ ==========
    function generatePositions(seedVal) {
        if(!images.length) return [];
        rand = mulberry32(seedVal);
        let items = images.map(img => ({
            x: (rand()-0.5)*1800, y: (rand()-0.5)*1800, w: img.width, h: img.height, img
        }));

        // 1. Агрессивное отталкивание
        for(let iter=0; iter<400; iter++) {
            let any = false;
            for(let i=0;i<items.length;i++) for(let j=i+1;j<items.length;j++) {
                if(pixelCollision(items[i], items[j], 4)) {
                    any = true;
                    const dx = items[i].x - items[j].x, dy = items[i].y - items[j].y;
                    const len = Math.hypot(dx,dy) || 0.01;
                    const nx = dx/len, ny = dy/len;
                    const force = 4.8 * (1 - iter/500);
                    items[i].x += nx*force; items[i].y += ny*force;
                    items[j].x -= nx*force; items[j].y -= ny*force;
                }
            }
            if(!any) break;
        }

        // 2. Притяжение к центру
        for(let iter=0; iter<120; iter++) {
            let moved = false;
            for(let a of items) {
                const oldX = a.x, oldY = a.y;
                a.x *= 0.988; a.y *= 0.988;
                if(items.some(b => b!==a && pixelCollision(a,b,3))) { a.x = oldX; a.y = oldY; }
                else moved = true;
            }
            if(!moved) break;
        }

        // 3. Центрирование
        let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
        for(let p of items) {
            minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
            maxX = Math.max(maxX, p.x+p.w); maxY = Math.max(maxY, p.y+p.h);
        }
        const centerX = (minX+maxX)/2, centerY = (minY+maxY)/2;
        for(let p of items) { p.x -= centerX; p.y -= centerY; }
        return items;
    }

    function fitToScreen() {
        if(!placed.length) return;
        let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
        for(let p of placed) {
            minX = Math.min(minX,p.x); minY = Math.min(minY,p.y);
            maxX = Math.max(maxX,p.x+p.w); maxY = Math.max(maxY,p.y+p.h);
        }
        const w = maxX-minX, h = maxY-minY;
        if(w<=0||h<=0) return;
        const scaleX = (canvas.width-80)/w, scaleY = (canvas.height-80)/h;
        camera.zoom = Math.min(scaleX, scaleY)*0.92;
        camera.x = (minX+maxX)/2;
        camera.y = (minY+maxY)/2;
        draw();
    }

    // ========== СОХРАНЕНИЕ ПОЗИЦИЙ ==========
    function saveState(seedVal, positions) {
        const key = `collage_${seedVal}`;
        const data = positions.map(p => ({ x:p.x, y:p.y, w:p.w, h:p.h, src:p.img.src }));
        localStorage.setItem(key, JSON.stringify(data));
    }
    function loadState(seedVal) {
        const key = `collage_${seedVal}`;
        const raw = localStorage.getItem(key);
        if(!raw) return null;
        try {
            const saved = JSON.parse(raw);
            const restored = [];
            for(let s of saved) {
                const found = images.find(img => img.src === s.src);
                if(found) restored.push({ x:s.x, y:s.y, w:s.w, h:s.h, img:found });
            }
            return restored.length === images.length ? restored : null;
        } catch(e) { return null; }
    }

    function applySeed(seedVal) {
        if(!images.length) return;
        currentSeed = seedVal;
        const stored = loadState(seedVal);
        if(stored) placed = stored;
        else {
            placed = generatePositions(seedVal);
            saveState(seedVal, placed);
        }
        fitToScreen();
        draw();
    }

    function regenerate() {
        if(!images.length) return;
        const newSeed = Math.floor(Math.random() * 2_147_483_647);
        document.getElementById('seedInput').value = newSeed;
        applySeed(newSeed);
        const url = new URL(location);
        url.searchParams.set('seed', newSeed);
        history.pushState({}, '', url);
    }

    function updateSeedAndUrlFromDrag() {
        const newSeed = Math.floor(Math.random() * 2_147_483_647);
        document.getElementById('seedInput').value = newSeed;
        saveState(newSeed, placed);
        const url = new URL(location);
        url.searchParams.set('seed', newSeed);
        history.pushState({}, '', url);
        currentSeed = newSeed;
    }

    // ========== ЗАГРУЗКА ИЗ ЯНДЕКС ДИСКА (через OAuth) ==========
    async function loadImagesFromYandex() {
        const statusDiv = document.getElementById('statusMsg');
        statusDiv.innerText = '📡 получение списка файлов...';
        try {
            // 1. Получаем список файлов в папке
            const listUrl = `https://cloud-api.yandex.net/v1/disk/resources?path=${encodeURIComponent(YANDEX_FOLDER)}&limit=1000`;
            const listResp = await fetch(listUrl, {
                headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
            });
            if (!listResp.ok) {
                const errData = await listResp.json();
                throw new Error(`Ошибка API: ${errData.message || listResp.status}`);
            }
            const listData = await listResp.json();
            const items = listData._embedded?.items || [];
            const pngFiles = items.filter(f => f.type === 'file' && f.name.toLowerCase().endsWith('.png'));
            if (!pngFiles.length) throw new Error('В папке нет PNG файлов');
            
            statusDiv.innerText = `🖼️ найдено ${pngFiles.length} PNG, загружаем...`;
            
            // 2. Для каждого PNG получаем ссылку на скачивание и загружаем изображение
            const loaded = [];
            for (let file of pngFiles) {
                const dlResp = await fetch(`https://cloud-api.yandex.net/v1/disk/resources/download?path=${encodeURIComponent(file.path)}`, {
                    headers: { 'Authorization': `OAuth ${YANDEX_TOKEN}` }
                });
                const dlData = await dlResp.json();
                const img = new Image();
                img.crossOrigin = "Anonymous";
                await new Promise((resolve, reject) => {
                    img.onload = () => {
                        img.mask = createMask(img);
                        loaded.push(img);
                        resolve();
                    };
                    img.onerror = () => reject(new Error(`не загрузилось ${file.name}`));
                    img.src = dlData.href;
                });
            }
            return loaded;
        } catch(err) {
            console.error(err);
            statusDiv.innerText = `❌ ошибка: ${err.message}`;
            throw err;
        }
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
        try {
            const imgs = await loadImagesFromYandex();
            images = imgs;
            const urlParams = new URLSearchParams(location.search);
            let seedFromUrl = urlParams.get('seed');
            if(seedFromUrl && !isNaN(parseInt(seedFromUrl))) {
                currentSeed = parseInt(seedFromUrl);
                document.getElementById('seedInput').value = currentSeed;
                applySeed(currentSeed);
            } else {
                const fresh = Math.floor(Math.random()*2_147_483_647);
                document.getElementById('seedInput').value = fresh;
                placed = generatePositions(fresh);
                saveState(fresh, placed);
                currentSeed = fresh;
                const url = new URL(location);
                url.searchParams.set('seed', fresh);
                history.pushState({}, '', url);
                fitToScreen();
                draw();
            }
            document.getElementById('statusMsg').innerHTML = `✅ загружено ${images.length} PNG из Яндекс.Диска`;
        } catch(err) {
            document.getElementById('statusMsg').innerHTML = `⚠️ ошибка: ${err.message}. Проверьте токен и путь к папке.`;
        }
    }

    // ========== ОТРИСОВКА И УПРАВЛЕНИЕ ==========
    function draw() {
        if(!ctx) return;
        ctx.setTransform(1,0,0,1,0,0);
        ctx.fillStyle = '#0a0a12';
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.setTransform(camera.zoom,0,0,camera.zoom, canvas.width/2 - camera.x*camera.zoom, canvas.height/2 - camera.y*camera.zoom);
        for(let p of placed) ctx.drawImage(p.img, p.x, p.y, p.w, p.h);
        if(draggingObj && dragType==='obj') {
            ctx.strokeStyle = '#ffaa44';
            ctx.lineWidth = 3/camera.zoom;
            ctx.strokeRect(draggingObj.x, draggingObj.y, draggingObj.w, draggingObj.h);
        }
    }

    function getMouseWorld(e) {
        const rect = canvas.getBoundingClientRect();
        const sx = (e.clientX - rect.left) * (canvas.width/rect.width);
        const sy = (e.clientY - rect.top) * (canvas.height/rect.height);
        const wx = (sx - canvas.width/2)/camera.zoom + camera.x;
        const wy = (sy - canvas.height/2)/camera.zoom + camera.y;
        return { x:wx, y:wy };
    }

    canvas.addEventListener('mousedown', (e)=>{
        e.preventDefault();
        const world = getMouseWorld(e);
        let clicked = null;
        for(let i=placed.length-1; i>=0; i--) {
            const p = placed[i];
            if(world.x>=p.x && world.x<=p.x+p.w && world.y>=p.y && world.y<=p.y+p.h) { clicked=p; break; }
        }
        if(clicked) {
            dragType='obj';
            draggingObj=clicked;
            dragStartWorld = { x: world.x - draggingObj.x, y: world.y - draggingObj.y };
        } else {
            dragType='cam';
            dragStartWorld = { x: world.x, y: world.y };
        }
        isDragging=true;
        canvas.style.cursor='grabbing';
    });
    canvas.addEventListener('mousemove', (e)=>{
        if(!isDragging) return;
        const world = getMouseWorld(e);
        if(dragType==='cam') {
            camera.x -= world.x - dragStartWorld.x;
            camera.y -= world.y - dragStartWorld.y;
            dragStartWorld = { x: world.x, y: world.y };
            draw();
        } else if(dragType==='obj' && draggingObj) {
            const newX = world.x - dragStartWorld.x;
            const newY = world.y - dragStartWorld.y;
            let can = true;
            const temp = { ...draggingObj, x:newX, y:newY };
            for(let other of placed) if(other!==draggingObj && pixelCollision(temp,other,5)) { can=false; break; }
            if(can) { draggingObj.x=newX; draggingObj.y=newY; draw(); }
        }
    });
    canvas.addEventListener('mouseup', ()=>{
        if(isDragging && dragType==='obj' && draggingObj) updateSeedAndUrlFromDrag();
        isDragging=false; dragType=null; draggingObj=null;
        canvas.style.cursor='grab';
    });
    canvas.addEventListener('wheel', (e)=>{
        e.preventDefault();
        const before = getMouseWorld(e);
        camera.zoom *= (e.deltaY<0 ? 1.08 : 0.92);
        camera.zoom = Math.min(8, Math.max(0.2, camera.zoom));
        const after = getMouseWorld(e);
        camera.x += before.x - after.x;
        camera.y += before.y - after.y;
        draw();
    });

    document.getElementById('applySeedBtn').onclick = () => {
        const val = parseInt(document.getElementById('seedInput').value);
        if(!isNaN(val)) applySeed(val);
    };
    document.getElementById('regenBtn').onclick = regenerate;

    canvas.style.cursor='grab';
    init();
</script>
</body>
</html>
