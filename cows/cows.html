<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Быки и Коровы</title>

<style>
:root {
    --cell-size: 48px;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px 10px;
}

.container {
    background: #2f2f4f;
    width: fit-content;
    max-width: 95vw;
    min-width: 320px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

button {
    padding: 10px 14px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #5865f2;
    color: white;
    margin: 5px;
}

button:hover { background: #4752c4; }
button:disabled { background: #555; cursor: not-allowed; }

input, select {
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    text-align: center;
    font-size: 16px;
}

.hidden { display: none; }

.history {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.word-row {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 5px;
}

.letters {
    display: flex;
    gap: 6px;
}

.letter-box {
    width: var(--cell-size);
    height: var(--cell-size);
    min-width: var(--cell-size);
    border-radius: 10px;
    background: #3c3c5f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    text-transform: uppercase;
}

.result {
    font-size: 18px;
    white-space: nowrap;
}

.win {
    margin-top: 20px;
    font-weight: bold;
}

/* 📱 Мобильная версия */
@media (max-width: 600px) {

    :root {
        --cell-size: 36px;
    }

    button {
        width: 100%;
        margin: 6px 0;
        font-size: 16px;
    }

    input, select {
        width: 100%;
        box-sizing: border-box;
        font-size: 16px;
    }

    .word-row {
        gap: 8px;
    }

    .result {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="container">
<h2>🐂 Быки и Коровы 🐄</h2>

<div id="modeSelection">
    <button onclick="showRandomOptions()">🎲 Случайное слово</button>
    <button onclick="showCustomInput()">✍ Ввести своё слово</button>
    <br>
    <label>Количество попыток:</label>
    <select id="attemptSelect">
        <option value="0">Неограниченно</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="10">10</option>
    </select>
</div>

<div id="randomOptions" class="hidden">
    <label>Длина слова: <span id="lengthValue"></span></label><br>
    <input type="range" id="lengthSlider">
    <br>
    <button onclick="startRandomGame()">Начать игру</button>
</div>

<div id="customWordDiv" class="hidden">
    <input type="text" id="customWordInput" placeholder="Введите слово">
    <br>
    <button onclick="startCustomGame()">Начать игру</button>
</div>

<p id="info"></p>

<div id="gameArea" class="hidden">
    <input type="text" id="guessInput" placeholder="Введите слово">
    <br>
    <button onclick="checkGuess()" id="checkBtn">Проверить</button>
    <button onclick="surrender()" id="surrenderBtn">Сдаться</button>
    <button onclick="restartGame()">Новая игра</button>

    <div class="history" id="history"></div>
    <div class="win" id="winMessage"></div>
</div>
</div>

<script>

let dictionary = [];
let singularWords = [];
let secretWord = "";
let wordLength = 0;
let gameOver = false;
let maxAttempts = 0;
let remainingAttempts = 0;

async function loadDictionaries() {
    const r1 = await fetch("words.txt");
    dictionary = (await r1.text()).split("\n").map(w=>w.trim().toLowerCase()).filter(Boolean);

    const r2 = await fetch("singular.txt");
    singularWords = (await r2.text()).split("\n").map(w=>w.trim().toLowerCase()).filter(Boolean);

    calculateLengthBounds();
}

function calculateLengthBounds() {
    const lengths = dictionary.map(w=>w.length);
    const slider = document.getElementById("lengthSlider");
    const preferred = 5;
    slider.min = Math.min(...lengths);
    slider.max = Math.max(...lengths);
    slider.value = dictionary.some(w => w.length === preferred)
        ? preferred
        : slider.min;
    document.getElementById("lengthValue").innerText = slider.value;
    slider.oninput = () => document.getElementById("lengthValue").innerText = slider.value;
}

function showRandomOptions() {
    document.getElementById("randomOptions").classList.remove("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
}

function showCustomInput() {
    document.getElementById("customWordDiv").classList.remove("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
}

function startRandomGame() {
    const len = parseInt(document.getElementById("lengthSlider").value);
    const filtered = dictionary.filter(w=>w.length===len);
    if (!filtered.length) return alert("Нет слов такой длины");
    secretWord = filtered[Math.floor(Math.random()*filtered.length)];
    setupGame();
}

function startCustomGame() {
    const word = document.getElementById("customWordInput").value.toLowerCase().trim();
    if (!dictionary.includes(word) && !singularWords.includes(word)) {
        return alert("Слова нет в словарях");
    }
    secretWord = word;
    setupGame();
}

function setupGame() {
    wordLength = secretWord.length;
    gameOver = false;
    maxAttempts = parseInt(document.getElementById("attemptSelect").value);
    remainingAttempts = maxAttempts;

    document.getElementById("modeSelection").classList.add("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");

    updateInfo();
    document.getElementById("history").innerHTML = "";
    document.getElementById("winMessage").innerText = "";
    document.getElementById("guessInput").disabled = false;
    document.getElementById("checkBtn").disabled = false;
    document.getElementById("surrenderBtn").disabled = false;
    document.getElementById("guessInput").focus();
}

function updateInfo() {
    let text = "Слово из " + wordLength + " букв.";
    if (maxAttempts > 0)
        text += " Осталось попыток: " + remainingAttempts;
    document.getElementById("info").innerText = text;
}

function countBullsAndCows(secret, guess) {
    let bulls=0, cows=0;
    let sRem=[], gRem=[];
    for(let i=0;i<secret.length;i++){
        if(secret[i]===guess[i]) bulls++;
        else { sRem.push(secret[i]); gRem.push(guess[i]); }
    }
    let count={};
    sRem.forEach(c=>count[c]=(count[c]||0)+1);
    gRem.forEach(c=>{
        if(count[c]>0){ cows++; count[c]--; }
    });
    return {bulls,cows};
}

function checkGuess() {
    if(gameOver) return;

    const input=document.getElementById("guessInput");
    const guess=input.value.toLowerCase().trim();

    if(!dictionary.includes(guess)&&!singularWords.includes(guess))
        return alert("Слова нет в словаре");

    if(guess.length!==wordLength)
        return alert("Неверная длина");

    const {bulls,cows}=countBullsAndCows(secretWord,guess);

    if(maxAttempts>0){
        remainingAttempts--;
        updateInfo();
    }

    const row=document.createElement("div");
    row.className="word-row";

    const letters=document.createElement("div");
    letters.className="letters";

    guess.split("").forEach(l=>{
        const box=document.createElement("div");
        box.className="letter-box";
        box.innerText=l;
        letters.appendChild(box);
    });

    const result=document.createElement("div");
    result.className="result";

    const isMobile = window.innerWidth <= 600;
    const emojiLimit = isMobile ? 4 : 7;
    
    if(wordLength > emojiLimit){
        result.innerText="🐂 "+bulls+"  🐄 "+cows;
    }else{
        if(bulls===0 && cows===0){
            result.innerText="❌";
        }else{
            let str="";
            if(bulls>0) str+="🐂".repeat(bulls)+" ";
            if(cows>0) str+="🐄".repeat(cows);
            result.innerText=str.trim();
        }
    }

    row.appendChild(letters);
    row.appendChild(result);
    document.getElementById("history").appendChild(row);

    input.value="";

    if(bulls===wordLength){
        document.getElementById("winMessage").innerText="🎉 Победа! Слово: "+secretWord;
        endGame();
        return;
    }

    if(maxAttempts>0 && remainingAttempts<=0){
        document.getElementById("winMessage").innerText="❌ Попытки закончились. Слово было: "+secretWord;
        endGame();
    }
}

function surrender(){
    if(gameOver) return;
    document.getElementById("winMessage").innerText="Вы сдались. Слово было: "+secretWord;
    endGame();
}

function endGame(){
    gameOver=true;
    document.getElementById("guessInput").disabled=true;
    document.getElementById("checkBtn").disabled=true;
    document.getElementById("surrenderBtn").disabled=true;
}

function restartGame(){
    document.getElementById("modeSelection").classList.remove("hidden");
    document.getElementById("gameArea").classList.add("hidden");
    document.getElementById("info").innerText="";
}

document.getElementById("guessInput").addEventListener("keydown",e=>{
    if(e.key==="Enter") checkGuess();
});

loadDictionaries();

</script>
</body>
</html>
