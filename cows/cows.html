<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Быки и Коровы</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
    margin-top: 40px;
}
.container {
    background: white;
    width: 480px;
    margin: auto;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
}
input[type="text"] {
    padding: 8px;
    font-size: 16px;
    margin: 5px 0;
}
button {
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
    margin: 5px;
}
.history {
    margin-top: 20px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
}
.win {
    color: green;
    font-weight: bold;
    margin-top: 15px;
}
.hidden {
    display: none;
}
.slider-container {
    margin: 10px 0;
}
</style>
</head>
<body>

<div class="container">
    <h2>🐂 Быки и Коровы 🐄</h2>

    <div id="modeSelection">
        <p>Выберите режим:</p>
        <button onclick="showRandomOptions()">🎲 Случайное слово</button>
        <button onclick="showCustomInput()">✍ Ввести своё слово</button>
    </div>

    <div id="randomOptions" class="hidden">
        <div class="slider-container">
            <label>Длина слова: <span id="lengthValue"></span></label><br>
            <input type="range" id="lengthSlider">
        </div>
        <button onclick="startRandomGame()">Начать игру</button>
    </div>

    <div id="customWordDiv" class="hidden">
        <input type="text" id="customWordInput" placeholder="Введите слово из словаря">
        <button onclick="startCustomGame()">Начать игру</button>
    </div>

    <p id="info"></p>

    <div id="gameArea" class="hidden">
        <input type="text" id="guessInput" placeholder="Введите слово">
        <button onclick="checkGuess()">Проверить</button>
        <button onclick="restartGame()">Новая игра</button>
        <button onclick="surrender()">Сдаться</button>

        <div class="history" id="history"></div>
        <div class="win" id="winMessage"></div>
    </div>
</div>

<script>
let dictionary = [];
let singularWords = [];
let secretWord = "";
let wordLength = 0;
let minLength = 5;
let maxLength = 0;

async function loadDictionaries() {
    // Загружаем основной словарь
    const response1 = await fetch("words.txt");
    const text1 = await response1.text();
    dictionary = text1
        .split("\n")
        .map(word => word.trim().toLowerCase())
        .filter(word => word.length > 0);

    // Загружаем дополнительный словарь
    const response2 = await fetch("singular.txt");
    const text2 = await response2.text();
    singularWords = text2
        .split("\n")
        .map(word => word.trim().toLowerCase())
        .filter(word => word.length > 0);

    calculateLengthBounds();
}

function calculateLengthBounds() {
    const lengths = dictionary.map(w => w.length);
    minLength = Math.min(...lengths);
    maxLength = Math.max(...lengths);

    const slider = document.getElementById("lengthSlider");
    slider.min = minLength;
    slider.max = maxLength;
    slider.value = minLength;

    document.getElementById("lengthValue").innerText = minLength;

    slider.oninput = function() {
        document.getElementById("lengthValue").innerText = this.value;
    };
}

function showRandomOptions() {
    document.getElementById("randomOptions").classList.remove("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
}

function showCustomInput() {
    document.getElementById("customWordDiv").classList.remove("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
}

function startRandomGame() {
    const chosenLength = parseInt(document.getElementById("lengthSlider").value);

    const filtered = dictionary.filter(w => w.length === chosenLength);

    if (filtered.length === 0) {
        alert("Нет слов такой длины!");
        return;
    }

    secretWord = filtered[Math.floor(Math.random() * filtered.length)];
    setupGame();
}

function startCustomGame() {
    const input = document.getElementById("customWordInput");
    const word = input.value.toLowerCase().trim();

    if (!dictionary.includes(word) && !singularWords.includes(word)) {
        alert("Такого слова нет в словарях!");
        return;
    }

    secretWord = word;
    setupGame();
}


function setupGame() {
    wordLength = secretWord.length;

    document.getElementById("modeSelection").classList.add("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");

    document.getElementById("info").innerText =
        "Слово из " + wordLength + " букв.";

    document.getElementById("history").innerHTML = "";
    document.getElementById("winMessage").innerText = "";
    document.getElementById("guessInput").value = "";
}

function countBullsAndCows(secret, guess) {
    let bulls = 0;
    let secretRemaining = [];
    let guessRemaining = [];

    for (let i = 0; i < secret.length; i++) {
        if (secret[i] === guess[i]) {
            bulls++;
        } else {
            secretRemaining.push(secret[i]);
            guessRemaining.push(guess[i]);
        }
    }

    let cows = 0;
    let letterCount = {};

    secretRemaining.forEach(char => {
        letterCount[char] = (letterCount[char] || 0) + 1;
    });

    guessRemaining.forEach(char => {
        if (letterCount[char] > 0) {
            cows++;
            letterCount[char]--;
        }
    });

    return { bulls, cows };
}

function checkGuess() {
    const input = document.getElementById("guessInput");
    const guess = input.value.toLowerCase().trim();

    // Проверяем наличие слова в обоих словарях
    if (!dictionary.includes(guess) && !singularWords.includes(guess)) {
        alert("Этого слова нет в словарях!");
        return;
    }

    if (guess.length !== wordLength) {
        alert("Слово должно быть из " + wordLength + " букв.");
        return;
    }

    const result = countBullsAndCows(secretWord, guess);

    const historyDiv = document.getElementById("history");
    historyDiv.innerHTML +=
        "<div>" + guess + " → 🐂 " + result.bulls +
        " | 🐄 " + result.cows + "</div>";

    input.value = "";

    if (result.bulls === wordLength) {
        document.getElementById("winMessage").innerText =
            "🎉 Слово угадано: " + secretWord;
    }
}

function surrender() {
    document.getElementById("winMessage").innerText =
        "Вы сдались. Загаданное слово: " + secretWord;
}

function restartGame() {
    document.getElementById("modeSelection").classList.remove("hidden");
    document.getElementById("gameArea").classList.add("hidden");
    document.getElementById("info").innerText = "";
}

loadDictionaries();
</script>

</body>
