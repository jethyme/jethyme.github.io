<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Быки и Коровы</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    margin: 0;
    padding: 40px 0;
}

.container {
    background: #2f2f4f;
    width: 560px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

h2 {
    margin-bottom: 20px;
}

input[type="text"] {
    padding: 12px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    outline: none;
    text-align: center;
    width: 200px;
}

button {
    padding: 10px 16px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #5865f2;
    color: white;
    transition: 0.2s;
    margin: 5px;
}

button:hover {
    background: #4752c4;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

.hidden {
    display: none;
}

.history {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.word-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    animation: fadeIn 0.3s ease;
}

.letter-box {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    background: #3c3c5f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    text-transform: uppercase;
}

.result-row {
    font-size: 22px;
    animation: fadeIn 0.3s ease;
}

.win {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

.slider-container {
    margin: 15px 0;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h2>🐂 Быки и Коровы 🐄</h2>

    <div id="modeSelection">
        <p>Выберите режим:</p>
        <button onclick="showRandomOptions()">🎲 Случайное слово</button>
        <button onclick="showCustomInput()">✍ Ввести своё слово</button>
    </div>

    <div id="randomOptions" class="hidden">
        <div class="slider-container">
            <label>Длина слова: <span id="lengthValue"></span></label><br>
            <input type="range" id="lengthSlider">
        </div>
        <button onclick="startRandomGame()">Начать игру</button>
    </div>

    <div id="customWordDiv" class="hidden">
        <input type="text" id="customWordInput" placeholder="Введите слово из словаря">
        <br>
        <button onclick="startCustomGame()">Начать игру</button>
    </div>

    <p id="info"></p>

    <div id="gameArea" class="hidden">
        <input type="text" id="guessInput" placeholder="Введите слово">
        <br>
        <button onclick="checkGuess()" id="checkBtn">Проверить</button>
        <button onclick="surrender()" id="surrenderBtn">Сдаться</button>
        <button onclick="restartGame()">Новая игра</button>

        <div class="history" id="history"></div>
        <div class="win" id="winMessage"></div>
    </div>
</div>

<script>

let dictionary = [];
let singularWords = [];
let secretWord = "";
let wordLength = 0;
let minLength = 5;
let maxLength = 0;
let gameOver = false;
let attempts = 0;
const maxAttempts = 6;

async function loadDictionaries() {
    const response1 = await fetch("words.txt");
    const text1 = await response1.text();
    dictionary = text1.split("\n").map(w => w.trim().toLowerCase()).filter(w => w);

    const response2 = await fetch("singular.txt");
    const text2 = await response2.text();
    singularWords = text2.split("\n").map(w => w.trim().toLowerCase()).filter(w => w);

    calculateLengthBounds();
}

function calculateLengthBounds() {
    const lengths = dictionary.map(w => w.length);
    minLength = Math.min(...lengths);
    maxLength = Math.max(...lengths);

    const slider = document.getElementById("lengthSlider");
    slider.min = minLength;
    slider.max = maxLength;
    slider.value = minLength;

    document.getElementById("lengthValue").innerText = minLength;

    slider.oninput = function() {
        document.getElementById("lengthValue").innerText = this.value;
    };
}

function showRandomOptions() {
    document.getElementById("randomOptions").classList.remove("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
}

function showCustomInput() {
    document.getElementById("customWordDiv").classList.remove("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
}

function startRandomGame() {
    const chosenLength = parseInt(document.getElementById("lengthSlider").value);
    const filtered = dictionary.filter(w => w.length === chosenLength);

    if (filtered.length === 0) {
        alert("Нет слов такой длины!");
        return;
    }

    secretWord = filtered[Math.floor(Math.random() * filtered.length)];
    setupGame();
}

function startCustomGame() {
    const word = document.getElementById("customWordInput").value.toLowerCase().trim();

    if (!dictionary.includes(word)) {
        alert("Такого слова нет в словаре!");
        return;
    }

    secretWord = word;
    setupGame();
}

function setupGame() {
    wordLength = secretWord.length;
    attempts = 0;
    gameOver = false;

    document.getElementById("modeSelection").classList.add("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");

    document.getElementById("info").innerText = 
        "Слово из " + wordLength + " букв. Попыток: " + maxAttempts;

    document.getElementById("history").innerHTML = "";
    document.getElementById("winMessage").innerText = "";
    document.getElementById("guessInput").value = "";
    document.getElementById("guessInput").disabled = false;
    document.getElementById("checkBtn").disabled = false;
    document.getElementById("surrenderBtn").disabled = false;

    document.getElementById("guessInput").focus();
}

function countBullsAndCows(secret, guess) {
    let bulls = 0;
    let secretRemaining = [];
    let guessRemaining = [];

    for (let i = 0; i < secret.length; i++) {
        if (secret[i] === guess[i]) {
            bulls++;
        } else {
            secretRemaining.push(secret[i]);
            guessRemaining.push(guess[i]);
        }
    }

    let cows = 0;
    let letterCount = {};

    secretRemaining.forEach(char => {
        letterCount[char] = (letterCount[char] || 0) + 1;
    });

    guessRemaining.forEach(char => {
        if (letterCount[char] > 0) {
            cows++;
            letterCount[char]--;
        }
    });

    return { bulls, cows };
}

function checkGuess() {
    if (gameOver) return;

    const input = document.getElementById("guessInput");
    const guess = input.value.toLowerCase().trim();

    if (!dictionary.includes(guess) && !singularWords.includes(guess)) {
        alert("Этого слова нет в словарях!");
        return;
    }

    if (guess.length !== wordLength) {
        alert("Слово должно быть из " + wordLength + " букв.");
        return;
    }

    attempts++;

    const result = countBullsAndCows(secretWord, guess);
    const historyDiv = document.getElementById("history");

    const wordRow = document.createElement("div");
    wordRow.className = "word-row";

    guess.split("").forEach(letter => {
        const box = document.createElement("div");
        box.className = "letter-box";
        box.innerText = letter;
        wordRow.appendChild(box);
    });

    historyDiv.appendChild(wordRow);

    const resultRow = document.createElement("div");
    resultRow.className = "result-row";

    let bullsStr = result.bulls > 0 ? "🐂".repeat(result.bulls) : "❌";
    let cowsStr = result.cows > 0 ? "🐄".repeat(result.cows) : "❌";

    resultRow.innerText = bullsStr + "   " + cowsStr;
    historyDiv.appendChild(resultRow);

    input.value = "";

    if (result.bulls === wordLength) {
        document.getElementById("winMessage").innerText =
            "🎉 Победа! Слово: " + secretWord;
        endGame();
        return;
    }

    if (attempts >= maxAttempts) {
        document.getElementById("winMessage").innerText =
            "❌ Попытки закончились. Слово было: " + secretWord;
        endGame();
    }
}

function surrender() {
    if (gameOver) return;

    document.getElementById("winMessage").innerText =
        "Вы сдались. Слово было: " + secretWord;
    endGame();
}

function endGame() {
    gameOver = true;
    document.getElementById("guessInput").disabled = true;
    document.getElementById("checkBtn").disabled = true;
    document.getElementById("surrenderBtn").disabled = true;
}

function restartGame() {
    document.getElementById("modeSelection").classList.remove("hidden");
    document.getElementById("gameArea").classList.add("hidden");
    document.getElementById("info").innerText = "";
}

document.getElementById("guessInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkGuess();
});

loadDictionaries();
</script>

</body>
</html>
