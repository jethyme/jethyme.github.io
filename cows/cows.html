<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐂 Быки и Коровы 🐄</title>

<style>
:root { --cell-size: 48px; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px 10px;
}
.container {
    background: #2f2f4f;
    width: fit-content;
    max-width: 95vw;
    min-width: 320px;
    margin: auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
button {
    padding: 10px 14px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #5865f2;
    color: white;
    margin: 5px;
    transition: 0.2s;
}
button:hover { background: #4752c4; }
button:disabled { background: #777; cursor: not-allowed; opacity: 0.6; }
input, select {
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    text-align: center;
    font-size: 16px;
}
.hidden { display: none; }
.history { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
.word-row { display: flex; justify-content: flex-start; align-items: center; gap: 12px; overflow-x: auto; padding-bottom: 5px; }
.letters { display: flex; gap: 6px; }
.letter-box {
    width: var(--cell-size);
    height: var(--cell-size);
    min-width: var(--cell-size);
    border-radius: 10px;
    background: #3c3c5f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 18px;
    text-transform: uppercase;
}
.result { font-size: 18px; white-space: nowrap; }
.win { margin-top: 20px; font-weight: bold; }
.error { color: #ff6b6b; font-size: 14px; margin-top: 6px; text-align: center; }
.input-error { outline: 2px solid #ff6b6b; }
.shake { animation: shake 0.3s; }
@keyframes shake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
    100% { transform: translateX(0); }
}
@media (max-width: 600px) {
    :root { --cell-size: 36px; }
    button { width: 100%; margin: 6px 0; font-size: 16px; }
    input, select { width: 100%; box-sizing: border-box; font-size: 16px; }
    .word-row { gap: 8px; }
    .result { font-size: 16px; }
}
.copy-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #4caf50;
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}
.loading-indicator { font-size: 12px; color: #ccc; margin-top: 5px; }
</style>
</head>
<body>

<div class="container">
<h2>🐂 Быки и Коровы 🐄</h2>

<div id="modeSelection">
    <button onclick="showRandomOptions()">🎲 Случайное слово</button>
    <button onclick="showCustomInput()">✍ Ввести своё слово</button>
    <br>
    <label>Количество попыток:</label>
    <select id="attemptSelect">
        <option value="0">Неограниченно</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="10">10</option>
    </select>
    <div id="dictLoader" class="loading-indicator">📚 Загрузка словарей...</div>
</div>

<div id="randomOptions" class="hidden">
    <label>Длина слова: <span id="lengthValue"></span></label><br>
    <input type="range" id="lengthSlider">
    <br>
    <button onclick="startRandomGame()">Начать игру</button>
</div>

<div id="customWordDiv" class="hidden">
    <input type="text" id="customWordInput" placeholder="Введите слово">
    <div style="display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
        <button onclick="startCustomGame()">▶ Начать игру</button>
        <button onclick="copyShareLink()" id="copyLinkBtn" style="background: #2c7a4d;">📋 Скопировать ссылку</button>
    </div>
    <div id="customWordError" class="error hidden"></div>
</div>

<p id="info"></p>

<div id="gameArea" class="hidden">
    <input type="text" id="guessInput" placeholder="Введите слово">
    <div id="errorMessage" class="error hidden"></div>
    <br>
    <button onclick="checkGuess()" id="checkBtn">Проверить</button>
    <button onclick="surrender()" id="surrenderBtn">Сдаться</button>
    <button onclick="restartGame()">Новая игра</button>
    <div class="history" id="history"></div>
    <div class="win" id="winMessage"></div>
</div>
</div>

<div id="copyToast" class="copy-toast">🔗 Ссылка скопирована!</div>

<script>
let dictionary = [];
let singularWords = [];
let secretWord = "";
let wordLength = 0;
let gameOver = false;
let maxAttempts = 0;
let remainingAttempts = 0;
let isSharedGame = false;
let dictionariesLoaded = false;

const XOR_KEY = "BullsAndCows2024!";

// Функция для преобразования строки в UTF-8 байты
function strToUtf8Bytes(str) {
    const encoder = new TextEncoder();
    return encoder.encode(str);
}

// Функция для преобразования байтов в строку (UTF-8)
function utf8BytesToStr(bytes) {
    const decoder = new TextDecoder('utf-8');
    return decoder.decode(bytes);
}

function encryptWord(word) {
    // 1. Получаем UTF-8 байты исходного слова
    const wordBytes = strToUtf8Bytes(word);
    // 2. XOR с ключом
    const keyBytes = strToUtf8Bytes(XOR_KEY);
    const encryptedBytes = new Uint8Array(wordBytes.length);
    for (let i = 0; i < wordBytes.length; i++) {
        encryptedBytes[i] = wordBytes[i] ^ keyBytes[i % keyBytes.length];
    }
    // 3. Преобразуем байты в строку (как есть) и кодируем в Base64
    let binaryString = '';
    for (let i = 0; i < encryptedBytes.length; i++) {
        binaryString += String.fromCharCode(encryptedBytes[i]);
    }
    return btoa(binaryString);
}

function decryptWord(encryptedBase64) {
    try {
        // 1. Декодируем Base64 в бинарную строку
        const binaryString = atob(encryptedBase64);
        // 2. Преобразуем в массив байтов
        const encryptedBytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) {
            encryptedBytes[i] = binaryString.charCodeAt(i);
        }
        // 3. XOR с ключом
        const keyBytes = strToUtf8Bytes(XOR_KEY);
        const decryptedBytes = new Uint8Array(encryptedBytes.length);
        for (let i = 0; i < encryptedBytes.length; i++) {
            decryptedBytes[i] = encryptedBytes[i] ^ keyBytes[i % keyBytes.length];
        }
        // 4. Преобразуем байты в строку UTF-8
        return utf8BytesToStr(decryptedBytes);
    } catch(e) {
        console.error('Decrypt error:', e);
        return null;
    }
}

function getCurrentBaseUrl() {
    let url = new URL(window.location.href);
    url.search = "";
    return url.toString();
}

function generateShareLink(word) {
    const encrypted = encryptWord(word);
    const baseUrl = getCurrentBaseUrl();
    return `${baseUrl}?w=${encodeURIComponent(encrypted)}`;
}

function showToast(msg, isError = false) {
    const toast = document.getElementById("copyToast");
    toast.innerText = msg;
    toast.style.background = isError ? "#d32f2f" : "#4caf50";
    toast.style.opacity = "1";
    setTimeout(() => { toast.style.opacity = "0"; }, 2500);
}

function showCustomWordError(msg) {
    const errDiv = document.getElementById("customWordError");
    errDiv.innerText = msg;
    errDiv.classList.remove("hidden");
    setTimeout(() => errDiv.classList.add("hidden"), 4000);
}

function copyShareLink() {
    console.log("copyShareLink вызвана");
    const copyBtn = document.getElementById("copyLinkBtn");
    const inputField = document.getElementById("customWordInput");
    let word = inputField.value.trim().toLowerCase();

    if (!dictionariesLoaded) {
        showCustomWordError("Словари ещё загружаются, подождите секунду...");
        return;
    }

    if (!word) {
        showCustomWordError("Введите слово перед копированием ссылки");
        return;
    }

    console.log("Проверяем слово:", word);
    console.log("В словаре dictionary:", dictionary.includes(word));
    console.log("В singularWords:", singularWords.includes(word));

    if (!dictionary.includes(word) && !singularWords.includes(word)) {
        showCustomWordError("Слова нет в словарях, ссылку нельзя создать");
        return;
    }

    try {
        const link = generateShareLink(word);
        navigator.clipboard.writeText(link).then(() => {
            showToast("✅ Ссылка скопирована! Отправь другу.");
            copyBtn.style.transform = "scale(0.97)";
            setTimeout(() => { copyBtn.style.transform = ""; }, 150);
        }).catch((err) => {
            console.error("Ошибка копирования:", err);
            alert("Не удалось скопировать ссылку автоматически. Вот она:\n" + link);
        });
    } catch(e) {
        console.error("Ошибка при создании ссылки:", e);
        showCustomWordError("Ошибка при создании ссылки: " + e.message);
    }
}

async function loadDictionaries() {
    try {
        const r1 = await fetch("words.txt");
        dictionary = (await r1.text()).split("\n").map(w=>w.trim().toLowerCase()).filter(Boolean);
        const r2 = await fetch("singular.txt");
        singularWords = (await r2.text()).split("\n").map(w=>w.trim().toLowerCase()).filter(Boolean);
        dictionariesLoaded = true;
        document.getElementById("dictLoader").innerHTML = "✅ Словари загружены";
        setTimeout(() => {
            const loader = document.getElementById("dictLoader");
            if(loader) loader.style.opacity = "0.6";
        }, 1500);
        calculateLengthBounds();

        const urlParams = new URLSearchParams(window.location.search);
        const encryptedParam = urlParams.get("w");
        if (encryptedParam) {
            const decryptedWord = decryptWord(encryptedParam);
            if (decryptedWord && (dictionary.includes(decryptedWord) || singularWords.includes(decryptedWord))) {
                secretWord = decryptedWord;
                isSharedGame = true;
                setupGame();
                return;
            } else {
                alert("Ссылка содержит неверное слово. Начинаем обычную игру.");
            }
        }
        document.getElementById("modeSelection").classList.remove("hidden");
    } catch(e) {
        console.error(e);
        document.getElementById("dictLoader").innerHTML = "❌ Ошибка загрузки словарей";
        alert("Не удалось загрузить словари. Проверьте файлы words.txt и singular.txt");
    }
}

function calculateLengthBounds() {
    if(!dictionary.length) return;
    const lengths = dictionary.map(w=>w.length);
    const slider = document.getElementById("lengthSlider");
    slider.min = Math.min(...lengths);
    slider.max = Math.max(...lengths);
    slider.value = dictionary.some(w => w.length === 5) ? 5 : slider.min;
    document.getElementById("lengthValue").innerText = slider.value;
    slider.oninput = () => document.getElementById("lengthValue").innerText = slider.value;
}

function showRandomOptions() {
    document.getElementById("randomOptions").classList.remove("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
}

function showCustomInput() {
    if (!dictionariesLoaded) {
        alert("Подождите, словари ещё загружаются...");
        return;
    }
    document.getElementById("customWordDiv").classList.remove("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
    document.getElementById("customWordError").classList.add("hidden");
    document.getElementById("customWordInput").value = "";
}

function startRandomGame() {
    if (!dictionariesLoaded) return alert("Словари ещё не готовы, подождите.");
    const len = parseInt(document.getElementById("lengthSlider").value);
    const filtered = dictionary.filter(w=>w.length===len);
    if (!filtered.length) return alert("Нет слов такой длины");
    secretWord = filtered[Math.floor(Math.random()*filtered.length)];
    isSharedGame = false;
    setupGame();
}

function startCustomGame() {
    if (!dictionariesLoaded) return alert("Словари ещё не загружены.");
    const word = document.getElementById("customWordInput").value.toLowerCase().trim();
    if (!dictionary.includes(word) && !singularWords.includes(word)) {
        showCustomWordError("Слова нет в словаре, игра не начнётся");
        return;
    }
    secretWord = word;
    isSharedGame = false;
    setupGame();
}

function setupGame() {
    wordLength = secretWord.length;
    gameOver = false;
    maxAttempts = parseInt(document.getElementById("attemptSelect").value);
    remainingAttempts = maxAttempts;

    document.getElementById("modeSelection").classList.add("hidden");
    document.getElementById("randomOptions").classList.add("hidden");
    document.getElementById("customWordDiv").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");

    updateInfo();
    document.getElementById("history").innerHTML = "";
    document.getElementById("winMessage").innerText = "";
    document.getElementById("guessInput").disabled = false;
    document.getElementById("checkBtn").disabled = false;
    document.getElementById("surrenderBtn").disabled = false;
    document.getElementById("guessInput").focus();
    clearError();

    if (isSharedGame) {
        const infoDiv = document.getElementById("info");
        infoDiv.innerHTML = `🎁 Игра с загаданным словом друга (${wordLength} букв). ${maxAttempts > 0 ? "Осталось попыток: " + remainingAttempts : "Попытки не ограничены"}`;
    }
}

function updateInfo() {
    let text = "Слово из " + wordLength + " букв.";
    if (maxAttempts > 0) text += " Осталось попыток: " + remainingAttempts;
    if (isSharedGame && !gameOver) text = "🎁 " + text;
    document.getElementById("info").innerText = text;
}

function countBullsAndCows(secret, guess) {
    let bulls=0, cows=0;
    let sRem=[], gRem=[];
    for(let i=0;i<secret.length;i++){
        if(secret[i]===guess[i]) bulls++;
        else { sRem.push(secret[i]); gRem.push(guess[i]); }
    }
    let count={};
    sRem.forEach(c=>count[c]=(count[c]||0)+1);
    gRem.forEach(c=>{ if(count[c]>0){ cows++; count[c]--; } });
    return {bulls,cows};
}

function showError(msg){
    const error = document.getElementById("errorMessage");
    const input = document.getElementById("guessInput");
    error.innerText = msg;
    error.classList.remove("hidden");
    input.classList.add("input-error");
    input.classList.remove("shake");
    void input.offsetWidth;
    input.classList.add("shake");
}

function clearError(){
    const error = document.getElementById("errorMessage");
    const input = document.getElementById("guessInput");
    error.innerText = "";
    error.classList.add("hidden");
    input.classList.remove("input-error");
}

function checkGuess() {
    if(gameOver) return;
    const input=document.getElementById("guessInput");
    const guess=input.value.toLowerCase().trim();
    if(!dictionary.includes(guess)&&!singularWords.includes(guess)){
        showError("Слова нет в словаре");
        return;
    }
    if(guess.length!==wordLength){
        showError("Неверная длина");
        return;
    }
    clearError();

    const {bulls,cows}=countBullsAndCows(secretWord,guess);

    if(maxAttempts>0){
        remainingAttempts--;
        updateInfo();
    }

    const row=document.createElement("div");
    row.className="word-row";

    const letters=document.createElement("div");
    letters.className="letters";
    guess.split("").forEach(l=>{
        const box=document.createElement("div");
        box.className="letter-box";
        box.innerText=l;
        letters.appendChild(box);
    });

    const result=document.createElement("div");
    result.className="result";
    const isMobile = window.innerWidth <= 600;
    const totalEmojis = bulls + cows;
    const emojiLimit = isMobile ? 4 : 7;
    
    if(totalEmojis > emojiLimit){
        result.innerText = "🐂 " + bulls + "  🐄 " + cows;
    }else{
        if(totalEmojis === 0){
            result.innerText = "❌";
        }else{
            let str="";
            if(bulls>0) str+="🐂".repeat(bulls)+" ";
            if(cows>0) str+="🐄".repeat(cows);
            result.innerText=str.trim();
        }
    }

    row.appendChild(letters);
    row.appendChild(result);
    document.getElementById("history").appendChild(row);
    input.value="";

    if(bulls===wordLength){
        document.getElementById("winMessage").innerHTML="🎉 Победа! Слово: "+secretWord;
        endGame();
        return;
    }

    if(maxAttempts>0 && remainingAttempts<=0){
        document.getElementById("winMessage").innerHTML="❌ Попытки закончились. Слово было: "+secretWord;
        endGame();
    }
}

function surrender(){
    if(gameOver) return;
    document.getElementById("winMessage").innerHTML="Вы сдались. Слово было: "+secretWord;
    endGame();
}

function endGame(){
    gameOver=true;
    document.getElementById("guessInput").disabled=true;
    document.getElementById("checkBtn").disabled=true;
    document.getElementById("surrenderBtn").disabled=true;
}

function restartGame(){
    document.getElementById("modeSelection").classList.remove("hidden");
    document.getElementById("gameArea").classList.add("hidden");
    document.getElementById("info").innerText = "";
    document.getElementById("winMessage").innerText = "";
    document.getElementById("history").innerHTML = "";
    isSharedGame = false;
    const url = new URL(window.location.href);
    url.searchParams.delete("w");
    window.history.replaceState({}, document.title, url.toString());
    document.getElementById("customWordInput").value = "";
    clearError();
}

document.getElementById("guessInput").addEventListener("keydown",e=>{ if(e.key==="Enter") checkGuess(); });
document.getElementById("guessInput").addEventListener("input", clearError);
document.getElementById("customWordInput").addEventListener("input", () => {
    document.getElementById("customWordError").classList.add("hidden");
});

loadDictionaries();
</script>
</body>
</html>
