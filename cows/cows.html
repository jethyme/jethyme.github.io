<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Быки и Коровы</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    margin: 0;
    padding: 40px 0;
}

.container {
    background: #2f2f4f;
    width: 650px;
    margin: auto;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

input[type="text"] {
    padding: 12px;
    font-size: 18px;
    border-radius: 12px;
    border: none;
    outline: none;
    text-align: center;
    width: 200px;
}

button {
    padding: 10px 16px;
    font-size: 15px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #5865f2;
    color: white;
    transition: 0.2s;
    margin: 5px;
}

button:hover {
    background: #4752c4;
}

button:disabled {
    background: #555;
    cursor: not-allowed;
}

.hidden { display: none; }

.history {
    margin-top: 25px;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.word-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    animation: fadeIn 0.3s ease;
}

.letters {
    display: flex;
    gap: 6px;
}

.letter-box {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: #3c3c5f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    text-transform: uppercase;
}

.result {
    font-size: 20px;
    min-width: 120px;
    text-align: left;
}

.win {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">
    <h2>🐂 Быки и Коровы 🐄</h2>

    <div id="modeSelection">
        <button onclick="showRandomOptions()">🎲 Случайное слово</button>
        <button onclick="showCustomInput()">✍ Ввести своё слово</button>
    </div>

    <div id="randomOptions" class="hidden">
        <label>Длина слова: <span id="lengthValue"></span></label><br>
        <input type="range" id="lengthSlider">
        <br>
        <button onclick="startRandomGame()">Начать игру</button>
    </div>

    <div id="customWordDiv" class="hidden">
        <input type="text" id="customWordInput" placeholder="Введите слово">
        <br>
        <button onclick="startCustomGame()">Начать игру</button>
    </div>

    <p id="info"></p>

    <div id="gameArea" class="hidden">
        <input type="text" id="guessInput" placeholder="Введите слово">
        <br>
        <button onclick="checkGuess()" id="checkBtn">Проверить</button>
        <button onclick="surrender()" id="surrenderBtn">Сдаться</button>
        <button onclick="restartGame()">Новая игра</button>

        <div class="history" id="history"></div>
        <div class="win" id="winMessage"></div>
    </div>
</div>

<script>

let dictionary = [];
let singularWords = [];
let secretWord = "";
let wordLength = 0;
let gameOver = false;
let attempts = 0;
const maxAttempts = 6;

async function loadDictionaries() {
    const response1 = await fetch("words.txt");
    const text1 = await response1.text();
    dictionary = text1.split("\n").map(w => w.trim().toLowerCase()).filter(w => w);

    const response2 = await fetch("singular.txt");
    const text2 = await response2.text();
    singularWords = text2.split("\n").map(w => w.trim().toLowerCase()).filter(w => w);

    const lengths = dictionary.map(w => w.length);
    const slider = document.getElementById("lengthSlider");
    slider.min = Math.min(...lengths);
    slider.max = Math.max(...lengths);
    slider.value = slider.min;
    document.getElementById("lengthValue").innerText = slider.value;
    slider.oninput = () => document.getElementById("lengthValue").innerText = slider.value;
}

function showRandomOptions() {
    randomOptions.classList.remove("hidden");
    customWordDiv.classList.add("hidden");
}

function showCustomInput() {
    customWordDiv.classList.remove("hidden");
    randomOptions.classList.add("hidden");
}

function startRandomGame() {
    const length = parseInt(lengthSlider.value);
    const filtered = dictionary.filter(w => w.length === length);
    secretWord = filtered[Math.floor(Math.random() * filtered.length)];
    setupGame();
}

function startCustomGame() {
    const word = customWordInput.value.toLowerCase().trim();
    if (!dictionary.includes(word)) {
        alert("Слова нет в словаре");
        return;
    }
    secretWord = word;
    setupGame();
}

function setupGame() {
    wordLength = secretWord.length;
    attempts = 0;
    gameOver = false;

    modeSelection.classList.add("hidden");
    randomOptions.classList.add("hidden");
    customWordDiv.classList.add("hidden");
    gameArea.classList.remove("hidden");

    info.innerText = "Слово из " + wordLength + " букв. Попыток: " + maxAttempts;
    history.innerHTML = "";
    winMessage.innerText = "";

    guessInput.disabled = false;
    checkBtn.disabled = false;
    surrenderBtn.disabled = false;
    guessInput.value = "";
    guessInput.focus();
}

function countBullsAndCows(secret, guess) {
    let bulls = 0;
    let secretRem = [];
    let guessRem = [];

    for (let i = 0; i < secret.length; i++) {
        if (secret[i] === guess[i]) bulls++;
        else {
            secretRem.push(secret[i]);
            guessRem.push(guess[i]);
        }
    }

    let cows = 0;
    let count = {};
    secretRem.forEach(c => count[c] = (count[c] || 0) + 1);
    guessRem.forEach(c => {
        if (count[c] > 0) {
            cows++;
            count[c]--;
        }
    });

    return { bulls, cows };
}

function checkGuess() {
    if (gameOver) return;

    const guess = guessInput.value.toLowerCase().trim();

    if (!dictionary.includes(guess) && !singularWords.includes(guess)) {
        alert("Этого слова нет в словаре");
        return;
    }

    if (guess.length !== wordLength) {
        alert("Слово должно быть из " + wordLength + " букв");
        return;
    }

    attempts++;
    const result = countBullsAndCows(secretWord, guess);

    const row = document.createElement("div");
    row.className = "word-row";

    const lettersDiv = document.createElement("div");
    lettersDiv.className = "letters";

    guess.split("").forEach(l => {
        const box = document.createElement("div");
        box.className = "letter-box";
        box.innerText = l;
        lettersDiv.appendChild(box);
    });

    const resultDiv = document.createElement("div");
    resultDiv.className = "result";

    if (wordLength > 7) {
        resultDiv.innerText = `🐂 ${result.bulls}  🐄 ${result.cows}`;
    } else {
        if (result.bulls === 0 && result.cows === 0) {
            resultDiv.innerText = "❌";
        } else {
            let str = "";
            if (result.bulls > 0) str += "🐂".repeat(result.bulls) + " ";
            if (result.cows > 0) str += "🐄".repeat(result.cows);
            resultDiv.innerText = str.trim();
        }
    }

    row.appendChild(lettersDiv);
    row.appendChild(resultDiv);
    history.appendChild(row);

    guessInput.value = "";

    if (result.bulls === wordLength) {
        winMessage.innerText = "🎉 Победа! Слово: " + secretWord;
        endGame();
        return;
    }

    if (attempts >= maxAttempts) {
        winMessage.innerText = "❌ Попытки закончились. Слово было: " + secretWord;
        endGame();
    }
}

function surrender() {
    if (gameOver) return;
    winMessage.innerText = "Вы сдались. Слово было: " + secretWord;
    endGame();
}

function endGame() {
    gameOver = true;
    guessInput.disabled = true;
    checkBtn.disabled = true;
    surrenderBtn.disabled = true;
}

function restartGame() {
    modeSelection.classList.remove("hidden");
    gameArea.classList.add("hidden");
    info.innerText = "";
}

guessInput.addEventListener("keydown", e => {
    if (e.key === "Enter") checkGuess();
});

loadDictionaries();

</script>
</body>
</html>
