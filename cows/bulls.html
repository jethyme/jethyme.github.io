<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardcore Solver v2</title>
<style>
body{ font-family:sans-serif; background:#1e1e2f; color:white; text-align:center; margin:0; padding:10px;}
.container{ max-width:520px; margin:auto; background:#2f2f4f; padding:20px; border-radius:20px;}
.solution{ display:flex; justify-content:center; gap:5px; margin-bottom:10px;}
.cell{ width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:#444; border-radius:6px; font-weight:bold;}
.cell.green{background:#4caf50}
.alphabet{ display:grid; grid-template-columns:repeat(11,1fr); gap:4px; margin-top:10px;}
.letter{ padding:6px; border-radius:5px; background:#444; font-weight:bold; }
.gray{background:#555; opacity:0.4}
.green{background:#4caf50}
.yellow{background:#f9a825}
.row{ display:flex; gap:6px; margin-top:10px;}
.row input{flex:1}
button{ margin-top:10px; padding:10px; border:none; border-radius:10px; background:#5865f2; color:white; cursor:pointer;}
input{ padding:10px; border-radius:10px; border:none; text-align:center;}
.hidden{display:none}
.word-entry{ display:flex; align-items:center; gap:8px; justify-content:center; margin-top:5px;}
.word-entry button{ padding:2px 6px; font-size:12px; background:#f44336;}
.error{ color:#ff6b6b; font-size:14px; margin-top:5px; text-align:center; }
@media(max-width:600px){ .row{flex-direction:column} button{width:100%} }
</style>
</head>
<body>
<div class="container">
<h2>🧠 Hardcore Solver v2</h2>
<div id="start">
<input id="len" type="number" placeholder="Длина слова">
<button onclick="start()">Старт</button>
</div>

<div id="game" class="hidden">
<div id="solution" class="solution"></div>

<div class="row">
<input id="word" placeholder="Слово">
</div>

<div class="row">
<input id="bulls" type="number" placeholder="🐂">
<input id="cows" type="number" placeholder="🐄">
</div>

<button onclick="add()">Добавить</button>
<button onclick="hint()">💡 Подсказка</button>
<button onclick="restart()">🔄 Новая игра</button>

<div id="error" class="error hidden"></div>
<div id="alphabet" class="alphabet"></div>
<div id="history"></div>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const alphabet="абвгдеёжзийклмнопрстуфхцчшщьыъэюя".split("");
let length=0, attempts=[], usedHints=[], excluded=new Set(), present=new Set(), correct=[], words=[];

const solution=document.getElementById("solution");
const alphabetDiv=document.getElementById("alphabet");
const history=document.getElementById("history");
const wordInput=document.getElementById("word");
const bullsInput=document.getElementById("bulls");
const cowsInput=document.getElementById("cows");
const lenInput=document.getElementById("len");
const errorDiv=document.getElementById("error");

// Загрузка слов
async function loadWords(){
    const r=await fetch("singular.txt");
    words=(await r.text()).split("\n").map(x=>x.trim().toLowerCase()).filter(Boolean);
}
loadWords();

function showError(msg){
    errorDiv.innerText=msg;
    errorDiv.classList.remove("hidden");
    wordInput.classList.add("input-error");
    wordInput.classList.remove("shake");
    void wordInput.offsetWidth;
    wordInput.classList.add("shake");
}

function clearError(){
    errorDiv.classList.add("hidden");
    wordInput.classList.remove("input-error");
}

window.start=function(){
    length=parseInt(lenInput.value);
    if(!length){ showError("Введите длину слова"); return; }
    document.getElementById("start").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    correct=Array(length).fill(null);
    buildSolution();
    renderAlphabet();
}

function buildSolution(){
    solution.innerHTML="";
    for(let i=0;i<length;i++){
        const d=document.createElement("div");
        d.className="cell";
        d.innerText="_";
        solution.appendChild(d);
    }
}

function updateSolution(){
    [...solution.children].forEach((c,i)=>{
        if(correct[i]){
            c.innerText=correct[i];
            c.classList.add("green");
        } else{
            c.innerText="_";
            c.classList.remove("green");
        }
    });
}

// Пересчет логики
function recalc(){
    excluded.clear(); present.clear(); correct=Array(length).fill(null);

    // 1. Найти точно отсутствующие буквы
    for(let a of attempts){
        if(a.b===0 && a.c===0){
            for(let ch of a.w) excluded.add(ch);
        }
    }

    // 2. Проходим по каждой позиции для быков
    for(let pos=0; pos<length; pos++){
        const candidates = attempts.filter(a=>a.b>0 || a.c>0).map(a=>a.w[pos]);
        const filtered = candidates.filter(c=>!excluded.has(c));
        const unique = [...new Set(filtered)];
        if(unique.length===1){
            // Если только одна буква возможна здесь → точно бык
            correct[pos]=unique[0];
        }
    }

    // 3. Определяем буквы, которые точно есть где-то в слове
    for(let a of attempts){
        if(a.b+a.c>0){
            for(let ch of a.w){
                if(!excluded.has(ch) && !correct.includes(ch)) present.add(ch);
            }
        }
    }

    updateSolution();
    renderAlphabet();
    renderHistory();
}

window.add=function(){
    let w=wordInput.value.trim().toLowerCase();
    let b=parseInt(bullsInput.value)||0;
    let c=parseInt(cowsInput.value)||0;
    if(w.length!==length){ showError("Неверная длина"); return; }
    clearError();
    attempts.push({w,b,c});
    recalc();
    wordInput.value=""; bullsInput.value=""; cowsInput.value="";
}

function renderHistory(){
    history.innerHTML="";
    attempts.forEach((a,i)=>{
        let s="";
        if(a.b===0 && a.c===0){ s=a.w+" ❌"; }
        else{ s=a.w; if(a.b>0) s+=` 🐂${a.b}`; if(a.c>0) s+=` 🐄${a.c}`; }
        let div=document.createElement("div");
        div.className="word-entry";
        let text=document.createElement("span"); text.innerText=s;
        let btn=document.createElement("button"); btn.innerText="✖";
        btn.onclick=()=>{ attempts.splice(i,1); recalc(); }
        div.appendChild(text); div.appendChild(btn);
        history.appendChild(div);
    });
}

function renderAlphabet(){
    alphabetDiv.innerHTML="";
    alphabet.forEach(l=>{
        const d=document.createElement("div");
        d.className="letter";
        if(excluded.has(l)) d.classList.add("gray");
        else if(correct.includes(l)) d.classList.add("green");
        else if(present.has(l)) d.classList.add("yellow");
        d.innerText=l;
        alphabetDiv.appendChild(d);
    });
}

function fits(word){
    if(word.length!==length) return false;
    for(let i=0;i<length;i++) if(correct[i] && word[i]!==correct[i]) return false;
    for(let l of excluded) if(word.includes(l)) return false;
    return true;
}

window.hint=function(){
    clearError();
    let candidates=words.filter(w=>fits(w) && !usedHints.includes(w));
    if(!candidates.length){ showError("Нет вариантов"); return; }
    let best=candidates[0]; let bestScore=-1;
    candidates.forEach(w=>{
        let score=0;
        for(let l of w) if(present.has(l) || correct.includes(l)) score++;
        if(score>bestScore){ bestScore=score; best=w; }
    });
    wordInput.value=best;
    usedHints.push(best);
}

window.restart=function(){ location.reload(); }

});
</script>
</body>
</html>
