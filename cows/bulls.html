<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐂 Табун 🐂</title>
<style>
body{ font-family:sans-serif; background:#1e1e2f; color:white; text-align:center; margin:0; padding:10px;}
.container{ max-width:520px; margin:auto; background:#2f2f4f; padding:20px; border-radius:20px;}
.solution{ display:flex; justify-content:center; gap:5px; margin-bottom:10px; flex-wrap:wrap;}
.cell-input{ width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:#444; border-radius:6px; font-weight:bold; font-size:20px; text-align:center; border:none; color:white; font-family:monospace; cursor:pointer; transition:0.1s; }
.cell-input:focus{ outline:2px solid #5865f2; background:#555; }
.cell-input.green{ background:#4caf50; cursor:default; }
.cell-input.red{ background:#f44336; }
.alphabet{ display:grid; grid-template-columns:repeat(11,1fr); gap:4px; margin-top:10px;}
.letter{ padding:6px; border-radius:5px; background:#5865f2; font-weight:bold; transition:0.1s; cursor:pointer; text-align:center;}
.letter:hover{ filter:brightness(0.9); }
.gray{background:#555; opacity:0.4}
.green{background:#4caf50}
.yellow{background:#f9a825}
.red{background:#f44336}
.row{ display:flex; gap:6px; margin-top:10px;}
.row input{flex:1}
button{ margin-top:10px; padding:10px; border:none; border-radius:10px; background:#5865f2; color:white; cursor:pointer;}
button:hover{ filter:brightness(0.9); }
input{ padding:10px; border-radius:10px; border:none; text-align:center;}
.hidden{display:none}
.word-entry{ display:flex; align-items:center; gap:8px; justify-content:center; margin-top:5px;}
.word-entry button{ padding:2px 6px; font-size:12px; background:#f44336;}
.error{ color:#ff6b6b; font-size:14px; margin-top:5px; text-align:center; }
.loading{ color:#aaa; font-size:14px; margin-top:5px;}
@media(max-width:600px){ .row{flex-direction:column} button{width:100%} }
</style>
</head>
<body>
<div class="container">
<h2>🐂 Табун 🐂</h2>
<div id="start">
<input id="len" type="number" placeholder="Длина слова">
<button onclick="start()">Старт</button>
<div id="loadStatus" class="loading">📚 Загрузка словаря...</div>
</div>

<div id="game" class="hidden">
<div id="solution" class="solution"></div>

<div class="row">
<input id="word" placeholder="Слово для проверки">
</div>

<div class="row">
<input id="bulls" type="number" placeholder="🐂">
<input id="cows" type="number" placeholder="🐄">
</div>

<button onclick="add()">➕ Добавить</button>
<button onclick="hint()">💡 Подсказка</button>
<button onclick="restart()">🔄 Новая игра</button>

<div id="error" class="error hidden"></div>
<div id="alphabet" class="alphabet"></div>
<div id="history"></div>
</div>
</div>

<script>
// ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -------------------
const alphabet = "абвгдеёжзийклмнопрстуфхцчшщьыъэюя".split("");
let dictionary = [];
let length = 0;
let attempts = [];            // { w, b, c }
let usedHints = [];

// Результаты анализа
let correct = [];             // точные позиции (зелёные)
let present = new Set();      // буквы, которые точно есть (жёлтые)
let excluded = new Set();     // буквы, которых нет (серые)
let redLetters = new Set();   // буквы, отмеченные красным (предполагаемые)
let redPositions = [];        // массив с красными буквами на конкретных позициях

// DOM
const solutionDiv = document.getElementById("solution");
const alphabetDiv = document.getElementById("alphabet");
const historyDiv = document.getElementById("history");
const wordInput = document.getElementById("word");
const bullsInput = document.getElementById("bulls");
const cowsInput = document.getElementById("cows");
const lenInput = document.getElementById("len");
const errorDiv = document.getElementById("error");
const gameDiv = document.getElementById("game");
const startDiv = document.getElementById("start");
const loadStatusSpan = document.getElementById("loadStatus");

// ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -------------------
function showError(msg) {
    errorDiv.innerText = msg;
    errorDiv.classList.remove("hidden");
    wordInput.classList.add("input-error");
    wordInput.classList.remove("shake");
    void wordInput.offsetWidth;
    wordInput.classList.add("shake");
}

function clearError() {
    errorDiv.classList.add("hidden");
    wordInput.classList.remove("input-error");
}

// Подсчёт быков и коров между двумя словами
function getBullsCows(guess, target) {
    let bulls = 0, cows = 0;
    let g = guess.split('');
    let t = target.split('');
    for (let i = 0; i < length; i++) {
        if (g[i] === t[i]) {
            bulls++;
            g[i] = t[i] = null;
        }
    }
    for (let i = 0; i < length; i++) {
        if (g[i] !== null) {
            let idx = t.indexOf(g[i]);
            if (idx !== -1) {
                cows++;
                t[idx] = null;
            }
        }
    }
    return { bulls, cows };
}

// Проверка соответствия слова всем ограничениям
function wordMatches(word) {
    if (word.length !== length) return false;
    for (let a of attempts) {
        const { bulls, cows } = getBullsCows(a.w, word);
        if (bulls !== a.b || cows !== a.c) return false;
    }
    for (let i = 0; i < length; i++) {
        if (redPositions[i] && word[i] !== redPositions[i]) return false;
    }
    for (let ch of redLetters) {
        if (!word.includes(ch)) return false;
    }
    return true;
}

// Установка красной позиции
function setRedPosition(pos, letter) {
    if (correct[pos]) return; // зелёные нельзя менять
    
    const oldLetter = redPositions[pos];
    if (oldLetter === letter) return;
    
    if (letter && /^[а-яё]$/.test(letter)) {
        redPositions[pos] = letter;
        redLetters.add(letter);
        excluded.delete(letter);
        // Если старая буква больше нигде не используется как красная позиция, убираем из redLetters
        if (oldLetter && !redPositions.includes(oldLetter)) {
            redLetters.delete(oldLetter);
        }
    } else if (letter === "") {
        // Удаляем
        redPositions[pos] = null;
        if (oldLetter && !redPositions.includes(oldLetter)) {
            redLetters.delete(oldLetter);
        }
    }
    recalc();
}

// ------------------- ОСНОВНАЯ ЛОГИКА -------------------
function recalc() {
    // 1. Исключённые буквы из попыток с 0 быков и 0 коров
    excluded.clear();
    for (let a of attempts) {
        if (a.b === 0 && a.c === 0) {
            for (let ch of a.w) excluded.add(ch);
        }
    }

    // 2. Определяем зелёные позиции
    correct = Array(length).fill(null);

    for (let a of attempts) {
        if (a.b === length) {
            for (let i = 0; i < length; i++) correct[i] = a.w[i];
            break;
        }
    }

    let changed;
    do {
        changed = false;
        for (let a of attempts) {
            if (a.b !== 1 || a.c !== 0) continue;
            let candidatePos = -1;
            let candidateLetter = '';
            for (let i = 0; i < length; i++) {
                let ch = a.w[i];
                if (correct[i] !== null) continue;
                if (excluded.has(ch)) continue;
                if (candidatePos !== -1) { candidatePos = -2; break; }
                candidatePos = i;
                candidateLetter = ch;
            }
            if (candidatePos >= 0 && candidatePos !== -2 && correct[candidatePos] === null) {
                correct[candidatePos] = candidateLetter;
                changed = true;
            }
        }
    } while (changed);

    const allGreen = correct.every(c => c !== null);
    if (allGreen) {
        present.clear();
        const greenSet = new Set(correct);
        for (let ch of alphabet) {
            if (!greenSet.has(ch)) excluded.add(ch);
        }
    } else {
        for (let a of attempts) {
            if (a.c !== 0) continue;
            if (a.b === 0) continue;
            let covered = 0;
            for (let i = 0; i < length; i++) {
                if (correct[i] !== null && correct[i] === a.w[i]) covered++;
            }
            if (covered === a.b) {
                for (let i = 0; i < length; i++) {
                    let ch = a.w[i];
                    if (correct.includes(ch)) continue;
                    excluded.add(ch);
                }
            }
        }

        present.clear();
        for (let a of attempts) {
            if (a.b + a.c === 0) continue;
            for (let ch of a.w) {
                if (!excluded.has(ch) && !correct.includes(ch)) present.add(ch);
            }
        }
    }

    // Убираем красные буквы, которые оказались исключены или стали зелёными
    for (let ch of redLetters) {
        if (excluded.has(ch) || correct.includes(ch)) {
            redLetters.delete(ch);
        }
    }
    for (let i = 0; i < length; i++) {
        if (redPositions[i]) {
            if (excluded.has(redPositions[i]) || correct[i]) {
                redPositions[i] = null;
            }
        }
    }

    let hasError = false;
    for (let a of attempts) {
        if (a.b + a.c === 0) continue;
        let possibleBulls = 0;
        for (let i = 0; i < length; i++) {
            if (correct[i] && a.w[i] === correct[i]) possibleBulls++;
        }
        if (possibleBulls > a.b) {
            showError(`⚠️ Внимание: в слове "${a.w}" быков ${a.b}, но уже известно ${possibleBulls} точных позиций.`);
            hasError = true;
            break;
        }
        let presentInWord = 0;
        for (let ch of a.w) {
            if (present.has(ch) || correct.includes(ch)) presentInWord++;
        }
        if (a.c > presentInWord - possibleBulls) {
            showError(`⚠️ Внимание: в слове "${a.w}" коров ${a.c}, но недостаточно неподтверждённых букв.`);
            hasError = true;
            break;
        }
    }
    if (!hasError) clearError();

    updateSolution();
    renderAlphabet();
    renderHistory();
}

// ------------------- ОТРИСОВКА -------------------
function buildSolution() {
    solutionDiv.innerHTML = "";
    for (let i = 0; i < length; i++) {
        const input = document.createElement("input");
        input.type = "text";
        input.maxLength = 1;
        input.className = "cell-input";
        input.value = "";
        input.dataset.pos = i;
        
        input.onkeydown = (e) => {
            // Разрешаем backspace, delete, стрелки
            if (e.key === "Backspace" || e.key === "Delete" || e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "Tab") {
                // Обрабатываем позже
                return;
            }
            // Если это буква
            if (/^[а-яё]$/i.test(e.key)) {
                e.preventDefault();
                const letter = e.key.toLowerCase();
                if (correct[i]) return; // зелёные нельзя менять
                setRedPosition(i, letter);
                // Автоматический переход к следующей ячейке
                const nextInput = solutionDiv.children[i + 1];
                if (nextInput && !correct[i + 1]) {
                    nextInput.focus();
                }
            }
        };
        
        input.onkeyup = (e) => {
            if (e.key === "Backspace" || e.key === "Delete") {
                if (correct[i]) return;
                setRedPosition(i, "");
                // Переход к предыдущей ячейке при Backspace
                if (e.key === "Backspace" && !redPositions[i]) {
                    const prevInput = solutionDiv.children[i - 1];
                    if (prevInput && !correct[i - 1]) {
                        prevInput.focus();
                    }
                }
            }
        };
        
        input.onfocus = () => {
            input.select();
        };
        
        solutionDiv.appendChild(input);
    }
}

function updateSolution() {
    const inputs = [...solutionDiv.querySelectorAll(".cell-input")];
    for (let i = 0; i < length; i++) {
        if (correct[i]) {
            inputs[i].value = correct[i];
            inputs[i].classList.add("green");
            inputs[i].classList.remove("red");
            inputs[i].readOnly = true;
        } else if (redPositions[i]) {
            inputs[i].value = redPositions[i];
            inputs[i].classList.add("red");
            inputs[i].classList.remove("green");
            inputs[i].readOnly = false;
        } else {
            inputs[i].value = "";
            inputs[i].classList.remove("green");
            inputs[i].classList.remove("red");
            inputs[i].readOnly = false;
        }
    }
}

function renderAlphabet() {
    alphabetDiv.innerHTML = "";
    for (let ch of alphabet) {
        const div = document.createElement("div");
        div.className = "letter";
        if (correct.includes(ch)) {
            div.classList.add("green");
        } else if (redLetters.has(ch)) {
            div.classList.add("red");
        } else if (present.has(ch)) {
            div.classList.add("yellow");
        } else if (excluded.has(ch)) {
            div.classList.add("gray");
        }
        div.innerText = ch;
        div.onclick = () => toggleRedLetter(ch);
        alphabetDiv.appendChild(div);
    }
}

function toggleRedLetter(ch) {
    if (correct.includes(ch)) return;
    
    if (redLetters.has(ch)) {
        redLetters.delete(ch);
        // Удаляем эту букву из всех красных позиций
        for (let i = 0; i < length; i++) {
            if (redPositions[i] === ch) {
                redPositions[i] = null;
            }
        }
    } else {
        redLetters.add(ch);
        excluded.delete(ch);
    }
    recalc();
}

function renderHistory() {
    historyDiv.innerHTML = "";
    for (let i = 0; i < attempts.length; i++) {
        const a = attempts[i];
        let text = a.w;
        if (a.b === 0 && a.c === 0) {
            text += " ❌";
        } else {
            if (a.b > 0) text += ` 🐂${a.b}`;
            if (a.c > 0) text += ` 🐄${a.c}`;
        }
        const div = document.createElement("div");
        div.className = "word-entry";
        const span = document.createElement("span");
        span.innerText = text;
        const delBtn = document.createElement("button");
        delBtn.innerText = "✖";
        delBtn.onclick = () => {
            attempts.splice(i, 1);
            recalc();
        };
        div.appendChild(span);
        div.appendChild(delBtn);
        historyDiv.appendChild(div);
    }
}

// ------------------- ДЕЙСТВИЯ ПОЛЬЗОВАТЕЛЯ -------------------
window.start = function() {
    const val = parseInt(lenInput.value);
    if (!val || val < 1 || val > 20) {
        showError("Введите длину слова от 1 до 20");
        return;
    }
    length = val;
    attempts = [];
    usedHints = [];
    correct = Array(length).fill(null);
    present.clear();
    excluded.clear();
    redLetters.clear();
    redPositions = Array(length).fill(null);

    startDiv.classList.add("hidden");
    gameDiv.classList.remove("hidden");
    buildSolution();
    recalc();
};

window.add = function() {
    if (!length) return;
    let w = wordInput.value.trim().toLowerCase();
    let b = parseInt(bullsInput.value) || 0;
    let c = parseInt(cowsInput.value) || 0;

    if (w.length !== length) {
        showError(`Слово должно быть длиной ${length} букв`);
        return;
    }
    if (!/^[а-яё]+$/.test(w)) {
        showError("Используйте только русские буквы");
        return;
    }
    if (b + c > length) {
        showError("Сумма быков и коров не может превышать длину слова");
        return;
    }

    clearError();
    attempts.push({ w, b, c });
    wordInput.value = "";
    bullsInput.value = "";
    cowsInput.value = "";
    recalc();
};

window.hint = function() {
    clearError();
    if (!dictionary.length) {
        showError("Словарь ещё не загружен, подсказка недоступна");
        return;
    }
    
    let candidates = dictionary.filter(word => wordMatches(word));
    
    if (candidates.length === 0) {
        showError("Нет подходящих слов в словаре");
        return;
    }
    
    candidates = candidates.filter(w => !usedHints.includes(w));
    if (candidates.length === 0) {
        candidates = dictionary.filter(word => wordMatches(word));
    }
    
    if (candidates.length === 0) {
        showError("Нет новых вариантов для подсказки");
        return;
    }
    
    const randomWord = candidates[Math.floor(Math.random() * candidates.length)];
    wordInput.value = randomWord;
    usedHints.push(randomWord);
};

window.restart = function() {
    location.reload();
};

// ------------------- ЗАГРУЗКА СЛОВАРЯ -------------------
async function loadDictionary() {
    try {
        loadStatusSpan.innerText = "📥 Загрузка словаря...";
        const response = await fetch("singular.txt");
        if (!response.ok) throw new Error("Файл singular.txt не найден");
        const text = await response.text();
        dictionary = text.split("\n")
            .map(line => line.trim().toLowerCase())
            .filter(word => /^[а-яё]+$/.test(word) && word.length >= 3 && word.length <= 12);
        loadStatusSpan.innerText = `✅ Загружено ${dictionary.length} слов`;
    } catch (err) {
        console.error(err);
        loadStatusSpan.innerText = "❌ Ошибка загрузки словаря. Подсказка будет недоступна.";
        loadStatusSpan.style.color = "#ff6b6b";
    }
}

loadDictionary();
</script>
</body>
</html>
