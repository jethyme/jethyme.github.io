<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐂 Табун 🐂</title>

<style>
body{
    font-family:sans-serif;
    background:#1e1e2f;
    color:white;
    text-align:center;
    margin:0;
    padding:10px;
}

.container{
    max-width:520px;
    margin:auto;
    background:#2f2f4f;
    padding:20px;
    border-radius:20px;
}

/* строка слова */
.solution{
    display:flex;
    justify-content:center;
    gap:5px;
    margin-bottom:10px;
}

.cell{
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#444;
    border-radius:6px;
    font-weight:bold;
}

.cell.green{background:#4caf50}

/* алфавит */
.alphabet{
    display:grid;
    grid-template-columns:repeat(11,1fr);
    gap:4px;
    margin-top:10px;
}

.letter{
    padding:6px;
    border-radius:5px;
    background:#444;
    font-weight:bold;
}

.gray{background:#555;opacity:0.4}
.yellow{background:#c9a227}
.green{background:#4caf50}

/* ввод */
.row{
    display:flex;
    gap:6px;
    margin-top:10px;
}

.row input{flex:1}

button{
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#5865f2;
    color:white;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
}

.hidden{display:none}

@media(max-width:600px){
    .row{flex-direction:column}
    button{width:100%}
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Hardcore Solver</h2>

<div id="start">
<input id="len" type="number" placeholder="Длина">
<button onclick="start()">Старт</button>
</div>

<div id="game" class="hidden">

<div id="solution" class="solution"></div>

<div class="row">
<input id="word" placeholder="Слово">
</div>

<div class="row">
<input id="bulls" type="number" placeholder="🐂">
<input id="cows" type="number" placeholder="🐄">
</div>

<button onclick="add()">Добавить</button>
<button onclick="hint()">💡 Подсказка</button>
<button onclick="restart()">🔄 Новая игра</button>

<div id="alphabet" class="alphabet"></div>
<div id="history"></div>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

const alphabet="абвгдеёжзийклмнопрстуфхцчшщьыъэюя".split("");
let length=0;
let attempts=[];
let words=[];
let usedHints=[];
let excluded=new Set(); // буквы, которых нет
let present=new Set();  // буквы есть
let correct=[];         // точные позиции
let solution=document.getElementById("solution");
let alphabetDiv=document.getElementById("alphabet");
let history=document.getElementById("history");
let wordInput=document.getElementById("word");
let bullsInput=document.getElementById("bulls");
let cowsInput=document.getElementById("cows");
let lenInput=document.getElementById("len");

// загружаем словарь для подсказок
async function loadWords(){
    const r=await fetch("singular.txt");
    words=(await r.text()).split("\n").map(x=>x.trim().toLowerCase());
}
loadWords();

window.start=function(){
    length=parseInt(lenInput.value);
    if(!length)return;
    document.getElementById("start").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    correct=Array(length).fill(null);
    buildSolution();
    renderAlphabet();
}

function buildSolution(){
    solution.innerHTML="";
    for(let i=0;i<length;i++){
        const d=document.createElement("div");
        d.className="cell";
        d.innerText="_";
        solution.appendChild(d);
    }
}

function updateSolution(){
    [...solution.children].forEach((c,i)=>{
        if(correct[i]){
            c.innerText=correct[i];
            c.classList.add("green");
        }
    });
}

window.add=function(){
    let w=wordInput.value.trim().toLowerCase();
    let b=parseInt(bullsInput.value)||0;
    let c=parseInt(cowsInput.value)||0;
    if(w.length!==length) return alert("Неверная длина слова");

    attempts.push({w,b,c});

    // анализ букв
    // 1. подсчет букв в попытке
    let letterCount={};
    for(let l of w) letterCount[l]=(letterCount[l]||0)+1;

    // 2. фиксируем быков
    let tempB=b;
    for(let i=0;i<length;i++){
        if(tempB>0 && !correct[i]){
            // если буква ещё не зафиксирована, ставим быка
            correct[i]=w[i];
            present.add(w[i]);
            tempB--;
        }
    }

    // 3. коровы: буквы есть в слове, но на другой позиции
    let tempC=c;
    for(let i=0;i<length;i++){
        if(correct[i]===w[i]) continue;
        if(tempC>0){
            present.add(w[i]);
            tempC--;
        }else{
            excluded.add(w[i]);
        }
    }

    // 4. буквы, которых нет
    w.split("").forEach(l=>{
        if(!present.has(l)) excluded.add(l);
    });

    renderAlphabet();
    renderHistory();
    updateSolution();

    wordInput.value="";
    bullsInput.value="";
    cowsInput.value="";
}

function renderHistory(){
    history.innerHTML="";
    attempts.forEach(a=>{
        const d=document.createElement("div");
        d.innerText=`${a.w} → 🐂${a.b} 🐄${a.c}`;
        history.appendChild(d);
    });
}

function renderAlphabet(){
    alphabetDiv.innerHTML="";
    alphabet.forEach(l=>{
        const d=document.createElement("div");
        d.className="letter";
        if(excluded.has(l)) d.classList.add("gray");
        else if(correct.includes(l)) d.classList.add("green");
        else if(present.has(l)) d.classList.add("yellow");
        d.innerText=l;
        alphabetDiv.appendChild(d);
    });
}

function fits(word){
    if(word.length!==length) return false;
    for(let l of word){
        if(excluded.has(l)) return false;
    }
    for(let i=0;i<length;i++){
        if(correct[i] && word[i]!==correct[i]) return false;
    }
    return true;
}

window.hint=function(){
    const candidates=words.filter(w=>fits(w) && !usedHints.includes(w));
    if(!candidates.length) return alert("Подсказок больше нет");
    // частотная оценка
    let freq={};
    candidates.forEach(w=>{
        new Set(w).forEach(l=>freq[l]=(freq[l]||0)+1);
    });
    let best=null;
    let score=-1;
    candidates.forEach(w=>{
        let s=0;
        new Set(w).forEach(l=>s+=freq[l]||0);
        if(s>score){score=s;best=w;}
    });
    if(best){
        wordInput.value=best;
        usedHints.push(best);
    }
}

window.restart=function(){
    location.reload();
}

});
</script>

</body>
</html>
