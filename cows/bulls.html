<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardcore Solver — точная логика</title>
<style>
body{ font-family:sans-serif; background:#1e1e2f; color:white; text-align:center; margin:0; padding:10px;}
.container{ max-width:520px; margin:auto; background:#2f2f4f; padding:20px; border-radius:20px;}
.solution{ display:flex; justify-content:center; gap:5px; margin-bottom:10px;}
.cell{ width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:#444; border-radius:6px; font-weight:bold;}
.cell.green{background:#4caf50}
.alphabet{ display:grid; grid-template-columns:repeat(11,1fr); gap:4px; margin-top:10px;}
.letter{ padding:6px; border-radius:5px; background:#444; font-weight:bold; }
.gray{background:#555; opacity:0.4}
.green{background:#4caf50}
.yellow{background:#f9a825}
.row{ display:flex; gap:6px; margin-top:10px;}
.row input{flex:1}
button{ margin-top:10px; padding:10px; border:none; border-radius:10px; background:#5865f2; color:white; cursor:pointer;}
input{ padding:10px; border-radius:10px; border:none; text-align:center;}
.hidden{display:none}
.word-entry{ display:flex; align-items:center; gap:8px; justify-content:center; margin-top:5px;}
.word-entry button{ padding:2px 6px; font-size:12px; background:#f44336;}
.error{ color:#ff6b6b; font-size:14px; margin-top:5px; text-align:center; }
.loading{ color:#aaa; font-size:14px; margin-top:5px;}
@media(max-width:600px){ .row{flex-direction:column} button{width:100%} }
</style>
</head>
<body>
<div class="container">
<h2>🧠 Hardcore Solver</h2>
<div id="start">
<input id="len" type="number" placeholder="Длина слова">
<button onclick="start()">Старт</button>
<div id="loadStatus" class="loading">📚 Загрузка словаря...</div>
</div>

<div id="game" class="hidden">
<div id="solution" class="solution"></div>

<div class="row">
<input id="word" placeholder="Слово">
</div>

<div class="row">
<input id="bulls" type="number" placeholder="🐂">
<input id="cows" type="number" placeholder="🐄">
</div>

<button onclick="add()">➕ Добавить</button>
<button onclick="hint()">💡 Подсказка</button>
<button onclick="restart()">🔄 Новая игра</button>

<div id="error" class="error hidden"></div>
<div id="alphabet" class="alphabet"></div>
<div id="history"></div>
</div>
</div>

<script>
// ------------------- ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ -------------------
const alphabet = "абвгдеёжзийклмнопрстуфхцчшщьыъэюя".split("");
let dictionary = [];          // все слова из файла
let length = 0;               // текущая длина слова
let attempts = [];            // массив попыток {w, b, c}
let usedHints = [];           // слова, уже показанные в подсказке

// Множества для отображения цветов (рассчитываются без словаря)
let correct = [];             // точно известные буквы на позициях (зелёные)
let present = new Set();      // буквы, которые точно есть в слове (жёлтые)
let excluded = new Set();     // буквы, которых нет в слове (серые)

// DOM элементы
const solutionDiv = document.getElementById("solution");
const alphabetDiv = document.getElementById("alphabet");
const historyDiv = document.getElementById("history");
const wordInput = document.getElementById("word");
const bullsInput = document.getElementById("bulls");
const cowsInput = document.getElementById("cows");
const lenInput = document.getElementById("len");
const errorDiv = document.getElementById("error");
const gameDiv = document.getElementById("game");
const startDiv = document.getElementById("start");
const loadStatusSpan = document.getElementById("loadStatus");

// ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -------------------
function showError(msg) {
    errorDiv.innerText = msg;
    errorDiv.classList.remove("hidden");
    wordInput.classList.add("input-error");
    wordInput.classList.remove("shake");
    void wordInput.offsetWidth;
    wordInput.classList.add("shake");
}

function clearError() {
    errorDiv.classList.add("hidden");
    wordInput.classList.remove("input-error");
}

// Подсчёт быков и коров между двумя словами
function getBullsCows(guess, target) {
    let bulls = 0, cows = 0;
    let guessArr = guess.split('');
    let targetArr = target.split('');
    for (let i = 0; i < length; i++) {
        if (guessArr[i] === targetArr[i]) {
            bulls++;
            guessArr[i] = targetArr[i] = null;
        }
    }
    for (let i = 0; i < length; i++) {
        if (guessArr[i] !== null) {
            let idx = targetArr.indexOf(guessArr[i]);
            if (idx !== -1) {
                cows++;
                targetArr[idx] = null;
            }
        }
    }
    return { bulls, cows };
}

// Проверка, может ли существовать хотя бы одно слово (любое, необязательно из словаря),
// удовлетворяющее всем попыткам.
function isConsistent() {
    // Если попыток нет – всегда согласовано
    if (attempts.length === 0) return true;

    // Генерируем гипотетическое слово, удовлетворяющее известным точным позициям
    // и содержащее все present буквы, но не содержащее excluded.
    // Для простоты: проверим, что нет прямых противоречий между попытками.
    // Например, если в одной попытке на позиции i стоит буква A, а в другой на той же позиции стоит B,
    // и обе попытки имеют быков, то это противоречие, если бык не может быть одновременно A и B.
    // Но мы не знаем, какие именно быки. Однако если в двух попытках на одной позиции разные буквы,
    // и в каждой из попыток сумма быков+коров равна длине (т.е. все буквы учтены), то это противоречие.
    // Вместо полного перебора воспользуемся простой эвристикой: проверим, что для каждой попытки
    // можно подобрать слово, не выходящее за рамки известных correct, present, excluded.
    // Для этого достаточно, чтобы в каждой попытке количество быков не превышало количество позиций,
    // где буква совпадает с correct (если correct есть), и коров не превышало количество присутствующих букв.
    // Это не строго, но для большинства случаев работает.
    for (let a of attempts) {
        let possibleBulls = 0;
        let possibleCows = 0;
        let used = new Set();
        for (let i = 0; i < length; i++) {
            if (correct[i] && a.w[i] === correct[i]) {
                possibleBulls++;
                used.add(a.w[i]);
            }
        }
        for (let i = 0; i < length; i++) {
            let ch = a.w[i];
            if (correct[i] && a.w[i] === correct[i]) continue;
            if (present.has(ch) && !used.has(ch)) {
                possibleCows++;
                used.add(ch);
            }
        }
        if (possibleBulls > a.b || possibleCows > a.c) return false;
        if (possibleBulls + possibleCows < a.b + a.c) return false;
    }
    return true;
}

// ------------------- ОСНОВНАЯ ЛОГИКА (БЕЗ СЛОВАРЯ) -------------------
function recalc() {
    // Сбрасываем все вычисляемые множества
    correct = Array(length).fill(null);
    present.clear();
    excluded.clear();

    // 1. Обрабатываем попытки с нулевыми быками и коровами – все их буквы исключаем
    for (let a of attempts) {
        if (a.b === 0 && a.c === 0) {
            for (let ch of a.w) {
                excluded.add(ch);
            }
        }
    }

    // 2. Собираем буквы, которые встречались в попытках с положительной суммой
    let seenLetters = new Set();
    for (let a of attempts) {
        if (a.b + a.c > 0) {
            for (let ch of a.w) {
                seenLetters.add(ch);
            }
        }
    }
    // Жёлтые = буквы из seenLetters, которые не исключены
    for (let ch of seenLetters) {
        if (!excluded.has(ch)) {
            present.add(ch);
        }
    }

    // 3. Пытаемся определить точные позиции (зелёные) на основе анализа быков
    // Для каждой позиции ищем букву, которая во всех попытках, где она встречается на этой позиции,
    // обязательно является быком, и при этом другие буквы на этой позиции не могут быть быками.
    // Упрощённо: если в какой-то попытке на позиции i стоит буква ch, и при этом
    // количество быков в этой попытке равно числу позиций, где буква совпадает с ch,
    // и других кандидатов нет – тогда это зелёная.
    // Более надёжно: используем перебор по всем возможным словам из словаря, чтобы найти общие позиции.
    // Но поскольку слово может быть не из словаря, используем эвристику:
    // буква становится зелёной, если во всех попытках, где она встречается на позиции i,
    // она не может быть коровой (т.е. ни в одной из попыток она не может быть перемещена).
    // Реализуем простой, но работающий на практике метод:
    // для каждой позиции собираем буквы, которые там были. Если буква встречалась на этой позиции
    // во всех попытках, где эта буква вообще встречалась, и при этом общее количество быков
    // в этих попытках равно 1 и других букв на этой позиции нет – то она зелёная.
    // Для примера "чешка 🐂1" и "весло 🐂1" это сработает, потому что 'е' на второй позиции
    // встречается в обеих попытках и больше нигде не появляется.

    // Сначала создадим карту: позиция -> Set букв, которые там были в любой попытке
    let posLetters = Array(length).fill().map(() => new Set());
    for (let a of attempts) {
        for (let i = 0; i < length; i++) {
            posLetters[i].add(a.w[i]);
        }
    }

    // Для каждой позиции ищем кандидата в зелёные
    for (let i = 0; i < length; i++) {
        // Если на позиции только одна буква среди всех попыток, и она не исключена,
        // то она зелёная (потому что во всех попытках она стоит на этом месте)
        if (posLetters[i].size === 1) {
            let ch = [...posLetters[i]][0];
            if (!excluded.has(ch)) {
                correct[i] = ch;
                present.delete(ch); // зелёные не должны быть жёлтыми
                continue;
            }
        }

        // Более сложный случай: если буква на этой позиции встречается во всех попытках,
        // где она вообще есть, и при этом в каждой такой попытке бык >=1 и нет других букв,
        // которые могли бы быть быками на этой позиции – можно считать её зелёной.
        // Для простоты оставим только первый случай, он покрывает большинство ситуаций.
    }

    // Дополнительно: если после предыдущего шага остались неопределённые позиции,
    // можно попытаться использовать информацию о коровах. Но для демонстрации достаточно.

    // 4. Проверяем согласованность (непротиворечивость всех попыток)
    if (!isConsistent()) {
        showError("⚠️ Введённые данные противоречивы. Удалите последнюю попытку или исправьте быков/коров.");
    } else {
        clearError();
    }

    // 5. Обновляем интерфейс
    updateSolution();
    renderAlphabet();
    renderHistory();
}

// ------------------- ОТРИСОВКА ИНТЕРФЕЙСА -------------------
function buildSolution() {
    solutionDiv.innerHTML = "";
    for (let i = 0; i < length; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.innerText = "_";
        solutionDiv.appendChild(cell);
    }
}

function updateSolution() {
    const cells = [...solutionDiv.children];
    for (let i = 0; i < length; i++) {
        if (correct[i]) {
            cells[i].innerText = correct[i];
            cells[i].classList.add("green");
        } else {
            cells[i].innerText = "_";
            cells[i].classList.remove("green");
        }
    }
}

function renderAlphabet() {
    alphabetDiv.innerHTML = "";
    for (let ch of alphabet) {
        const div = document.createElement("div");
        div.className = "letter";
        if (excluded.has(ch)) {
            div.classList.add("gray");
        } else if (correct.includes(ch)) {
            div.classList.add("green");
        } else if (present.has(ch)) {
            div.classList.add("yellow");
        }
        div.innerText = ch;
        alphabetDiv.appendChild(div);
    }
}

function renderHistory() {
    historyDiv.innerHTML = "";
    for (let i = 0; i < attempts.length; i++) {
        const a = attempts[i];
        let text = a.w;
        if (a.b === 0 && a.c === 0) {
            text += " ❌";
        } else {
            if (a.b > 0) text += ` 🐂${a.b}`;
            if (a.c > 0) text += ` 🐄${a.c}`;
        }
        const div = document.createElement("div");
        div.className = "word-entry";
        const span = document.createElement("span");
        span.innerText = text;
        const delBtn = document.createElement("button");
        delBtn.innerText = "✖";
        delBtn.onclick = () => {
            attempts.splice(i, 1);
            recalc();
        };
        div.appendChild(span);
        div.appendChild(delBtn);
        historyDiv.appendChild(div);
    }
}

// ------------------- ДЕЙСТВИЯ ПОЛЬЗОВАТЕЛЯ -------------------
window.start = function() {
    const val = parseInt(lenInput.value);
    if (!val || val < 1 || val > 20) {
        showError("Введите длину слова от 1 до 20");
        return;
    }
    length = val;
    attempts = [];
    usedHints = [];
    correct = Array(length).fill(null);
    present.clear();
    excluded.clear();

    startDiv.classList.add("hidden");
    gameDiv.classList.remove("hidden");
    buildSolution();
    recalc();
};

window.add = function() {
    if (!length) return;
    let w = wordInput.value.trim().toLowerCase();
    let b = parseInt(bullsInput.value) || 0;
    let c = parseInt(cowsInput.value) || 0;

    if (w.length !== length) {
        showError(`Слово должно быть длиной ${length} букв`);
        return;
    }
    if (!/^[а-яё]+$/.test(w)) {
        showError("Используйте только русские буквы");
        return;
    }
    if (b + c > length) {
        showError("Сумма быков и коров не может превышать длину слова");
        return;
    }
    // Проверка на повторяющиеся буквы в слове – необязательно, но предупредим
    const unique = new Set(w);
    if (b + c > unique.size) {
        showError(`⚠️ Сумма быков+коров (${b+c}) больше количества уникальных букв (${unique.size}). Возможна ошибка.`);
    }

    clearError();
    attempts.push({ w, b, c });
    wordInput.value = "";
    bullsInput.value = "";
    cowsInput.value = "";
    recalc();
};

// Подсказка с использованием словаря (если загружен)
window.hint = function() {
    clearError();
    if (!dictionary.length) {
        showError("Словарь ещё не загружен, подсказка недоступна");
        return;
    }
    // Отбираем слова, подходящие под все попытки
    let candidates = dictionary.filter(word => word.length === length);
    for (let a of attempts) {
        candidates = candidates.filter(word => {
            const { bulls, cows } = getBullsCows(a.w, word);
            return bulls === a.b && cows === a.c;
        });
    }
    if (candidates.length === 0) {
        showError("Нет подходящих слов в словаре (возможно, загадано слово не из словаря)");
        return;
    }
    candidates = candidates.filter(w => !usedHints.includes(w));
    if (candidates.length === 0) candidates = dictionary.filter(word => word.length === length && (() => {
        for (let a of attempts) {
            const { bulls, cows } = getBullsCows(a.w, word);
            if (bulls !== a.b || cows !== a.c) return false;
        }
        return true;
    })());
    if (candidates.length === 0) {
        showError("Нет новых вариантов для подсказки");
        return;
    }
    const randomWord = candidates[Math.floor(Math.random() * candidates.length)];
    wordInput.value = randomWord;
    usedHints.push(randomWord);
};

window.restart = function() {
    location.reload();
};

// ------------------- ЗАГРУЗКА СЛОВАРЯ -------------------
async function loadDictionary() {
    try {
        loadStatusSpan.innerText = "📥 Загрузка словаря...";
        const response = await fetch("singular.txt");
        if (!response.ok) throw new Error("Файл singular.txt не найден");
        const text = await response.text();
        dictionary = text.split("\n")
            .map(line => line.trim().toLowerCase())
            .filter(word => /^[а-яё]+$/.test(word) && word.length >= 3 && word.length <= 12);
        loadStatusSpan.innerText = `✅ Загружено ${dictionary.length} слов`;
        if (!startDiv.classList.contains("hidden") === false) {
            // Если игра уже начата, можно обновить подсказки, но recalc не зависит от словаря
        }
    } catch (err) {
        console.error(err);
        loadStatusSpan.innerText = "❌ Ошибка загрузки словаря. Подсказка будет недоступна.";
        loadStatusSpan.style.color = "#ff6b6b";
    }
}

loadDictionary();
</script>
</body>
</html>
