<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Решатель Быков и Коров</title>

<style>
:root { --cell-size: 42px; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    margin:0;
    padding:10px;
}

.container {
    background: #2f2f4f;
    padding: 20px;
    border-radius: 20px;
    max-width: 500px;
    margin: auto;
}

button {
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #5865f2;
    color: white;
    cursor: pointer;
}

button:hover { background: #4752c4; }

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    text-align: center;
    font-size: 16px;
}

.row {
    display:flex;
    gap:8px;
    margin-top:10px;
}

.row input {
    flex:1;
}

.full {
    width:100%;
    margin-top:10px;
}

.hidden { display:none; }

.info {
    margin-top:10px;
}

/* алфавит */
.alphabet {
    display:grid;
    grid-template-columns: repeat(11,1fr);
    gap:5px;
    margin-top:15px;
}

.letter {
    background:#3c3c5f;
    padding:8px;
    border-radius:6px;
}

.letter.disabled {
    background:#555;
    opacity:0.4;
}

/* история */
.history {
    margin-top:15px;
    text-align:left;
    font-size:14px;
}

/* ошибки */
.error {
    color:#ff6b6b;
    margin-top:5px;
}

.input-error {
    outline:2px solid #ff6b6b;
}

/* shake */
.shake { animation:shake 0.3s; }
@keyframes shake {
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
}

/* 📱 */
@media (max-width:600px){
    .row { flex-direction:column; }
    button { width:100%; }
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Решатель</h2>

<div id="startBlock">
    <input id="lengthInput" type="number" placeholder="Длина слова">
    <button class="full" onclick="start()">Начать</button>
</div>

<div id="game" class="hidden">

<div class="info">
    Слово из <b id="lenText"></b> букв
    <button onclick="restart()">Новая</button>
</div>

<div class="row">
    <input id="wordInput" placeholder="Слово">
</div>

<div class="row">
    <input id="bullsInput" type="number" placeholder="🐂">
    <input id="cowsInput" type="number" placeholder="🐄">
</div>

<button class="full" onclick="addAttempt()">Добавить</button>

<div id="error" class="error hidden"></div>

<button class="full" onclick="getHint()">💡 Подсказка</button>

<div class="alphabet" id="alphabet"></div>

<div class="history" id="history"></div>

</div>

</div>

<script>

const alphabet = "абвгдеёжзийклмнопрстуфхцчшщьыъэюя".split("");
let excluded = new Set();
let attempts = [];
let wordLength = 0;
let words = [];
let usedHints = [];

async function loadWords(){
    const r = await fetch("singular.txt");
    words = (await r.text()).split("\n").map(w=>w.trim());
}

function start(){
    wordLength = parseInt(lengthInput.value);
    if(!wordLength) return;

    document.getElementById("startBlock").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");

    lenText.innerText = wordLength;

    renderAlphabet();
}

function restart(){
    location.reload();
}

function renderAlphabet(){
    alphabetEl.innerHTML = "";
    alphabet.forEach(l=>{
        const d=document.createElement("div");
        d.className="letter";
        if(excluded.has(l)) d.classList.add("disabled");
        d.innerText=l;
        alphabetEl.appendChild(d);
    });
}

function showError(msg){
    error.innerText=msg;
    error.classList.remove("hidden");

    wordInput.classList.add("input-error");
    wordInput.classList.remove("shake");
    void wordInput.offsetWidth;
    wordInput.classList.add("shake");
}

function clearError(){
    error.classList.add("hidden");
    wordInput.classList.remove("input-error");
}

function addAttempt(){
    const word = wordInput.value.trim().toLowerCase();
    let bulls = parseInt(bullsInput.value);
    let cows = parseInt(cowsInput.value);

    if(isNaN(bulls)) bulls = 0;
    if(isNaN(cows)) cows = 0;

    if(word.length !== wordLength){
        showError("Неверная длина");
        return;
    }

    clearError();

    attempts.push({word,bulls,cows});

    if(bulls===0 && cows===0){
        word.split("").forEach(l=>excluded.add(l));
    }

    renderAlphabet();
    renderHistory();

    wordInput.value="";
    bullsInput.value="";
    cowsInput.value="";
}

function renderHistory(){
    history.innerHTML="";
    attempts.forEach(a=>{
        const d=document.createElement("div");
        d.innerText=`${a.word} → 🐂${a.bulls} 🐄${a.cows}`;
        history.appendChild(d);
    });
}

function fits(word){
    if(word.length!==wordLength) return false;

    for(let l of word){
        if(excluded.has(l)) return false;
    }

    for(let a of attempts){
        let b=0,c=0;
        let sRem=[], wRem=[];

        for(let i=0;i<word.length;i++){
            if(word[i]===a.word[i]) b++;
            else{
                sRem.push(a.word[i]);
                wRem.push(word[i]);
            }
        }

        let count={};
        sRem.forEach(x=>count[x]=(count[x]||0)+1);
        wRem.forEach(x=>{
            if(count[x]>0){ c++; count[x]--; }
        });

        if(b!==a.bulls || c!==a.cows) return false;
    }

    return true;
}

/* 🧠 УМНЫЙ ВЫБОР */
function getHint(){

    const candidates = words.filter(w=>fits(w) && !usedHints.includes(w));

    if(!candidates.length){
        error.innerText="Нет вариантов";
        error.classList.remove("hidden");
        return;
    }

    // считаем частоты букв
    let freq={};
    candidates.forEach(w=>{
        new Set(w).forEach(l=>{
            freq[l]=(freq[l]||0)+1;
        });
    });

    // оцениваем слова
    let bestWord=null;
    let bestScore=-1;

    candidates.forEach(w=>{
        let score=0;
        new Set(w).forEach(l=>{
            score+=freq[l]||0;
        });

        if(score>bestScore){
            bestScore=score;
            bestWord=w;
        }
    });

    wordInput.value = bestWord;
    usedHints.push(bestWord);
}

loadWords();

</script>

</body>
</html>
