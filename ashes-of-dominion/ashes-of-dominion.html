<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="icon" href="data:,">
    <title>Ashes of Dominion — База законсервирована</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ashes of Dominion</h1>
            <div class="header-controls">
                <div id="userContainer" class="user-info" style="display: none;">
                    <div class="user-badge readonly" id="userBadge"></div>
                    <span id="userEmail"></span>
                </div>
                <div class="view-toggle">
                    <button class="btn-secondary active" onclick="setView('list')">📋</button>
                    <button class="btn-secondary" onclick="setView('kanban')">📊</button>
                    <button class="btn-secondary" onclick="setView('history')">📜</button>
                </div>
                <button class="btn-primary" id="addTaskBtn" disabled title="База законсервирована">+ Задача</button>
            </div>
        </header>

        <div class="readonly-banner">🔒 База законсервирована — только просмотр</div>

        <div class="filters">
            <div class="filter-dropdown" id="filterAssigneeContainer">
                <button class="filter-btn" onclick="toggleFilterDropdown('assignee')" id="filterAssigneeBtn">
                    👥 Исполнители <span id="filterAssigneeCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterAssigneeDropdown"></div>
            </div>
            <div class="filter-dropdown" id="filterPriorityContainer">
                <button class="filter-btn" onclick="toggleFilterDropdown('priority')" id="filterPriorityBtn">
                    ⚡ Приоритет <span id="filterPriorityCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterPriorityDropdown"></div>
            </div>
            <div class="filter-dropdown" id="filterStatusContainer">
                <button class="filter-btn" onclick="toggleFilterDropdown('status')" id="filterStatusBtn">
                    📊 Статус <span id="filterStatusCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterStatusDropdown"></div>
            </div>
            <div class="filter-dropdown history-filter-dropdown" id="filterHistoryTypeContainer" style="display:none;">
                <button class="filter-btn" onclick="toggleFilterDropdown('historyType')" id="filterHistoryTypeBtn">
                    🔄 История <span id="filterHistoryTypeCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterHistoryTypeDropdown"></div>
            </div>
            <div class="filter-dropdown history-filter-dropdown" id="filterHistoryAssigneeContainer" style="display:none;">
                <button class="filter-btn" onclick="toggleFilterDropdown('historyAssignee')" id="filterHistoryAssigneeBtn">
                    👥 Исполнители <span id="filterHistoryAssigneeCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterHistoryAssigneeDropdown"></div>
            </div>
            <div class="filter-dropdown history-filter-dropdown" id="filterHistoryPriorityContainer" style="display:none;">
                <button class="filter-btn" onclick="toggleFilterDropdown('historyPriority')" id="filterHistoryPriorityBtn">
                    ⚡ Приоритет <span id="filterHistoryPriorityCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterHistoryPriorityDropdown"></div>
            </div>
            <div class="filter-dropdown history-filter-dropdown" id="filterHistoryStatusContainer" style="display:none;">
                <button class="filter-btn" onclick="toggleFilterDropdown('historyStatus')" id="filterHistoryStatusBtn">
                    📊 Статус <span id="filterHistoryStatusCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterHistoryStatusDropdown"></div>
            </div>
            <button class="filter-reset" onclick="resetFilters()">✕ Сбросить</button>
        </div>

        <div id="taskList" class="task-list">
            <div class="task-row header">
                <span></span>
                <span>Задача</span>
                <span>Приоритет</span>
                <span>Статус</span>
                <span>Исполнители</span>
                <span>Действия</span>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div id="kanbanBoard" class="kanban-board">
            <div class="kanban-column" data-status="queue">
                <h3>📝 В очереди</h3>
                <div class="kanban-column-content" id="queueTasks"></div>
            </div>
            <div class="kanban-column" data-status="progress">
                <h3>🔄 В работе</h3>
                <div class="kanban-column-content" id="progressTasks"></div>
            </div>
            <div class="kanban-column" data-status="review">
                <h3>👀 На проверке</h3>
                <div class="kanban-column-content" id="reviewTasks"></div>
            </div>
            <div class="kanban-column" data-status="done">
                <h3>✅ Готово</h3>
                <div class="kanban-column-content" id="doneTasks"></div>
            </div>
        </div>

        <div id="historyBoard" class="history-board">
            <div class="history-header">
                <span>Дата</span>
                <span>Задача/Подзадача</span>
                <span>Изменение</span>
                <span>Статус</span>
                <span>Приоритет</span>
                <span>Исполнители</span>
                <span></span>
            </div>
            <div id="historyContainer"></div>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script src="render.js"></script>
    <script src="handlers.js"></script>
    <script src="app.js"></script>
</body>
</html>
