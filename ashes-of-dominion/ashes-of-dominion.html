            }
        }

        // List view drag-and-drop
        let listDragItem = null;
        let dropIndicator = null;

        function isDescendant(source, targetTaskId, targetSubtaskId) {
            // Проверяем, не является ли target потомком source
            if (source.type === 'task') {
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) return false;
                // Если targetSubtaskId существует, проверяем, находится ли он в дереве source
                if (targetSubtaskId) {
                    return findSubtaskById(sourceTask.subtasks, targetSubtaskId) !== null;
                }
                // Если targetTaskId === source.taskId, это тот же элемент
                return targetTaskId === source.taskId;
            }
            if (source.type === 'subtask') {
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) return false;
                const sourceSub = findSubtaskById(sourceTask.subtasks, source.subtaskId);
                if (!sourceSub) return false;
                // Проверяем, находится ли target в дереве sourceSub
                if (targetSubtaskId) {
                    return findSubtaskById(sourceSub.children || sourceSub.subtasks || [], targetSubtaskId) !== null;
                }
                return false;
            }
            return false;
        }

        async function handleDropAsSubtask(targetTaskId, targetSubtaskId) {
            const source = listDragItem;
            if (!source) return;

            const targetTask = tasks.find(t => t.id === targetTaskId);
            if (!targetTask) {
                listDragItem = null;
                return;
            }

            let sourceSubtask = null;

            // Извлекаем перетаскиваемый элемент
            if (source.type === 'task') {
                // Перетаскиваем всю задачу как подзадачу
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) {
                    listDragItem = null;
                    return;
                }
                sourceSubtask = {
                    id: sourceTask.id,
                    title: sourceTask.title,
                    priority: sourceTask.priority || 'medium',
                    status: sourceTask.status,
                    assignees: sourceTask.assignees || [],
                    color: sourceTask.color,
                    children: sourceTask.subtasks || []
                };
                // Удаляем из корня
                tasks.splice(tasks.indexOf(sourceTask), 1);
            } else if (source.type === 'subtask') {
                // Перетаскиваем подзадачу
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) {
                    listDragItem = null;
                    return;
                }
                sourceSubtask = findAndRemoveSubtask(sourceTask.subtasks, source.subtaskId);
                if (!sourceSubtask) {
                    listDragItem = null;
                    return;
                }
            }

            // Добавляем как подзадачу к цели
            if (targetSubtaskId) {
                // Добавляем к подзадаче
                const targetSub = findSubtaskById(targetTask.subtasks, targetSubtaskId);
                if (targetSub) {
                    targetSub.children = targetSub.children || [];
                    targetSub.children.push(sourceSubtask);
                }
            } else {
                // Добавляем к задаче
                targetTask.subtasks = targetTask.subtasks || [];
                targetTask.subtasks.push(sourceSubtask);
            }

            // Нормализуем и обновляем
            targetTask.subtasks = normalizeSubtasksTree(targetTask.subtasks);
            if (hasSubtasks(targetTask)) {
                targetTask.status = calculateTaskStatus(targetTask.subtasks);
                targetTask.assignees = calculateTaskAssignees(targetTask.subtasks);
            }

            // Сохраняем в базу
            await sbClient.from('tasks').update({
                subtasks: JSON.stringify(targetTask.subtasks),
                status: targetTask.status,
                assignees: targetTask.assignees.join(',')
            }).eq('id', targetTaskId);

            // Если перетаскивали задачу, удаляем её из списка
            if (source.type === 'task') {
                await sbClient.from('tasks').delete().eq('id', source.taskId);
            } else if (source.type === 'subtask') {
                // Сохраняем исходную задачу
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (sourceTask) {
                    sourceTask.subtasks = normalizeSubtasksTree(sourceTask.subtasks);
                    if (hasSubtasks(sourceTask)) {
                        sourceTask.status = calculateTaskStatus(sourceTask.subtasks);
                        sourceTask.assignees = calculateTaskAssignees(sourceTask.subtasks);
                    }
                    await sbClient.from('tasks').update({
                        subtasks: JSON.stringify(sourceTask.subtasks),
                        status: sourceTask.status,
                        assignees: sourceTask.assignees.join(',')
                    }).eq('id', source.taskId);
                }
            }

            listDragItem = null;
            renderTasks();
        }

        function handleListTaskDragStart(e, taskId) {
            if (!canEdit) return;
            e.stopPropagation();
            listDragItem = { type: 'task', taskId };
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', 'task-' + taskId);
        }

        function handleListSubtaskDragStart(e, taskId, subtaskId) {
            if (!canEdit) return;
            e.stopPropagation();
            listDragItem = { type: 'subtask', taskId, subtaskId };
            e.currentTarget.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', 'subtask-' + subtaskId);
        }

        function handleListDragEnd(e) {
            if (e.currentTarget) e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
            removeDropIndicator();
            listDragItem = null;
        }

        function handleListDragOver(e, targetTaskId, targetSubtaskId, hasSubtasks) {
            if (!canEdit || !listDragItem) return;
            e.preventDefault();
            e.stopPropagation();

            const target = e.currentTarget;
            
            // Проверяем, можно ли перетащить как подзадачу (если у цели нет подзадач)
            const canDropAsSubtask = hasSubtasks === 'false';
            
            // Если перетаскиваем не сам элемент и у цели нет подзадач - показываем drop-target
            const isSameItem = (listDragItem.type === 'task' && listDragItem.taskId == targetTaskId) ||
                               (listDragItem.type === 'subtask' && listDragItem.subtaskId == targetSubtaskId);
            
            if (canDropAsSubtask && !isSameItem && !isDescendant(listDragItem, targetTaskId, targetSubtaskId)) {
                target.classList.add('drop-target');
                target.classList.remove('drag-over');
                removeDropIndicator();
            } else {
                target.classList.remove('drop-target');
                target.classList.add('drag-over');

                // Calculate insert position (before or after)
                const rect = target.getBoundingClientRect();
                const midY = rect.top + rect.height / 2;
                const insertBefore = e.clientY < midY;

                updateDropIndicator(target, insertBefore);
            }
        }

        function handleListDragLeave(e) {
            e.currentTarget.classList.remove('drag-over');
            e.currentTarget.classList.remove('drop-target');
            removeDropIndicator();
        }

        function updateDropIndicator(target, insertBefore) {
            removeDropIndicator();
            
            dropIndicator = document.createElement('div');
            dropIndicator.className = 'insert-indicator';
            dropIndicator.style.position = 'relative';
            dropIndicator.style.margin = '0';
            dropIndicator.style.height = '3px';
            dropIndicator.style.background = 'var(--accent)';
            dropIndicator.style.borderRadius = '2px';
            dropIndicator.style.boxShadow = '0 0 4px var(--accent)';
            
            if (insertBefore) {
                target.parentNode.insertBefore(dropIndicator, target);
            } else {
                target.parentNode.insertBefore(dropIndicator, target.nextSibling);
            }
            
            dropIndicator.insertBefore = insertBefore;
            dropIndicator.targetTaskId = target.closest('[id^="task-"]')?.id.replace('task-', '') || null;
            dropIndicator.isSubtask = target.classList.contains('subtask-item');
        }

        function removeDropIndicator() {
            if (dropIndicator && dropIndicator.parentNode) {
                dropIndicator.parentNode.removeChild(dropIndicator);
            }
            dropIndicator = null;
        }

        async function handleListDrop(e, targetTaskId, targetSubtaskId) {
            if (!canEdit || !listDragItem) return;
            e.preventDefault();
            e.stopPropagation();
            
            const target = e.currentTarget;
            const isDropTarget = target.classList.contains('drop-target');
            target.classList.remove('drag-over');
            target.classList.remove('drop-target');

            // Если отпустили на drop-target (задачу/подзадачу без подзадач) - добавляем как подзадачу
            if (isDropTarget) {
                await handleDropAsSubtask(targetTaskId, targetSubtaskId);
                return;
            }

            const insertBefore = dropIndicator ? dropIndicator.insertBefore : true;
            const source = listDragItem;

            // Can't drop on itself
            if (source.type === 'task' && source.taskId === targetTaskId) {
                listDragItem = null;
                return;
            }
            if (source.type === 'subtask' && source.subtaskId === targetSubtaskId) {
                listDragItem = null;
                return;
            }

            // For task reorder
            if (source.type === 'task') {
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) {
                    listDragItem = null;
                    return;
                }
                
                // Remove source from tasks array
                const sourceIndex = tasks.findIndex(t => t.id === source.taskId);
                if (sourceIndex === -1) {
                    listDragItem = null;
                    return;
                }
                
                // Find target position
                let targetIndex = tasks.findIndex(t => t.id === targetTaskId);
                if (targetIndex === -1) {
                    listDragItem = null;
                    return;
                }
                
                // Adjust index if needed
                if (sourceIndex < targetIndex) {
                    targetIndex--;
                }
                
                // Move task in array
                tasks.splice(sourceIndex, 1);
                
                if (insertBefore) {
                    tasks.splice(targetIndex, 0, sourceTask);
                } else {
                    tasks.splice(targetIndex + 1, 0, sourceTask);
                }
                
                // Save order to backend (need to update order field)
                await saveTaskOrder();
            }
            // For subtask reorder or move
            else if (source.type === 'subtask') {
                const sourceTask = tasks.find(t => t.id === source.taskId);
                if (!sourceTask) {
                    listDragItem = null;
                    return;
                }
                
                // Find and remove source subtask
                const sourceSubtask = findAndRemoveSubtask(sourceTask.subtasks, source.subtaskId);
                if (!sourceSubtask) {
                    listDragItem = null;
                    return;
                }
                
                // Add to target
                const targetTask = tasks.find(t => t.id === targetTaskId);
                if (!targetTask) {
                    // Put back
                    sourceTask.subtasks = sourceTask.subtasks || [];
                    sourceTask.subtasks.push(sourceSubtask);
                    listDragItem = null;
                    return;
                }
                
                // Find target subtask and its parent array
                let targetArray, targetIndexInArray;
                
                if (targetSubtaskId) {
                    // Insert relative to a subtask
                    const result = findSubtaskParentArray(targetTask.subtasks, targetSubtaskId);
                    if (result) {
                        targetArray = result.array;
                        targetIndexInArray = result.index;
                        if (!insertBefore) targetIndexInArray++;
                    } else {
                        targetArray = targetTask.subtasks || [];
                        targetIndexInArray = targetArray.length;
                    }
                } else {
                    // Insert into task's subtasks
                    targetArray = targetTask.subtasks || [];
                    targetIndexInArray = insertBefore ? 0 : targetArray.length;
                }
                
                targetArray.splice(targetIndexInArray, 0, sourceSubtask);
                
                // Normalize and save both tasks
                sourceTask.subtasks = normalizeSubtasksTree(sourceTask.subtasks);
                if (hasSubtasks(sourceTask)) {
                    sourceTask.status = calculateTaskStatus(sourceTask.subtasks);
                    sourceTask.assignees = calculateTaskAssignees(sourceTask.subtasks);
                }
                
                targetTask.subtasks = normalizeSubtasksTree(targetTask.subtasks);
                if (hasSubtasks(targetTask)) {
                    targetTask.status = calculateTaskStatus(targetTask.subtasks);
                    targetTask.assignees = calculateTaskAssignees(targetTask.subtasks);
                }
                
                await sbClient.from('tasks').update({
                    subtasks: JSON.stringify(sourceTask.subtasks),
                    status: sourceTask.status,
                    assignees: sourceTask.assignees.join(',')
                }).eq('id', source.taskId);
                
                await sbClient.from('tasks').update({
                    subtasks: JSON.stringify(targetTask.subtasks),
                    status: targetTask.status,
                    assignees: targetTask.assignees.join(',')
                }).eq('id', targetTaskId);
            }
            
            listDragItem = null;
            renderTasks();
        }

        function findAndRemoveSubtask(subtasks, subtaskId) {
            for (let i = 0; i < (subtasks || []).length; i++) {
                if (subtasks[i].id === subtaskId) {
                    return subtasks.splice(i, 1)[0];
                }
                const kids = subtasks[i].children || subtasks[i].subtasks || [];
                if (kids.length > 0) {
                    const found = findAndRemoveSubtask(kids, subtaskId);
                    if (found) return found;
                }
            }
            return null;
        }

        function findSubtaskParentArray(subtasks, subtaskId) {
            for (let i = 0; i < (subtasks || []).length; i++) {
                if (subtasks[i].id === subtaskId) {
                    return { array: subtasks, index: i };
                }
                const kids = subtasks[i].children || subtasks[i].subtasks || [];
                if (kids.length > 0) {
                    const found = findSubtaskParentArray(kids, subtaskId);
                    if (found) return found;
                }
            }
            return null;
        }

        async function saveTaskOrder() {
            // Save task order by updating each task's order_index
            const orderUpdates = tasks.map((task, index) => {
                return sbClient.from('tasks').update({ order_index: index }).eq('id', task.id);
            });
            await Promise.all(orderUpdates);
            renderTasks();
        }

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
