<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ashes of Dominion - Задачи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        header h1 {
            color: #e94560;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            background: #0f3460;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .user-badge {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
        }

        .user-badge.readonly {
            background: #ff9800;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .view-toggle {
            display: flex;
            gap: 10px;
        }

        .left-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #e94560;
            color: white;
        }

        .btn-primary:hover {
            background: #ff6b6b;
        }

        .btn-primary:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #0f3460;
            color: white;
        }

        .btn-secondary:hover {
            background: #1a4a7a;
        }

        .btn-secondary.active {
            background: #e94560;
        }

        .btn-small {
            padding: 5px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: #d32f2f;
            color: white;
        }

        .btn-danger:hover {
            background: #f44336;
        }

        /* Список задач */
        .task-list {
            background: #0f3460;
            border-radius: 10px;
            overflow: hidden;
        }

        .task-item {
            border-bottom: 1px solid #1a4a7a;
        }

        .task-header {
            display: grid;
            grid-template-columns: 3fr 1fr 1fr 50px;
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .task-header:hover {
            background: #1a4a7a;
        }

        .task-header .title {
            font-weight: bold;
            font-size: 1.1em;
        }

        .task-header .status {
            display: flex;
            align-items: center;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-todo { background: #4a4a6a; }
        .status-progress { background: #2196f3; }
        .status-review { background: #ff9800; }
        .status-done { background: #4caf50; }

        .task-header .assignees {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .assignee {
            background: #e94560;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.85em;
        }

        .task-header .toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: transform 0.3s;
        }

        .task-item.expanded .toggle-btn {
            transform: rotate(180deg);
        }

        .task-details {
            display: none;
            padding: 20px;
            background: #16213e;
        }

        .task-item.expanded .task-details {
            display: block;
        }

        .subtasks-tree {
            margin-top: 15px;
            padding-left: 20px;
        }

        .subtask-item {
            background: #0f3460;
            margin: 8px 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .subtask-header {
            display: grid;
            grid-template-columns: 1fr 100px 120px 80px;
            padding: 10px 15px;
            align-items: center;
            gap: 10px;
        }

        .subtask-header .subtask-title {
            font-weight: 500;
        }

        .subtask-children {
            padding: 10px 20px;
            background: #0a2540;
        }

        .comments-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #1a4a7a;
        }

        .comment {
            background: #0f3460;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }

        .comment-author {
            font-weight: bold;
            color: #e94560;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .add-comment {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .add-comment input {
            flex: 1;
            padding: 10px;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
            background: #0f3460;
            color: #eee;
        }

        /* Канбан доска */
        .kanban-board {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .kanban-board.active {
            display: grid;
        }

        .kanban-column {
            background: #0f3460;
            border-radius: 10px;
            padding: 15px;
            min-height: 400px;
        }

        .kanban-column.drag-over {
            background: #1a4a7a;
            border: 2px dashed #e94560;
        }

        .kanban-column h3 {
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #e94560;
            margin-bottom: 15px;
        }

        .kanban-card {
            background: #16213e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: grab;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .kanban-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .kanban-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .kanban-card .title {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .kanban-card .assignees {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: #e94560;
            margin-bottom: 20px;
        }

        .modal-content.large {
            max-width: 800px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
            background: #0f3460;
            color: #eee;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-group .assignees-select {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
        }

        .assignee-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: #1a4a7a;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .assignee-checkbox:hover {
            background: #2a5a8a;
        }

        .assignee-checkbox input[type="checkbox"] {
            width: auto;
        }

        .assignee-checkbox.checked {
            background: #e94560;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .task-list.hidden {
            display: none;
        }

        /* Auth формы */
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tabs button {
            flex: 1;
        }

        .auth-tabs button.active {
            background: #e94560;
        }

        /* Исполнители список */
        .assignees-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .assignee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #0f3460;
            margin: 5px 0;
            border-radius: 5px;
        }

        .assignee-item-actions {
            display: flex;
            gap: 5px;
        }

        /* Дерево подзадач */
        .subtask-tree-node {
            margin: 5px 0;
        }

        .subtask-tree-node .subtask-content {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #0f3460;
            border-radius: 5px;
        }

        .subtask-tree-node .subtask-children {
            margin-left: 25px;
            margin-top: 5px;
        }

        .expand-subtask {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #1a4a7a;
            border-radius: 3px;
            font-size: 12px;
        }

        .expand-subtask.empty {
            visibility: hidden;
        }

        .readonly-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .readonly-overlay.active {
            display: flex;
        }

        .readonly-overlay h2 {
            color: #ff9800;
        }

        .login-prompt {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #0f3460;
            border-left: 4px solid #e94560;
            border-radius: 5px;
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-color: #4caf50;
        }

        .toast.error {
            border-color: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏰 Ashes of Dominion</h1>
            <p>Система управления задачами</p>
            <div class="header-controls">
                <div id="userContainer" class="user-info" style="display: none;">
                    <div class="user-badge" id="userBadge"></div>
                    <span id="userEmail"></span>
                    <button class="btn-small btn-secondary" onclick="logout()">Выйти</button>
                </div>
                <button id="loginBtn" class="btn-small btn-secondary" onclick="openAuthModal()">Войти</button>
                <button class="btn-small btn-secondary" onclick="openAssigneesModal()">👥 Исполнители</button>
            </div>
        </header>

        <div class="controls">
            <div class="left-controls">
                <div class="view-toggle">
                    <button class="btn-secondary active" onclick="setView('list')">📋 Список</button>
                    <button class="btn-secondary" onclick="setView('kanban')">📊 Канбан</button>
                </div>
            </div>
            <button class="btn-primary" onclick="openAddModal()" id="addTaskBtn" disabled>+ Добавить задачу</button>
        </div>

        <!-- Список задач -->
        <div id="taskList" class="task-list">
            <div class="task-header" style="background: #1a4a7a;">
                <span>Задача</span>
                <span>Статус</span>
                <span>Исполнители</span>
                <span></span>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <!-- Канбан доска -->
        <div id="kanbanBoard" class="kanban-board">
            <div class="kanban-column" data-status="todo" 
                 ondragover="handleDragOver(event)" 
                 ondragleave="handleDragLeave(event)"
                 ondrop="handleDrop(event, 'todo')">
                <h3>📝 К выполнению</h3>
                <div id="todoTasks"></div>
            </div>
            <div class="kanban-column" data-status="progress"
                 ondragover="handleDragOver(event)"
                 ondragleave="handleDragLeave(event)"
                 ondrop="handleDrop(event, 'progress')">
                <h3>🔄 В работе</h3>
                <div id="progressTasks"></div>
            </div>
            <div class="kanban-column" data-status="review"
                 ondragover="handleDragOver(event)"
                 ondragleave="handleDragLeave(event)"
                 ondrop="handleDrop(event, 'review')">
                <h3>👀 На проверке</h3>
                <div id="reviewTasks"></div>
            </div>
            <div class="kanban-column" data-status="done"
                 ondragover="handleDragOver(event)"
                 ondragleave="handleDragLeave(event)"
                 ondrop="handleDrop(event, 'done')">
                <h3>✅ Готово</h3>
                <div id="doneTasks"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Добавить задачу</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Название задачи</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="taskDescription"></textarea>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="taskStatus">
                        <option value="todo">К выполнению</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнители</label>
                    <div id="taskAssigneesSelect" class="assignees-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно авторизации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Вход</h2>
            <div class="auth-tabs">
                <button class="btn-secondary active" onclick="showAuthTab('login')">Вход</button>
                <button class="btn-secondary" onclick="showAuthTab('register')">Регистрация</button>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Войти</button>
                </div>
            </form>
            
            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно исполнителей -->
    <div id="assigneesModal" class="modal">
        <div class="modal-content">
            <h2>👥 Исполнители</h2>
            <div class="form-group">
                <label>Добавить исполнителя</label>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="newAssigneeName" placeholder="Имя исполнителя">
                    <button class="btn-primary" onclick="addAssignee()">Добавить</button>
                </div>
            </div>
            <div id="assigneesList" class="assignees-list"></div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeAssigneesModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно подзадачи -->
    <div id="subtaskModal" class="modal">
        <div class="modal-content">
            <h2 id="subtaskModalTitle">Добавить подзадачу</h2>
            <form id="subtaskForm">
                <input type="hidden" id="subtaskTaskId">
                <input type="hidden" id="subtaskParentId">
                <input type="hidden" id="subtaskId">
                <div class="form-group">
                    <label>Название подзадачи</label>
                    <input type="text" id="subtaskTitle" required>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="subtaskStatus">
                        <option value="todo">К выполнению</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeSubtaskModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Overlay для readonly режима -->
    <div id="readonlyOverlay" class="readonly-overlay">
        <h2>🔒 Режим только для чтения</h2>
        <p>Войдите, чтобы получить доступ к редактированию</p>
        <button class="btn-primary" onclick="openAuthModal(); closeReadonlyOverlay()">Войти</button>
        <button class="btn-secondary" onclick="closeReadonlyOverlay()">Продолжить просмотр</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0"></script>
    <script>
        // Supabase конфигурация
        const SUPABASE_URL = 'https://nrrqiedzcwmgzqkmaret.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1edDcYXXILaZ27t7oMEWMA_KIt2Ivck';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Данные
        let tasks = [];
        let assignees = [];
        let currentUser = null;
        let canEdit = false;
        let currentView = 'list';
        let draggedTaskId = null;

        // Инициализация
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadAssignees();
            await loadTasks();
        });

        // ==================== AUTH ====================
        async function checkAuth() {
            const { data: { session } } = await sbClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                await checkEditPermission();
                updateUserUI();
            }
        }

        async function checkEditPermission() {
            // Проверяем, есть ли пользователь в списке разрешённых
            const { data, error } = await sbClient
                .from('allowed_users')
                .select('user_id')
                .eq('user_id', currentUser.id)
                .single();
            
            canEdit = !!data && !error;
            updateEditControls();
        }

        function updateUserUI() {
            const userContainer = document.getElementById('userContainer');
            const loginBtn = document.getElementById('loginBtn');
            const userBadge = document.getElementById('userBadge');
            const userEmail = document.getElementById('userEmail');
            
            if (currentUser) {
                userContainer.style.display = 'flex';
                loginBtn.style.display = 'none';
                userEmail.textContent = currentUser.email;
                userBadge.className = canEdit ? 'user-badge' : 'user-badge readonly';
            } else {
                userContainer.style.display = 'none';
                loginBtn.style.display = 'block';
            }
        }

        function updateEditControls() {
            const addTaskBtn = document.getElementById('addTaskBtn');
            addTaskBtn.disabled = !canEdit;
        }

        async function login(email, password) {
            const { data, error } = await sbClient.auth.signInWithPassword({
                email,
                password
            });
            
            if (error) throw error;
            
            currentUser = data.user;
            await checkEditPermission();
            updateUserUI();
            showToast('Вход выполнен!', 'success');
            closeAuthModal();
        }

        async function register(email, password) {
            const { data, error } = await sbClient.auth.signUp({
                email,
                password
            });
            
            if (error) throw error;
            
            showToast('Регистрация! Проверьте email для подтверждения.', 'success');
            closeAuthModal();
        }

        async function logout() {
            await sbClient.auth.signOut();
            currentUser = null;
            canEdit = false;
            updateUserUI();
            updateEditControls();
            showToast('Выход выполнен', 'success');
        }

        // ==================== ASSIGNЕES ====================
        async function loadAssignees() {
            const { data, error } = await sbClient
                .from('assignees')
                .select('*')
                .order('name');
            
            if (error) {
                console.error('Ошибка загрузки исполнителей:', error);
                return;
            }
            
            assignees = data || [];
            renderAssigneesSelect();
            renderAssigneesList();
        }

        function renderAssigneesSelect() {
            const container = document.getElementById('taskAssigneesSelect');
            container.innerHTML = assignees.map(a => `
                <label class="assignee-checkbox" onclick="this.classList.toggle('checked')">
                    <input type="checkbox" value="${a.id}" data-name="${a.name}">
                    ${a.name}
                </label>
            `).join('');
        }

        function renderAssigneesList() {
            const container = document.getElementById('assigneesList');
            container.innerHTML = assignees.map(a => `
                <div class="assignee-item">
                    <span>${a.name}</span>
                    <div class="assignee-item-actions">
                        ${canEdit ? `
                            <button class="btn-small btn-danger" onclick="deleteAssignee(${a.id})">✕</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            if (assignees.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #888;">Нет исполнителей</p>';
            }
        }

        async function addAssignee() {
            const input = document.getElementById('newAssigneeName');
            const name = input.value.trim();
            if (!name) return;
            
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return;
            }
            
            const { error } = await sbClient
                .from('assignees')
                .insert([{ name }]);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return;
            }
            
            input.value = '';
            await loadAssignees();
            showToast('Исполнитель добавлен', 'success');
        }

        async function deleteAssignee(id) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return;
            }
            
            if (!confirm('Удалить исполнителя?')) return;
            
            const { error } = await sbClient
                .from('assignees')
                .delete()
                .eq('id', id);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return;
            }
            
            await loadAssignees();
            showToast('Исполнитель удалён', 'success');
        }

        // ==================== TASKS ====================
        async function loadTasks() {
            const { data, error } = await sbClient
                .from('tasks')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Ошибка загрузки:', error);
                showToast('Ошибка загрузки задач', 'error');
                return;
            }
            
            tasks = (data || []).map(task => ({
                ...task,
                assignees: task.assignees ? task.assignees.split(',').filter(a => a) : [],
                subtasks: typeof task.subtasks === 'string' ? JSON.parse(task.subtasks || '[]') : (task.subtasks || [])
            }));
            
            renderTasks();
        }

        async function saveTask(taskData) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return false;
            }
            
            if (taskData.id) {
                const { error } = await sbClient
                    .from('tasks')
                    .update({
                        title: taskData.title,
                        description: taskData.description,
                        status: taskData.status,
                        assignees: taskData.assignees.join(','),
                        subtasks: JSON.stringify(taskData.subtasks)
                    })
                    .eq('id', taskData.id);
                
                if (error) {
                    showToast('Ошибка обновления: ' + error.message, 'error');
                    return false;
                }
            } else {
                const { error } = await sbClient
                    .from('tasks')
                    .insert([{
                        title: taskData.title,
                        description: taskData.description,
                        status: taskData.status,
                        assignees: taskData.assignees.join(','),
                        subtasks: JSON.stringify(taskData.subtasks)
                    }]);
                
                if (error) {
                    showToast('Ошибка создания: ' + error.message, 'error');
                    return false;
                }
            }
            
            await loadTasks();
            showToast('Задача сохранена', 'success');
            return true;
        }

        async function deleteTaskFromDb(id) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return false;
            }
            
            const { error } = await sbClient
                .from('tasks')
                .delete()
                .eq('id', id);
            
            if (error) {
                showToast('Ошибка удаления: ' + error.message, 'error');
                return false;
            }
            
            await loadTasks();
            showToast('Задача удалена', 'success');
            return true;
        }

        async function updateTaskStatus(id, status) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return false;
            }
            
            const { error } = await sbClient
                .from('tasks')
                .update({ status })
                .eq('id', id);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return false;
            }
            
            await loadTasks();
            return true;
        }

        // ==================== SUBTASKS ====================
        async function saveSubtask(taskId, subtaskData) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return false;
            }
            
            const task = tasks.find(t => t.id === taskId);
            if (!task) return false;
            
            if (subtaskData.id) {
                // Обновление существующей
                const updateInTree = (nodes) => {
                    return nodes.map(node => {
                        if (node.id === subtaskData.id) {
                            return { ...node, title: subtaskData.title, status: subtaskData.status };
                        }
                        if (node.children) {
                            return { ...node, children: updateInTree(node.children) };
                        }
                        return node;
                    });
                };
                task.subtasks = updateInTree(task.subtasks);
            } else {
                // Новая подзадача
                const newSubtask = {
                    id: Date.now(),
                    title: subtaskData.title,
                    status: subtaskData.status,
                    children: []
                };
                
                if (subtaskData.parentId) {
                    // Добавление к родительской подзадаче
                    const addToParent = (nodes) => {
                        return nodes.map(node => {
                            if (node.id === subtaskData.parentId) {
                                return { ...node, children: [...(node.children || []), newSubtask] };
                            }
                            if (node.children) {
                                return { ...node, children: addToParent(node.children) };
                            }
                            return node;
                        });
                    };
                    task.subtasks = addToParent(task.subtasks);
                } else {
                    // Добавление в корень
                    task.subtasks = [...task.subtasks, newSubtask];
                }
            }
            
            const { error } = await sbClient
                .from('tasks')
                .update({ subtasks: JSON.stringify(task.subtasks) })
                .eq('id', taskId);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return false;
            }
            
            await loadTasks();
            showToast('Подзадача сохранена', 'success');
            return true;
        }

        async function deleteSubtask(taskId, subtaskId) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return false;
            }
            
            const task = tasks.find(t => t.id === taskId);
            if (!task) return false;
            
            const deleteFromTree = (nodes) => {
                return nodes.filter(node => node.id !== subtaskId)
                    .map(node => ({
                        ...node,
                        children: node.children ? deleteFromTree(node.children) : []
                    }));
            };
            
            task.subtasks = deleteFromTree(task.subtasks);
            
            const { error } = await sbClient
                .from('tasks')
                .update({ subtasks: JSON.stringify(task.subtasks) })
                .eq('id', taskId);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return false;
            }
            
            await loadTasks();
            showToast('Подзадача удалена', 'success');
            return true;
        }

        // ==================== RENDER ====================
        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            container.innerHTML = tasks.map(task => createTaskHTML(task)).join('');
            renderKanban();
        }

        function createTaskHTML(task) {
            const statusLabels = {
                todo: 'К выполнению',
                progress: 'В работе',
                review: 'На проверке',
                done: 'Готово'
            };

            // Получаем имена исполнителей по ID
            const assigneeNames = task.assignees.map(id => {
                const a = assignees.find(x => x.id == id);
                return a ? a.name : id;
            });

            return `
                <div class="task-item" id="task-${task.id}">
                    <div class="task-header" onclick="toggleTask(${task.id})">
                        <span class="title">${task.title}</span>
                        <span class="status">
                            <span class="status-badge status-${task.status}">${statusLabels[task.status]}</span>
                        </span>
                        <span class="assignees">
                            ${assigneeNames.map(a => `<span class="assignee">${a}</span>`).join('')}
                        </span>
                        <span class="toggle-btn">▼</span>
                    </div>
                    <div class="task-details">
                        <p><strong>Описание:</strong> ${task.description || 'Нет описания'}</p>
                        
                        <div style="margin-top: 15px;">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                                <strong>Подзадачи:</strong>
                                ${canEdit ? `<button class="btn-small btn-primary" onclick="openSubtaskModal(${task.id}, null, null)">+ Подзадача</button>` : ''}
                            </div>
                            ${task.subtasks && task.subtasks.length > 0 ? renderSubtaskTree(task.subtasks, task.id) : '<p style="color: #888;">Нет подзадач</p>'}
                        </div>
                        
                        <div class="comments-section">
                            <strong>Комментарии:</strong>
                            ${task.comments && task.comments.length > 0 ? task.comments.map(c => `
                                <div class="comment">
                                    <div class="comment-author">${c.author} <small>(${c.date})</small></div>
                                    <div>${c.text}</div>
                                </div>
                            `).join('') : '<p style="color: #888;">Нет комментариев</p>'}
                            <div class="add-comment">
                                <input type="text" placeholder="Добавить комментарий..."
                                       onkeypress="if(event.key==='Enter') addComment(${task.id}, this)">
                            </div>
                        </div>
                        ${canEdit ? `
                        <div class="modal-actions">
                            <button class="btn-secondary" onclick="editTask(${task.id})">Редактировать</button>
                            <button class="btn-danger" onclick="deleteTask(${task.id})">Удалить</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        function renderSubtaskTree(subtasks, taskId, level = 0) {
            if (!subtasks || subtasks.length === 0) return '';
            
            return `<div class="subtasks-tree">
                ${subtasks.map(sub => {
                    const hasChildren = sub.children && sub.children.length > 0;
                    const statusLabels = {
                        todo: 'К выполнению',
                        progress: 'В работе',
                        review: 'На проверке',
                        done: 'Готово'
                    };
                    
                    return `
                        <div class="subtask-tree-node">
                            <div class="subtask-content">
                                <span class="expand-subtask ${!hasChildren ? 'empty' : ''}" 
                                      onclick="toggleSubtaskChildren(this)">
                                    ${hasChildren ? '▶' : ''}
                                </span>
                                <span style="flex: 1;">${sub.title}</span>
                                <span class="status-badge status-${sub.status}">${statusLabels[sub.status]}</span>
                                ${canEdit ? `
                                <div style="display: flex; gap: 5px;">
                                    <button class="btn-small btn-secondary" onclick="openSubtaskModal(${taskId}, ${sub.id}, '${sub.title}', '${sub.status}')">✏️</button>
                                    <button class="btn-small btn-primary" onclick="openSubtaskModal(${taskId}, null, null, null, ${sub.id})">+Дочь</button>
                                    <button class="btn-small btn-danger" onclick="deleteSubtaskClick(${taskId}, ${sub.id})">✕</button>
                                </div>
                                ` : ''}
                            </div>
                            ${hasChildren ? `<div class="subtask-children" style="display: none;">${renderSubtaskTree(sub.children, taskId, level + 1)}</div>` : ''}
                        </div>
                    `;
                }).join('')}
            </div>`;
        }

        function renderKanban() {
            const columns = { todo: [], progress: [], review: [], done: [] };
            
            tasks.forEach(task => {
                columns[task.status].push(task);
            });

            Object.keys(columns).forEach(status => {
                const column = document.getElementById(`${status}Tasks`);
                column.innerHTML = columns[status].map(task => {
                    const assigneeNames = task.assignees.map(id => {
                        const a = assignees.find(x => x.id == id);
                        return a ? a.name : id;
                    });
                    
                    return `
                        <div class="kanban-card" 
                             draggable="${canEdit}"
                             ondragstart="handleDragStart(event, ${task.id})"
                             ondragend="handleDragEnd(event)"
                             onclick="editTask(${task.id})">
                            <div class="title">${task.title}</div>
                            <div class="assignees">
                                ${assigneeNames.map(a => `<span class="assignee">${a}</span>`).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            });
        }

        // ==================== DRAG'N'DROP ====================
        function handleDragStart(event, taskId) {
            if (!canEdit) {
                event.preventDefault();
                return;
            }
            draggedTaskId = taskId;
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.kanban-column').forEach(col => {
                col.classList.remove('drag-over');
            });
        }

        function handleDragOver(event) {
            if (!canEdit) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            event.currentTarget.classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        async function handleDrop(event, status) {
            if (!canEdit) return;
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            
            if (draggedTaskId) {
                await updateTaskStatus(draggedTaskId, status);
                draggedTaskId = null;
            }
        }

        // ==================== UI FUNCTIONS ====================
        function toggleTask(id) {
            const task = document.getElementById(`task-${id}`);
            task.classList.toggle('expanded');
        }

        function toggleSubtaskChildren(btn) {
            const content = btn.closest('.subtask-content');
            const children = content.nextElementSibling;
            if (children && children.classList.contains('subtask-children')) {
                const isHidden = children.style.display === 'none' || !children.style.display;
                children.style.display = isHidden ? 'block' : 'none';
                btn.textContent = isHidden ? '▼' : '▶';
            }
        }

        function setView(view) {
            currentView = view;
            const taskList = document.getElementById('taskList');
            const kanbanBoard = document.getElementById('kanbanBoard');
            const buttons = document.querySelectorAll('.view-toggle .btn-secondary');

            if (view === 'list') {
                taskList.classList.remove('hidden');
                kanbanBoard.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
            } else {
                taskList.classList.add('hidden');
                kanbanBoard.classList.add('active');
                buttons[0].classList.remove('active');
                buttons[1].classList.add('active');
            }
        }

        function openAddModal() {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return;
            }
            document.getElementById('modalTitle').textContent = 'Добавить задачу';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.querySelectorAll('#taskAssigneesSelect input').forEach(cb => {
                cb.checked = false;
                cb.closest('.assignee-checkbox').classList.remove('checked');
            });
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            document.getElementById('modalTitle').textContent = 'Редактировать задачу';
            document.getElementById('taskId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskDescription').value = task.description;
            document.getElementById('taskStatus').value = task.status;
            
            // Выбираем исполнителей
            document.querySelectorAll('#taskAssigneesSelect input').forEach(cb => {
                const isChecked = task.assignees.includes(cb.value);
                cb.checked = isChecked;
                cb.closest('.assignee-checkbox').classList.toggle('checked', isChecked);
            });
            
            document.getElementById('taskModal').classList.add('active');
        }

        async function deleteTask(id) {
            if (!confirm('Удалить эту задачу?')) return;
            await deleteTaskFromDb(id);
        }

        async function addComment(taskId, input) {
            const text = input.value.trim();
            if (!text) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            if (!task.comments) task.comments = [];
            
            task.comments.push({
                author: currentUser ? currentUser.email.split('@')[0] : 'Аноним',
                text: text,
                date: new Date().toLocaleDateString('ru-RU')
            });

            const { error } = await sbClient
                .from('tasks')
                .update({ comments: JSON.stringify(task.comments) })
                .eq('id', taskId);
            
            if (error) {
                showToast('Ошибка: ' + error.message, 'error');
                return;
            }
            
            input.value = '';
            await loadTasks();
        }

        // ==================== SUBTASK MODAL ====================
        function openSubtaskModal(taskId, subtaskId = null, title = null, status = 'todo', parentId = null) {
            if (!canEdit) {
                showToast('Только для редакторов', 'error');
                return;
            }
            
            document.getElementById('subtaskTaskId').value = taskId;
            document.getElementById('subtaskParentId').value = parentId || '';
            document.getElementById('subtaskId').value = subtaskId || '';
            
            if (subtaskId) {
                document.getElementById('subtaskModalTitle').textContent = 'Редактировать подзадачу';
                document.getElementById('subtaskTitle').value = title;
                document.getElementById('subtaskStatus').value = status;
            } else if (parentId) {
                document.getElementById('subtaskModalTitle').textContent = 'Добавить дочернюю подзадачу';
                document.getElementById('subtaskTitle').value = '';
                document.getElementById('subtaskStatus').value = 'todo';
            } else {
                document.getElementById('subtaskModalTitle').textContent = 'Добавить подзадачу';
                document.getElementById('subtaskTitle').value = '';
                document.getElementById('subtaskStatus').value = 'todo';
            }
            
            document.getElementById('subtaskModal').classList.add('active');
        }

        function closeSubtaskModal() {
            document.getElementById('subtaskModal').classList.remove('active');
        }

        document.getElementById('subtaskForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const taskId = parseInt(document.getElementById('subtaskTaskId').value);
            const subtaskId = document.getElementById('subtaskId').value;
            const parentId = document.getElementById('subtaskParentId').value;
            const title = document.getElementById('subtaskTitle').value;
            const status = document.getElementById('subtaskStatus').value;
            
            await saveSubtask(taskId, {
                id: subtaskId ? parseInt(subtaskId) : null,
                parentId: parentId ? parseInt(parentId) : null,
                title,
                status
            });
            
            closeSubtaskModal();
        });

        async function deleteSubtaskClick(taskId, subtaskId) {
            if (!confirm('Удалить подзадачу?')) return;
            await deleteSubtask(taskId, subtaskId);
        }

        // ==================== AUTH MODAL ====================
        function openAuthModal() {
            document.getElementById('authModal').classList.add('active');
            showAuthTab('login');
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('active');
        }

        function showAuthTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.auth-tabs button');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                await login(email, password);
            } catch (err) {
                showToast('Ошибка входа: ' + err.message, 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            try {
                await register(email, password);
            } catch (err) {
                showToast('Ошибка регистрации: ' + err.message, 'error');
            }
        });

        // ==================== ASSIGNEES MODAL ====================
        function openAssigneesModal() {
            document.getElementById('assigneesModal').classList.add('active');
            renderAssigneesList();
        }

        function closeAssigneesModal() {
            document.getElementById('assigneesModal').classList.remove('active');
        }

        // ==================== READONLY OVERLAY ====================
        function closeReadonlyOverlay() {
            document.getElementById('readonlyOverlay').classList.remove('active');
        }

        // ==================== FORM SUBMIT ====================
        document.getElementById('taskForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const id = document.getElementById('taskId').value;
            const title = document.getElementById('taskTitle').value;
            const description = document.getElementById('taskDescription').value;
            const status = document.getElementById('taskStatus').value;
            
            // Собираем выбранных исполнителей
            const assignees = Array.from(document.querySelectorAll('#taskAssigneesSelect input:checked'))
                .map(cb => cb.value);
            
            const task = tasks.find(t => t.id == id);
            
            const taskData = {
                id: id ? parseInt(id) : null,
                title,
                description,
                status,
                assignees,
                subtasks: task ? task.subtasks : []
            };

            const success = await saveTask(taskData);
            if (success) {
                closeModal();
            }
        });

        // ==================== TOAST ====================
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
