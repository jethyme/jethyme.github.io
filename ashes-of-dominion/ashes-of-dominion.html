<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link rel="icon" href="data:,">
    <title>Ashes of Dominion - Задачи</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ashes of Dominion</h1>
            <div class="header-controls">
                <button id="loginBtn" class="btn-small btn-secondary" onclick="openAuthModal()">🔐 Вход</button>
                <div id="userContainer" class="user-info" style="display: none;">
                    <div class="user-badge" id="userBadge"></div>
                    <span id="userEmail"></span>
                    <button class="btn-small btn-secondary" onclick="logout()">Выйти</button>
                </div>
                <button class="btn-small btn-secondary" onclick="openAssigneesPanel()">👥</button>
                <div class="view-toggle">
                    <button class="btn-secondary active" onclick="setView('list')">📋</button>
                    <button class="btn-secondary" onclick="setView('kanban')">📊</button>
                </div>
                <button class="btn-primary" onclick="openAddModal()" id="addTaskBtn" disabled>+ Задача</button>
            </div>
        </header>

        <div class="filters">
            <div class="filter-dropdown">
                <button class="filter-btn" onclick="toggleFilterDropdown('assignee')" id="filterAssigneeBtn">
                    👥 Исполнители <span id="filterAssigneeCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterAssigneeDropdown"></div>
            </div>
            <div class="filter-dropdown">
                <button class="filter-btn" onclick="toggleFilterDropdown('priority')" id="filterPriorityBtn">
                    ⚡ Приоритет <span id="filterPriorityCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterPriorityDropdown"></div>
            </div>
            <div class="filter-dropdown">
                <button class="filter-btn" onclick="toggleFilterDropdown('status')" id="filterStatusBtn">
                    📊 Статус <span id="filterStatusCount"></span>
                </button>
                <div class="filter-dropdown-content" id="filterStatusDropdown"></div>
            </div>
            <button class="filter-reset" onclick="resetFilters()">✕ Сбросить</button>
        </div>

        <div id="taskList" class="task-list">
            <div class="task-row header">
                <span></span>
                <span>Задача</span>
                <span>Приоритет</span>
                <span>Статус</span>
                <span>Исполнители</span>
                <span>Действия</span>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div id="kanbanBoard" class="kanban-board">
            <div class="kanban-column" data-status="queue" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'queue')">
                <h3>📝 В очереди</h3>
                <div class="kanban-column-content" id="queueTasks"></div>
            </div>
            <div class="kanban-column" data-status="progress" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'progress')">
                <h3>🔄 В работе</h3>
                <div class="kanban-column-content" id="progressTasks"></div>
            </div>
            <div class="kanban-column" data-status="review" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'review')">
                <h3>👀 На проверке</h3>
                <div class="kanban-column-content" id="reviewTasks"></div>
            </div>
            <div class="kanban-column" data-status="done" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'done')">
                <h3>✅ Готово</h3>
                <div class="kanban-column-content" id="doneTasks"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Задача</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Цвет</label>
                    <div id="taskColorPicker" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
                    <input type="hidden" id="taskColor">
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="taskPriority">
                        <option value="low">Низкий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="high">Высокий</option>
                        <option value="critical">Критичный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="taskStatus">
                        <option value="queue">В очереди</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнители</label>
                    <div id="taskAssigneesSelect" class="assignees-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно подзадачи -->
    <div id="subtaskModal" class="modal">
        <div class="modal-content">
            <h2 id="subtaskModalTitle">Подзадача</h2>
            <form id="subtaskForm">
                <input type="hidden" id="subtaskTaskId">
                <input type="hidden" id="subtaskParentId">
                <input type="hidden" id="subtaskId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="subtaskTitle" required>
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="subtaskPriority">
                        <option value="low">Низкий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="high">Высокий</option>
                        <option value="critical">Критичный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="subtaskStatus">
                        <option value="queue">В очереди</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнители</label>
                    <div id="subtaskAssigneesSelect" class="assignees-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeSubtaskModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно авторизации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Вход</h2>
            <div class="auth-tabs">
                <button class="btn-secondary active" onclick="showAuthTab('login')">Вход</button>
                <button class="btn-secondary" onclick="showAuthTab('register')">Регистрация</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Войти</button>
                </div>
            </form>
            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Панель исполнителей -->
    <div id="assigneesPanel" class="modal">
        <div class="modal-content">
            <h2>👥 Исполнители</h2>
            <div class="add-assignee-row">
                <input type="text" id="newAssigneeName" placeholder="Имя исполнителя">
                <button class="btn-primary" onclick="addAssignee()">Добавить</button>
            </div>
            <div id="assigneesList"></div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeAssigneesPanel()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0"></script>
    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script src="render.js"></script>
    <script src="handlers.js"></script>
    <script src="app.js"></script>
</body>
</html>
