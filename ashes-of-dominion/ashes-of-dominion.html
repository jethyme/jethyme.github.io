<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ashes of Dominion - Задачи</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

        :root {
            --bg-0: #0b0d16;
            --bg-1: #101628;
            --bg-2: #0c101e;
            --panel: rgba(18, 24, 46, 0.78);
            --panel-strong: rgba(15, 21, 41, 0.95);
            --stroke: rgba(160, 174, 255, 0.16);
            --stroke-strong: rgba(233, 69, 96, 0.35);
            --text: #eef2ff;
            --muted: #a7b0d6;
            --accent: #e94560;
            --accent-2: #f7c35c;
            --accent-3: #64d2ff;
            --success: #5adfa6;
            --warning: #f6b26b;
            --danger: #f26d7d;
            --shadow-lg: 0 25px 60px rgba(6, 8, 16, 0.45);
            --shadow-md: 0 12px 30px rgba(6, 8, 16, 0.35);
            --shadow-sm: 0 6px 14px rgba(6, 8, 16, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background:
                radial-gradient(1200px 600px at 10% -10%, rgba(233, 69, 96, 0.28), transparent 60%),
                radial-gradient(900px 500px at 90% -5%, rgba(100, 210, 255, 0.2), transparent 60%),
                linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
            min-height: 100vh;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            inset: -20% -10% auto -10%;
            height: 70%;
            background:
                radial-gradient(60% 60% at 30% 30%, rgba(247, 195, 92, 0.18), transparent 70%),
                radial-gradient(50% 70% at 70% 40%, rgba(81, 197, 255, 0.16), transparent 75%);
            filter: blur(22px);
            z-index: -2;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.35;
            z-index: -1;
            pointer-events: none;
        }

        .container { max-width: 1700px; margin: 0 auto; padding: 24px; }
        header {
            text-align: center;
            padding: 24px 20px;
            border: 1px solid var(--stroke);
            border-radius: 18px;
            background: linear-gradient(135deg, rgba(233, 69, 96, 0.16), rgba(26, 36, 78, 0.7));
            box-shadow: var(--shadow-lg);
            margin-bottom: 22px;
            position: relative;
            overflow: hidden;
        }
        header::after {
            content: '';
            position: absolute;
            inset: auto 0 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent-3), transparent);
            opacity: 0.7;
        }
        header h1 {
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 2.2em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-shadow: 0 6px 20px rgba(233, 69, 96, 0.35);
        }
        .header-controls { display: flex; justify-content: center; gap: 15px; margin-top: 12px; flex-wrap: wrap; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            background: rgba(15, 22, 44, 0.75);
            border: 1px solid var(--stroke);
            border-radius: 999px;
            font-size: 0.85em;
            box-shadow: var(--shadow-sm);
        }
        .user-badge { width: 8px; height: 8px; border-radius: 50%; background: var(--success); }
        .user-badge.readonly { background: var(--warning); }

        button {
            padding: 9px 16px;
            border: 1px solid var(--stroke);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border 0.2s ease;
            white-space: nowrap;
            color: var(--text);
            background: rgba(16, 22, 44, 0.7);
        }
        button:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        button:active { transform: translateY(0); }
        button:focus-visible { outline: 2px solid var(--accent-3); outline-offset: 2px; }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff7a88);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 12px 24px rgba(233, 69, 96, 0.25);
        }
        .btn-primary:hover { filter: saturate(1.1); }
        .btn-primary:disabled { background: rgba(120, 120, 120, 0.4); cursor: not-allowed; box-shadow: none; }
        .btn-secondary { background: rgba(16, 22, 44, 0.8); }
        .btn-secondary.active {
            background: linear-gradient(135deg, rgba(100, 210, 255, 0.25), rgba(233, 69, 96, 0.2));
            border-color: var(--stroke-strong);
        }
        .btn-small { padding: 7px 12px; font-size: 12px; border-radius: 999px; }
        .btn-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(20, 30, 58, 0.8);
            color: #fff;
            font-size: 14px;
            padding: 0;
            border: 1px solid var(--stroke);
        }
        .btn-icon:hover { border-color: var(--stroke-strong); box-shadow: var(--shadow-sm); }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .left-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .view-toggle {
            display: flex;
            gap: 6px;
            padding: 4px;
            border-radius: 999px;
            background: rgba(12, 18, 34, 0.65);
            border: 1px solid var(--stroke);
        }
        .view-toggle button { border-radius: 999px; }
        .filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(15, 22, 44, 0.75);
            padding: 12px 16px;
            border-radius: 14px;
            margin-bottom: 16px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow-sm);
        }
        .filters label {
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.85em;
            color: var(--muted);
        }
        .filters select {
            padding: 7px 10px;
            border: 1px solid var(--stroke);
            border-radius: 8px;
            background: rgba(9, 14, 28, 0.9);
            color: var(--text);
            font-size: 13px;
            appearance: none;
        }

        .task-list {
            background: var(--panel);
            border-radius: 16px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow-md);
            overflow-x: auto;
        }
        .task-row, .subtask-item { min-width: 760px; }
        .task-row {
            display: grid;
            grid-template-columns: 35px 1fr 90px 100px 180px 140px;
            align-items: center;
            padding: 12px 16px 12px 10px;
            border-bottom: 1px solid rgba(160, 174, 255, 0.08);
            gap: 10px;
            background: rgba(17, 23, 45, 0.65);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }
        .task-row:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); background: rgba(24, 32, 58, 0.75); }
        .task-row.header {
            background: rgba(26, 36, 68, 0.9);
            font-weight: 600;
            font-size: 0.75em;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            position: sticky;
            top: 0;
            z-index: 2;
        }
        .expand-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(26, 36, 72, 0.8);
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s ease, transform 0.2s ease;
            border: 1px solid var(--stroke);
        }
        .expand-btn:hover { background: rgba(233, 69, 96, 0.25); border-color: var(--stroke-strong); transform: translateY(-1px); }
        .task-title {
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .task-title-main {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75em;
            color: var(--muted);
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            min-width: 60px;
        }
        .progress-bar span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, var(--accent-3), var(--accent));
            border-radius: 999px;
        }
        .status-badge, .priority-badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 0.72em;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.12);
            letter-spacing: 0.02em;
        }
        .status-queue { background: rgba(130, 140, 170, 0.25); color: #d7dbf0; }
        .status-progress { background: rgba(100, 210, 255, 0.2); color: #c9f1ff; }
        .status-review { background: rgba(247, 195, 92, 0.25); color: #ffe7bf; }
        .status-done { background: rgba(90, 223, 166, 0.2); color: #d6ffef; }
        .priority-low { background: rgba(90, 223, 166, 0.18); color: #d6ffef; }
        .priority-medium { background: rgba(100, 210, 255, 0.18); color: #c9f1ff; }
        .priority-high { background: rgba(247, 195, 92, 0.22); color: #ffe7bf; }
        .priority-critical { background: rgba(242, 109, 125, 0.25); color: #ffd0d7; }
        .assignees-list { display: flex; gap: 6px; flex-wrap: wrap; overflow: hidden; }
        .assignee-tag {
            background: rgba(233, 69, 96, 0.18);
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 0.75em;
            white-space: nowrap;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(233, 69, 96, 0.4);
        }
        .task-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .subtask-item {
            display: grid;
            grid-template-columns: 35px 1fr 90px 100px 180px 140px;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(160, 174, 255, 0.06);
            gap: 10px;
            background: rgba(13, 20, 40, 0.7);
        }
        .subtask-item.level-0 { background: rgba(13, 24, 46, 0.75); }
        .subtask-item.level-1 { background: rgba(11, 22, 40, 0.75); }
        .subtask-item.level-2 { background: rgba(9, 18, 34, 0.78); }
        .subtask-item.level-3 { background: rgba(7, 16, 28, 0.8); }
        .task-subtasks { background: rgba(9, 14, 30, 0.35); }

        .kanban-board {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
            align-items: start;
        }
        .kanban-board.active { display: grid; }
        .kanban-column {
            background: var(--panel);
            border-radius: 16px;
            padding: 14px;
            min-height: 420px;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }
        .kanban-column.drag-over {
            border-color: var(--stroke-strong);
            box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.25), var(--shadow-md);
            background: rgba(26, 36, 68, 0.85);
        }
        .kanban-column h3 {
            text-align: center;
            padding: 10px;
            margin-bottom: 12px;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .kanban-card {
            background: rgba(16, 22, 44, 0.9);
            border-radius: 14px;
            margin-bottom: 12px;
            overflow: hidden;
            cursor: grab;
            border: 1px solid rgba(160, 174, 255, 0.12);
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border 0.2s ease;
        }
        .kanban-card:hover { transform: translateY(-2px); border-color: var(--stroke-strong); }
        .kanban-card.dragging { opacity: 0.5; }
        .kanban-card-header {
            padding: 12px 14px;
            background: linear-gradient(135deg, rgba(36, 52, 96, 0.9), rgba(20, 30, 58, 0.9));
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .kanban-card-header .title {
            font-weight: 600;
            font-size: 0.92em;
            flex: 1;
            min-width: 120px;
        }
        .kanban-card-header .meta { display: flex; gap: 6px; flex-shrink: 0; }
        .kanban-card-header .assignees { display: flex; gap: 4px; flex-shrink: 0; flex-wrap: wrap; }
        .kanban-children {
            padding: 10px 12px;
            background: rgba(11, 16, 32, 0.7);
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }
        .kanban-child {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            margin-bottom: 6px;
            background: rgba(22, 30, 54, 0.9);
            border-radius: 8px;
            font-size: 0.85em;
            cursor: grab;
            border: 1px solid rgba(160, 174, 255, 0.12);
        }
        .kanban-child.depth-1 { border-left: 3px solid rgba(247, 195, 92, 0.7); }
        .kanban-child.depth-2 { border-left: 3px solid rgba(100, 210, 255, 0.7); }
        .kanban-child.depth-3 { border-left: 3px solid rgba(233, 69, 96, 0.7); }
        .kanban-child:last-child { margin-bottom: 0; }
        .kanban-child.dragging { opacity: 0.5; }
        .kanban-child .name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }
        .kanban-child .meta { display: flex; gap: 5px; flex-shrink: 0; }
        .kanban-child .breadcrumb { font-size: 0.72em; color: var(--muted); }
        .kanban-empty {
            padding: 18px;
            text-align: center;
            color: var(--muted);
            font-size: 0.85em;
            border: 1px dashed rgba(160, 174, 255, 0.25);
            border-radius: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(5, 7, 14, 0.75);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--panel-strong);
            padding: 26px;
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            max-height: 82vh;
            overflow-y: auto;
            border: 1px solid var(--stroke);
            box-shadow: var(--shadow-lg);
        }
        .modal-content h2 { color: #fff; margin-bottom: 18px; font-size: 1.3em; font-family: 'Cinzel', serif; letter-spacing: 0.08em; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--muted); font-size: 0.88em; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 9px 10px;
            border: 1px solid var(--stroke);
            border-radius: 10px;
            background: rgba(9, 14, 28, 0.9);
            color: var(--text);
            font-size: 13px;
        }
        .assignees-select {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
            background: rgba(10, 16, 32, 0.8);
            border: 1px solid var(--stroke);
            border-radius: 12px;
            max-height: 160px;
            overflow-y: auto;
        }
        .assignee-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            background: rgba(26, 36, 72, 0.8);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85em;
            white-space: nowrap;
            border: 1px solid rgba(160, 174, 255, 0.2);
        }
        .assignee-checkbox:hover { border-color: var(--stroke-strong); }
        .assignee-checkbox.checked { background: rgba(233, 69, 96, 0.3); border-color: var(--stroke-strong); }
        .assignee-checkbox input { width: auto; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
        .hidden { display: none; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .auth-tabs button { flex: 1; }
        .add-assignee-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .add-assignee-row input { flex: 1; }
        .assignee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: rgba(16, 22, 44, 0.9);
            margin: 6px 0;
            border-radius: 10px;
            font-size: 0.9em;
            border: 1px solid rgba(160, 174, 255, 0.12);
        }
        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 20px;
            background: var(--panel-strong);
            border-left: 4px solid var(--accent);
            border-radius: 10px;
            z-index: 2000;
            box-shadow: var(--shadow-md);
        }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header, .filters, .task-list { animation: riseIn 0.6s ease both; }
        .kanban-column { animation: riseIn 0.6s ease both; }

        @media (max-width: 1200px) {
            .kanban-board { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 820px) {
            .kanban-board { grid-template-columns: 1fr; }
            .filters { flex-direction: column; align-items: stretch; }
            .controls { flex-direction: column; align-items: stretch; }
            .left-controls { justify-content: space-between; }
        }
        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏰 Ashes of Dominion</h1>
            <div class="header-controls">
                <div id="userContainer" class="user-info" style="display: none;">
                    <div class="user-badge" id="userBadge"></div>
                    <span id="userEmail"></span>
                    <button class="btn-small btn-secondary" onclick="logout()">Выйти</button>
                </div>
                <button id="loginBtn" class="btn-small btn-secondary" onclick="openAuthModal()">🔐 Вход</button>
                <button class="btn-small btn-secondary" onclick="openAssigneesPanel()">👥 Исполнители</button>
            </div>
        </header>

        <div class="controls">
            <div class="left-controls">
                <div class="view-toggle">
                    <button class="btn-secondary active" onclick="setView('list')">📋 Список</button>
                    <button class="btn-secondary" onclick="setView('kanban')">📊 Канбан</button>
                </div>
                <button class="btn-primary" onclick="openAddModal()" id="addTaskBtn" disabled>+ Задача</button>
            </div>
        </div>

        <div class="filters">
            <label>Исполнитель:
                <select id="filterAssignee" onchange="applyFilters()">
                    <option value="">Все</option>
                </select>
            </label>
            <label>Приоритет:
                <select id="filterPriority" onchange="applyFilters()">
                    <option value="">Все</option>
                    <option value="low">Низкий</option>
                    <option value="medium">Средний</option>
                    <option value="high">Высокий</option>
                    <option value="critical">Критичный</option>
                </select>
            </label>
            <label>Статус:
                <select id="filterStatus" onchange="applyFilters()">
                    <option value="">Все</option>
                    <option value="queue">В очереди</option>
                    <option value="progress">В работе</option>
                    <option value="review">На проверке</option>
                    <option value="done">Готово</option>
                </select>
            </label>
        </div>

        <div id="taskList" class="task-list">
            <div class="task-row header">
                <span></span>
                <span>Задача</span>
                <span>Приоритет</span>
                <span>Статус</span>
                <span>Исполнители</span>
                <span>Действия</span>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div id="kanbanBoard" class="kanban-board">
            <div class="kanban-column" data-status="queue" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'queue')">
                <h3>📝 В очереди</h3>
                <div id="queueTasks"></div>
            </div>
            <div class="kanban-column" data-status="progress" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'progress')">
                <h3>🔄 В работе</h3>
                <div id="progressTasks"></div>
            </div>
            <div class="kanban-column" data-status="review" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'review')">
                <h3>👀 На проверке</h3>
                <div id="reviewTasks"></div>
            </div>
            <div class="kanban-column" data-status="done" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'done')">
                <h3>✅ Готово</h3>
                <div id="doneTasks"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Задача</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="taskPriority">
                        <option value="low">Низкий</option>

    <script>
        const SUPABASE_URL = 'https://nrrqiedzcwmgzqkmaret.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1edDcYXXILaZ27t7oMEWMA_KIt2Ivck';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tasks = [], assignees = [], currentUser = null, canEdit = false;
        let expandedTasks = new Set();
        let expandedSubtasks = new Set();
        let draggedItem = null; // { type: 'task'|'subtask', taskId, subtaskId }
        let filterAssignee = '', filterPriority = '', filterStatus = '';

        // Порядок статусов: 0=самый ранний, 3=самый поздний
        const STATUS_ORDER = window.STATUS_ORDER || { queue: 0, progress: 1, review: 2, done: 3 };
        const STATUS_LABELS = { queue: 'В очереди', progress: 'В работе', review: 'На проверке', done: 'Готово' };
        const PRIORITY_LABELS = { low: 'Низкий', medium: 'Средний', high: 'Высокий', critical: 'Критичный' };

        const hasSubtasks = window.hasSubtasks || function hasSubtasks(task) {
            return Array.isArray(task?.subtasks) && task.subtasks.length > 0;
        };

        const getSubtaskStats = window.getSubtaskStats || function getSubtaskStats(subtasks) {
            const all = [];
            const walk = (nodes) => {
                (nodes || []).forEach(n => {
                    all.push(n);
                    const kids = n.children || n.subtasks || [];
                    if (kids.length > 0) walk(kids);
                });
            };
            walk(subtasks);
            const total = all.length;
            const done = all.filter(n => n.status === 'done').length;
            return { total, done };
        };

        const renderProgressMeta = window.renderProgressMeta || function renderProgressMeta(subtasks) {
            const stats = getSubtaskStats(subtasks);
            if (!stats.total) return '';
            const pct = Math.round((stats.done / stats.total) * 100);
            return `<div class="task-meta"><span>${stats.done}/${stats.total} задач</span><div class="progress-bar"><span style="width:${pct}%"></span></div></div>`;
        };

        const calculateTaskAssignees = window.calculateTaskAssignees || function calculateTaskAssignees(subtasks) {
            const allAssignees = new Set();
            const collectAssignees = (nodes) => {
                for (const n of nodes) {
                    if (n.assignees) {
                        n.assignees.forEach(a => allAssignees.add(String(a)));
                    }
                    const children = n.children || n.subtasks || [];
                    if (children.length > 0) collectAssignees(children);
                }
            };
            collectAssignees(subtasks || []);
            return Array.from(allAssignees);
        };

        const normalizeSubtasksTree = window.normalizeSubtasksTree || function normalizeSubtasksTree(subtasks) {
            const normalize = (nodes) => (nodes || []).map(node => {
                const { subtasks: legacySubtasks, children: existingChildren, ...rest } = node || {};
                const currentChildren = Array.isArray(existingChildren) ? existingChildren : [];
                const legacyChildren = Array.isArray(legacySubtasks) ? legacySubtasks : [];
                const rawChildren = currentChildren.length > 0 ? currentChildren : legacyChildren;
                const children = normalize(rawChildren);
                if (children.length === 0) {
                    return {
                        ...rest,
                        status: STATUS_ORDER.hasOwnProperty(node.status) ? node.status : 'queue',
                        assignees: node.assignees || [],
                        children: []
                    };
                }
                const status = calculateTaskStatus(children);
                const assignees = calculateTaskAssignees(children);
                return { ...rest, status, assignees, children };
            });
            return normalize(subtasks || []);
        };

        const calculateNodeAssignees = window.calculateNodeAssignees || function calculateNodeAssignees(node) {
            const allAssignees = new Set();
            if (node.assignees) {
                node.assignees.forEach(a => allAssignees.add(String(a)));
            }
            const children = node.children || node.subtasks || [];
            if (children.length > 0) {
                children.forEach(child => {
                    calculateNodeAssignees(child).forEach(a => allAssignees.add(a));
                });
            }
            return Array.from(allAssignees);
        };

        const calculateTaskStatus = window.calculateTaskStatus || function calculateTaskStatus(subtasks) {
            if (!subtasks || subtasks.length === 0) return 'queue';

            const getAllSubtasks = (nodes) => {
                let result = [];
                for (const n of nodes) {
                    result.push(n);
                    const kids = n.children || n.subtasks || [];
                    if (kids.length > 0) result = result.concat(getAllSubtasks(kids));
                }
                return result;
            };

            const allSubtasks = getAllSubtasks(subtasks);
            if (allSubtasks.length === 0) return 'queue';

            let minStatus = 'done';
            let minOrder = STATUS_ORDER.done;

            for (const sub of allSubtasks) {
                const order = STATUS_ORDER[sub.status] || 0;
                if (order < minOrder) {
                    minOrder = order;
                    minStatus = sub.status;
                }
            }

            return minStatus;
        };

        const elevateSameStatusSubtasks = window.elevateSameStatusSubtasks || function elevateSameStatusSubtasks(subtasks, oldStatus, newStatus) {
            const elevate = (nodes) => (nodes || []).map(n => {
                const rawChildren = n.children || n.subtasks || [];
                const newChildren = rawChildren.length > 0 ? elevate(rawChildren) : [];
                if (n.status === oldStatus) {
                    return { ...n, status: newStatus, children: newChildren };
                }
                return { ...n, children: newChildren };
            });
            return elevate(subtasks);
        };

async function checkAuth() {

        function renderAssigneesList() {

                <div class="assignee-item">

        async function addAssignee() {
            const input = document.getElementById('newAssigneeName');
            const name = input.value.trim();
            if (!name || !canEdit) return;

        async function deleteAssignee(id) {
            if (!canEdit || !confirm('Удалить?')) return;
            await sbClient.from('assignees').delete().eq('id', id);

        async function loadTasks() {
            const { data } = await sbClient.from('tasks').select('*').order('created_at', { ascending: false });
            tasks = (data || []).map(t => ({
                ...t,
                assignees: t.assignees ? t.assignees.split(',').filter(a => a) : [],
                subtasks: typeof t.subtasks === 'string' ? JSON.parse(t.subtasks || '[]') : (t.subtasks || [])
            }));
            // Обновляем статусы задач на основе подзадач только если они есть
            // Assignees обновляем только если есть подзадачи (иначе сохраняем ручные)
            tasks.forEach(task => {
                task.subtasks = normalizeSubtasksTree(task.subtasks);
                if (hasSubtasks(task)) {
                    task.status = calculateTaskStatus(task.subtasks);
                    task.assignees = calculateTaskAssignees(task.subtasks);
                } else {
                    task.status = task.status || 'queue';
                    task.assignees = task.assignees || [];
                }
            });
            renderTasks();
        }
        
        

        async function saveTask(taskData) {
            if (!canEdit) { showToast('Только для редакторов', 'error'); return false; }
            
            const task = tasks.find(t => t.id === taskData.id);
            let newSubtasks = taskData.subtasks || [];
            
            // Если меняем статус задачи на более поздний — поднимаем подзадачи того же статуса
            if (task && taskData.status !== task.status) {
                const oldOrder = STATUS_ORDER[task.status] ?? 0;
                const newOrder = STATUS_ORDER[taskData.status] ?? 0;
                
                if (newOrder > oldOrder) {
                    // Двигаем вперёд — поднимаем подзадачи с тем же статусом
                    newSubtasks = elevateSameStatusSubtasks(newSubtasks, task.status, taskData.status);
                }
            }

            newSubtasks = normalizeSubtasksTree(newSubtasks);
            
            const hasSubs = newSubtasks && newSubtasks.length > 0;
            const newStatus = hasSubs ? calculateTaskStatus(newSubtasks) : (taskData.status || 'queue');
            const newAssignees = hasSubs ? calculateTaskAssignees(newSubtasks) : (taskData.assignees || []);
            
            if (taskData.id) {
                await sbClient.from('tasks').update({
                    title: taskData.title,
                    priority: taskData.priority,
                    status: newStatus,
                    assignees: newAssignees.join(','),
                    subtasks: JSON.stringify(newSubtasks)
                }).eq('id', taskData.id);
            } else {
                await sbClient.from('tasks').insert([{
                    title: taskData.title,
                    priority: taskData.priority,
                    status: newStatus,
                    assignees: newAssignees.join(','),
                    subtasks: JSON.stringify(newSubtasks)
                }]);
            }
            await loadTasks();
            showToast('Сохранено', 'success');
            return true;
        }
        
        

        async function deleteTask(id) {
            if (!canEdit || !confirm('Удалить?')) return;
            await sbClient.from('tasks').delete().eq('id', id);
            await loadTasks();
            showToast('Удалено', 'success');
        }

        async function updateTaskStatus(taskId, newStatus) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const oldOrder = STATUS_ORDER[task.status] ?? 0;
            const newOrder = STATUS_ORDER[newStatus] ?? 0;
            
            let newSubtasks = task.subtasks;
            
            // Если двигаем вперёд — поднимаем подзадачи того же статуса
            if (hasSubtasks(task) && newOrder > oldOrder) {
                newSubtasks = elevateSameStatusSubtasks(task.subtasks, task.status, newStatus);
            }

            newSubtasks = normalizeSubtasksTree(newSubtasks);
            task.subtasks = newSubtasks;
            if (hasSubtasks(task)) {
                task.status = calculateTaskStatus(task.subtasks);
                task.assignees = calculateTaskAssignees(task.subtasks);
            } else {
                task.status = newStatus;
                task.assignees = task.assignees || [];
            }

            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(newSubtasks),
                assignees: task.assignees.join(',')
            }).eq('id', taskId);
            await loadTasks();
        }

        async function updateSubtaskStatus(taskId, subtaskId, newStatus) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const updateInTree = (nodes) => nodes.map(n => {
                if (n.id === subtaskId) {
                    const oldStatus = n.status;
                    const oldOrder = STATUS_ORDER[oldStatus] ?? 0;
                    const newOrder = STATUS_ORDER[newStatus] ?? 0;
                    let nextChildren = n.children || n.subtasks || [];
                    if (newOrder > oldOrder && nextChildren.length > 0) {
                        nextChildren = elevateSameStatusSubtasks(nextChildren, oldStatus, newStatus);
                    }
                    return { ...n, status: newStatus, children: nextChildren };
                }
                const kids = n.children || n.subtasks || [];
                if (kids.length > 0) {
                    return { ...n, children: updateInTree(kids) };
                }
                return n;
            });
            
            task.subtasks = normalizeSubtasksTree(updateInTree(task.subtasks));
            if (hasSubtasks(task)) {
                task.status = calculateTaskStatus(task.subtasks);
                task.assignees = calculateTaskAssignees(task.subtasks);
            }
            
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks),
                assignees: task.assignees.join(',')
            }).eq('id', taskId);
            await loadTasks();
        }

        async function saveSubtask(taskId, subtaskData) {
            if (!canEdit) { showToast('Только для редакторов', 'error'); return false; }
            const task = tasks.find(t => t.id === taskId);
            if (!task) return false;

            if (subtaskData.id) {
                const updateInTree = (nodes) => nodes.map(n => {
                    if (n.id === subtaskData.id) {
                        return { ...n, title: subtaskData.title, priority: subtaskData.priority, status: subtaskData.status, assignees: subtaskData.assignees };
                    }
                    if (n.children) return { ...n, children: updateInTree(n.children) };
                    return n;
                });
                task.subtasks = updateInTree(task.subtasks);
            } else {
                const newSubtask = {
                    id: Date.now(),
                    title: subtaskData.title,
                    priority: subtaskData.priority,
                    status: subtaskData.status,
                    assignees: subtaskData.assignees,
                    children: []
                };
                if (subtaskData.parentId) {
                    const addToParent = (nodes) => nodes.map(n => {
                        if (n.id === subtaskData.parentId) return { ...n, children: [...(n.children || []), newSubtask] };
                        if (n.children) return { ...n, children: addToParent(n.children) };
                        return n;
                    });
                    task.subtasks = addToParent(task.subtasks);
                } else {
                    task.subtasks.push(newSubtask);
                }
            }
            
            task.subtasks = normalizeSubtasksTree(task.subtasks);
            if (hasSubtasks(task)) {
                task.status = calculateTaskStatus(task.subtasks);
                task.assignees = calculateTaskAssignees(task.subtasks);
            } else {
                task.assignees = task.assignees || [];
            }
            
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks),
                assignees: task.assignees.join(',')
            }).eq('id', taskId);
            await loadTasks();
            showToast('Подзадача сохранена', 'success');
            return true;
        }

        async function deleteSubtask(taskId, subtaskId) {
            if (!canEdit || !confirm('Удалить?')) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            const deleteFromTree = (nodes) => nodes.filter(n => n.id !== subtaskId).map(n => ({
                ...n, children: n.children ? deleteFromTree(n.children) : []
            }));
            task.subtasks = normalizeSubtasksTree(deleteFromTree(task.subtasks));
            if (hasSubtasks(task)) {
                task.status = calculateTaskStatus(task.subtasks);
                task.assignees = calculateTaskAssignees(task.subtasks);
            } else {
                task.status = task.status || 'queue';
                task.assignees = task.assignees || [];
            }
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks),
                assignees: task.assignees.join(',')
            }).eq('id', taskId);
            await loadTasks();
            showToast('Удалено', 'success');
        }

        function applyFilters() {

        function matchesFilters(task) {
            if (filterAssignee && !task.assignees.includes(filterAssignee)) return false;
            if (filterPriority && task.priority !== filterPriority) return false;
            if (filterStatus && task.status !== filterStatus) return false;
            return true;
        }

        function renderTasks() {

            const filteredTasks = tasks.filter(matchesFilters);

        function renderTaskRow(task) {
            const assigneeNames = calculateNodeAssignees(task).map(id => { 
                const a = assignees.find(x => x.id == id); 
                return a ? a.name : id; 
            });
            const isExpanded = expandedTasks.has(task.id);
            const hasSubtasks = task.subtasks && task.subtasks.length > 0;
            const progressMeta = renderProgressMeta(task.subtasks);
            
            return `
                <div class="task-row" id="task-${task.id}">
                    <div class="expand-btn" onclick="toggleTask(${task.id})">${hasSubtasks ? (isExpanded ? '▼' : '▶') : ''}</div>
                    <div class="task-title">
                        <div class="task-title-main">${task.title}</div>
                        ${progressMeta}
                    </div>
                    <div><span class="priority-badge priority-${task.priority || 'medium'}">${PRIORITY_LABELS[task.priority || 'medium']}</span></div>
                    <div><span class="status-badge status-${task.status}">${STATUS_LABELS[task.status]}</span></div>
                    <div class="assignees-list">${assigneeNames.map(a => `<span class="assignee-tag">${a}</span>`).join('')}</div>
                    <div class="task-actions">
                        ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${task.id}, null, null)" title="Добавить подзадачу">➕</button>` : ''}
                        ${canEdit ? `<button class="btn-icon" onclick="editTask(${task.id})" title="Редактировать">📝</button>` : ''}
                        ${canEdit ? `<button class="btn-icon" onclick="deleteTask(${task.id})" title="Удалить">🗑️</button>` : ''}
                    </div>
                </div>
                <div class="task-subtasks" id="subtasks-${task.id}" style="display:${isExpanded ? 'block' : 'none'}">
                    ${renderSubtaskTree(task.subtasks, task.id, 0)}
                </div>
            `;
        }

        function renderSubtaskTree(subtasks, taskId, level) {
            if (!subtasks || subtasks.length === 0) return '';
            return subtasks.map(sub => {
                const childNodes = sub.children || sub.subtasks || [];
                const hasChildren = childNodes.length > 0;
                const subAssignees = calculateNodeAssignees(sub).map(id => { 
                    const a = assignees.find(x => x.id == id); 
                    return a ? a.name : id; 
                });
                const isExpanded = expandedSubtasks.has(sub.id);
                const levelClass = 'level-' + Math.min(level, 3);
                const indent = level * 25;
                
                return `
                    <div class="subtask-item ${levelClass}" style="padding-left:${indent + 15}px">
                        <div class="expand-btn" onclick="toggleSubtask(${sub.id})">${hasChildren ? (isExpanded ? '▼' : '▶') : ''}</div>
                        <div class="task-title"><div class="task-title-main">${sub.title}</div></div>
                        <div><span class="priority-badge priority-${sub.priority || 'medium'}">${PRIORITY_LABELS[sub.priority || 'medium']}</span></div>
                        <div><span class="status-badge status-${sub.status}">${STATUS_LABELS[sub.status]}</span></div>
                        <div class="assignees-list">${subAssignees.map(a => `<span class="assignee-tag">${a}</span>`).join('')}</div>
                        <div class="task-actions">
                            ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${taskId}, null, ${sub.id})" title="Добавить дочернюю">➕</button>` : ''}
                            ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${taskId}, ${sub.id})" title="Редактировать">📝</button>` : ''}
                            ${canEdit ? `<button class="btn-icon" onclick="deleteSubtask(${taskId}, ${sub.id})" title="Удалить">🗑️</button>` : ''}
                        </div>
                    </div>
                    ${isExpanded && hasChildren ? renderSubtaskTree(childNodes, taskId, level + 1) : ''}
                `;
            }).join('');
        }

        function renderKanban() {
            const columns = { queue: [], progress: [], review: [], done: [] };
            
            tasks.filter(matchesFilters).forEach(task => {
                const taskStatus = STATUS_ORDER.hasOwnProperty(task.status) ? task.status : 'queue';
                columns[taskStatus].push({ type: 'task', task: task });
                
                const collectSubtasks = (subtasks, rootTaskId, parentSubtaskId, depth) => {
                    subtasks.forEach(sub => {
                        const subStatus = STATUS_ORDER.hasOwnProperty(sub.status) ? sub.status : 'queue';
                        columns[subStatus].push({
                            type: 'subtask',
                            task: sub,
                            rootTaskId: rootTaskId,
                            parentSubtaskId: parentSubtaskId,
                            depth: depth
                        });
                        const kids = sub.children || sub.subtasks || [];
                        if (kids.length > 0) collectSubtasks(kids, rootTaskId, sub.id, depth + 1);
                    });
                };
                collectSubtasks(task.subtasks || [], task.id, null, 0);
            });
            
            Object.keys(columns).forEach(status => {
                const container = document.getElementById(status + 'Tasks');
                container.innerHTML = renderKanbanColumn(columns[status]);
            });
        }
        
        function renderKanbanColumn(items) {
            const result = [];
            const consumedSubtasks = new Set();
            const subtasksByRoot = new Map();

            items.filter(i => i.type === 'subtask').forEach(sub => {
                const list = subtasksByRoot.get(sub.rootTaskId) || [];
                list.push(sub);
                subtasksByRoot.set(sub.rootTaskId, list);
            });

            let i = 0;
            while (i < items.length) {
                const item = items[i];
                if (item.type === 'task') {
                    const related = subtasksByRoot.get(item.task.id) || [];
                    if (related.length > 0) {
                        related.forEach(s => consumedSubtasks.add(s.task.id));
                        result.push({ type: 'nested', task: item.task, subtasks: related });
                    } else {
                        result.push({ type: 'task', task: item.task });
                    }
                } else if (!consumedSubtasks.has(item.task.id)) {
                    result.push({ type: 'subtask', item: item });
                }
                i++;
            }

            return result.map(entry => {
                if (entry.type === 'nested') return renderKanbanNested(entry.task, entry.subtasks);
                if (entry.type === 'task') return renderKanbanCard(entry.task, null, 0);
                return renderKanbanCard(entry.item.task, entry.item.rootTaskId, entry.item.depth, entry.item.parentSubtaskId);
            }).join('') || '<div class="kanban-empty">Пусто</div>';
        }
        
        function renderKanbanCard(task, rootTaskId, depth, parentSubtaskId = null) {
            const assigneeNames = calculateNodeAssignees(task).map(id => { 
                const a = assignees.find(x => x.id == id); 
                return a ? a.name : id; 
            });
            
            const isTask = !rootTaskId;
            const depthClass = !isTask ? ' depth-' + Math.min(depth + 1, 3) : '';
            const cardClass = isTask ? 'kanban-card' : ('kanban-child' + depthClass);
            const clickHandler = isTask
                ? (canEdit ? 'editTask(' + task.id + ')' : '')
                : (canEdit ? 'openSubtaskModal(' + rootTaskId + ',' + task.id + ')' : '');
            const dragHandler = isTask
                ? (canEdit ? 'handleTaskDragStart(event, ' + task.id + ')' : '')
                : (canEdit ? 'handleSubtaskDragStart(event, ' + rootTaskId + ', ' + task.id + ')' : '');
            const dragAttr = canEdit ? 'draggable="true"' : 'draggable="false"';
            const dragEvents = canEdit ? ('ondragstart="' + dragHandler + '" ondragend="handleDragEnd(event)"') : '';
            const cursor = canEdit ? 'cursor:pointer;' : 'cursor:default;';
            
            if (isTask) {
                return '<div class="' + cardClass + '" ' + dragAttr + ' ' +
                       (clickHandler ? 'onclick="' + clickHandler + '" ' : '') +
                       dragEvents + ' ' +
                       'style="' + cursor + '" ' +
                       'title="' + task.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                    '<div class="kanban-card-header">' +
                        '<div class="title">' + task.title + '</div>' +
                        '<div class="meta"><span class="priority-badge priority-' + (task.priority || 'medium') + '">' + PRIORITY_LABELS[task.priority || 'medium'] + '</span></div>' +
                        '<div class="assignees-list">' + assigneeNames.map(a => '<span class="assignee-tag">' + a + '</span>').join('') + '</div>' +
                    '</div>' +
                '</div>';
            }

            return '<div class="' + cardClass + '" ' + dragAttr + ' ' +
                   (clickHandler ? 'onclick="' + clickHandler + '" ' : '') +
                   dragEvents + ' ' +
                   'style="' + cursor + '" ' +
                   'title="' + task.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                '<div class="name">' + task.title + '</div>' +
                '<div class="meta"><span class="priority-badge priority-' + (task.priority || 'medium') + '">' + PRIORITY_LABELS[task.priority || 'medium'] + '</span></div>' +
                '<div class="assignees-list">' + assigneeNames.map(a => '<span class="assignee-tag">' + a + '</span>').join('') + '</div>' +
            '</div>';
        }
        
        function renderKanbanNested(task, subtasks) {
            const assigneeNames = calculateNodeAssignees(task).map(id => { 
                const a = assignees.find(x => x.id == id); 
                return a ? a.name : id; 
            });

            const orderIndex = new Map(subtasks.map((s, idx) => [s.task.id, idx]));
            const byId = new Map();
            subtasks.forEach(sub => {
                byId.set(sub.task.id, { ...sub, children: [] });
            });

            const roots = [];
            byId.forEach(node => {
                if (node.parentSubtaskId && byId.has(node.parentSubtaskId)) {
                    byId.get(node.parentSubtaskId).children.push(node);
                } else {
                    roots.push(node);
                }
            });

            const sortTree = (nodes) => {
                nodes.sort((a, b) => (orderIndex.get(a.task.id) ?? 0) - (orderIndex.get(b.task.id) ?? 0));
                nodes.forEach(n => sortTree(n.children));
            };
            sortTree(roots);

            const renderNode = (node, depth) => {
                const subAssignees = calculateNodeAssignees(node.task).map(id => { 
                    const a = assignees.find(x => x.id == id); 
                    return a ? a.name : id; 
                });
                const depthClass = 'depth-' + Math.min(depth + 1, 3);
                const dragAttr = canEdit ? 'draggable="true"' : 'draggable="false"';
                const dragEvents = canEdit ? ('ondragstart="handleSubtaskDragStart(event, ' + task.id + ', ' + node.task.id + ')" ondragend="handleDragEnd(event)"') : '';
                const clickHandler = canEdit ? ('onclick="openSubtaskModal(' + task.id + ',' + node.task.id + ')"') : '';
                const cursor = canEdit ? 'cursor:pointer;' : 'cursor:default;';
                const childrenHtml = node.children.length > 0
                    ? '<div class="kanban-children" style="margin-left:12px;">' + node.children.map(child => renderNode(child, depth + 1)).join('') + '</div>'
                    : '';
                return '<div class="kanban-child ' + depthClass + '" ' + dragAttr + ' ' + clickHandler + ' ' + dragEvents + ' style="' + cursor + '">' +
                        '<div class="name">' + node.task.title + '</div>' +
                        '<div class="meta"><span class="priority-badge priority-' + (node.task.priority || 'medium') + '">' + PRIORITY_LABELS[node.task.priority || 'medium'] + '</span></div>' +
                        '<div class="assignees-list">' + subAssignees.map(a => '<span class="assignee-tag">' + a + '</span>').join('') + '</div>' +
                    '</div>' + childrenHtml;
            };

            const childrenHtml = roots.map(n => renderNode(n, 0)).join('');
            const dragAttr = canEdit ? 'draggable="true"' : 'draggable="false"';
            const dragEvents = canEdit ? ('ondragstart="handleTaskDragStart(event, ' + task.id + ')" ondragend="handleDragEnd(event)"') : '';
            const clickHandler = canEdit ? ('onclick="editTask(' + task.id + ')"') : '';
            const cursor = canEdit ? 'cursor:pointer;' : 'cursor:default;';

            return '<div class="kanban-card" ' + dragAttr + ' ' + clickHandler + ' ' + dragEvents + ' style="' + cursor + '" ' +
                   'title="' + task.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                '<div class="kanban-card-header">' +
                    '<div class="title">' + task.title + '</div>' +
                    '<div class="meta"><span class="priority-badge priority-' + (task.priority || 'medium') + '">' + PRIORITY_LABELS[task.priority || 'medium'] + '</span></div>' +
                    '<div class="assignees-list">' + assigneeNames.map(a => '<span class="assignee-tag">' + a + '</span>').join('') + '</div>' +
                '</div>' +
                '<div class="kanban-children">' + childrenHtml + '</div>' +
            '</div>';
        }

        function toggleTask(id) {
            if (expandedTasks.has(id)) expandedTasks.delete(id);
            else expandedTasks.add(id);
            renderTasks();
        }

        function toggleSubtask(subtaskId) {
            if (expandedSubtasks.has(subtaskId)) expandedSubtasks.delete(subtaskId);
            else expandedSubtasks.add(subtaskId);
            renderTasks();
        }

        function setView(view) {
            document.getElementById('taskList').classList.toggle('hidden', view !== 'list');
            document.getElementById('kanbanBoard').classList.toggle('active', view === 'kanban');
            document.querySelectorAll('.view-toggle .btn-secondary').forEach((b, i) => {
                b.classList.toggle('active', (view === 'list') === (i === 0));
            });
        }

        function openAddModal() {
            if (!canEdit) return;
            document.getElementById('modalTitle').textContent = 'Задача';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskStatus').value = 'queue';
            renderAssigneesSelect('taskAssigneesSelect', []);
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            document.getElementById('modalTitle').textContent = 'Редактировать';
            document.getElementById('taskId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskPriority').value = task.priority || 'medium';
            document.getElementById('taskStatus').value = task.status;
            renderAssigneesSelect('taskAssigneesSelect', task.assignees);
            document.getElementById('taskModal').classList.add('active');
        }

        function openSubtaskModal(taskId, subtaskId = null, parentId = null) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('subtaskTaskId').value = taskId;
            document.getElementById('subtaskParentId').value = parentId || '';
            document.getElementById('subtaskId').value = subtaskId || '';

            const findInTree = (nodes, id) => {
                for (const n of nodes) {
                    if (n.id === id) return n;
                    if (n.children) {
                        const found = findInTree(n.children, id);
                        if (found) return found;
                    }
                }
                return null;
            };

            let subtask = null;
            if (subtaskId) {
                subtask = findInTree(task.subtasks, subtaskId);
                document.getElementById('subtaskModalTitle').textContent = 'Редактировать подзадачу';
            } else if (parentId) {
                document.getElementById('subtaskModalTitle').textContent = 'Дочерняя подзадача';
            } else {
                document.getElementById('subtaskModalTitle').textContent = 'Подзадача';
            }

            document.getElementById('subtaskTitle').value = subtask ? subtask.title : '';
            document.getElementById('subtaskPriority').value = subtask ? (subtask.priority || 'medium') : (task.priority || 'medium');
            document.getElementById('subtaskStatus').value = subtask ? (subtask.status || 'queue') : 'queue';
            
            const parentNode = parentId ? findInTree(task.subtasks, parentId) : null;
            const selectedAssignees = subtask
                ? (subtask.assignees || [])
                : (parentNode ? (parentNode.assignees || []) : task.assignees);
            renderAssigneesSelect('subtaskAssigneesSelect', selectedAssignees);

            document.getElementById('subtaskModal').classList.add('active');
        }

        function closeSubtaskModal() {
            document.getElementById('subtaskModal').classList.remove('active');
        }

        function openAuthModal() { document.getElementById('authModal').classList.add('active'); showAuthTab('login'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }
        function showAuthTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('.auth-tabs button').forEach((b, i) => b.classList.toggle('active', (tab === 'login') === (i === 0)));
        }

        function openAssigneesPanel() {
            renderAssigneesList();
            document.getElementById('assigneesPanel').classList.add('active');
        }
        function closeAssigneesPanel() { document.getElementById('assigneesPanel').classList.remove('active'); }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
            catch (err) { showToast(err.message, 'error'); }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await register(document.getElementById('registerEmail').value, document.getElementById('registerPassword').value); }
            catch (err) { showToast(err.message, 'error'); }
        });

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('taskId').value;
            const task = tasks.find(t => t.id == id);
            await saveTask({
                id: id ? parseInt(id) : null,
                title: document.getElementById('taskTitle').value,
                priority: document.getElementById('taskPriority').value,
                status: document.getElementById('taskStatus').value,
                assignees: getSelectedAssignees('taskAssigneesSelect'),
                subtasks: task ? task.subtasks : []
            });
            closeModal();
        });

        document.getElementById('subtaskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskId = parseInt(document.getElementById('subtaskTaskId').value);
            const subtaskId = document.getElementById('subtaskId').value;
            const parentId = document.getElementById('subtaskParentId').value;
            await saveSubtask(taskId, {
                id: subtaskId ? parseInt(subtaskId) : null,
                parentId: parentId ? parseInt(parentId) : null,
                title: document.getElementById('subtaskTitle').value,
                priority: document.getElementById('subtaskPriority').value,
                status: document.getElementById('subtaskStatus').value,
                assignees: getSelectedAssignees('subtaskAssigneesSelect')
            });
            closeSubtaskModal();
        });

        // Drag'n'drop
        function handleTaskDragStart(e, taskId) { 
            if (!canEdit) return; 
            draggedItem = { type: 'task', taskId }; 
            e.currentTarget.classList.add('dragging'); 
        }
        
        function handleSubtaskDragStart(e, taskId, subtaskId) { 
            if (!canEdit) return; 
            e.stopPropagation();
            draggedItem = { type: 'subtask', taskId, subtaskId }; 
            e.currentTarget.classList.add('dragging'); 
        }
        
        function handleDragEnd(e) { 
            if (e.currentTarget) e.currentTarget.classList.remove('dragging'); 
            draggedItem = null;
            document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over')); 
        }
        
        function handleDragOver(e) { if (!canEdit) return; e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        
        async function handleDrop(e, status) { 
            if (!canEdit) return; 
            e.preventDefault(); 
            e.currentTarget.classList.remove('drag-over'); 
            
            if (draggedItem) {
                if (draggedItem.type === 'task') {
                    await updateTaskStatus(draggedItem.taskId, status);
                } else if (draggedItem.type === 'subtask') {
                    await updateSubtaskStatus(draggedItem.taskId, draggedItem.subtaskId, status);
                }
                draggedItem = null;
            }
        }

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
