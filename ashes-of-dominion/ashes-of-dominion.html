<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Ashes of Dominion - Задачи</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 20px;
        }
        header h1 { color: #e94560; font-size: 2em; text-transform: uppercase; }
        .header-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 12px;
            background: #0f3460;
            border-radius: 15px;
            font-size: 0.85em;
        }
        .user-badge { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; }
        .user-badge.readonly { background: #ff9800; }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-primary { background: #e94560; color: white; }
        .btn-primary:hover { background: #ff6b6b; }
        .btn-primary:disabled { background: #666; cursor: not-allowed; }
        .btn-secondary { background: #0f3460; color: white; }
        .btn-secondary:hover { background: #1a4a7a; }
        .btn-secondary.active { background: #e94560; }
        .btn-small { padding: 6px 12px; font-size: 12px; }
        .btn-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            background: #1a4a7a;
            color: #eee;
            font-size: 14px;
            padding: 0;
        }
        .btn-icon:hover { background: #e94560; }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .left-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .view-toggle { display: flex; gap: 8px; }
        .filters {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .filters select {
            padding: 6px 10px;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
            background: #16213e;
            color: #eee;
            font-size: 13px;
        }
        .task-list { background: #0f3460; border-radius: 8px; overflow: hidden; }
        .task-row {
            display: grid;
            grid-template-columns: 35px 1fr 90px 100px 180px 140px;
            align-items: center;
            padding: 12px 15px 12px 10px;
            border-bottom: 1px solid #1a4a7a;
            gap: 10px;
        }
        .task-row:hover { background: #1a4a7a; }
        .task-row.header {
            background: #1a4a7a;
            font-weight: bold;
            font-size: 0.9em;
        }
        .task-row-inline {
            display: grid;
            grid-template-columns: 35px 1fr 90px 100px 180px 140px;
            align-items: center;
            padding: 12px 15px 12px 10px;
            gap: 10px;
        }
        .expand-btn {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a4a7a;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }
        .expand-btn:hover { background: #e94560; }
        .task-title { 
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .status-queue { background: #4a4a6a; }
        .status-progress { background: #2196f3; }
        .status-review { background: #ff9800; color: #000; }
        .status-done { background: #4caf50; }
        .priority-badge {
            padding: 5px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
        }
        .priority-low { background: #4caf50; color: #000; }
        .priority-medium { background: #2196f3; }
        .priority-high { background: #ff9800; color: #000; }
        .priority-critical { background: #f44336; }
        .assignees-list { display: flex; gap: 5px; flex-wrap: wrap; overflow: hidden; }
        .assignee-tag { 
            background: #e94560; 
            padding: 3px 8px; 
            border-radius: 10px; 
            font-size: 0.75em;
            white-space: nowrap;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .task-actions { display: flex; gap: 5px; justify-content: flex-end; }
        .subtask-row {
            display: grid;
            grid-template-columns: 35px 25px 1fr 90px 100px 180px 140px;
            align-items: center;
            padding: 8px 15px;
            background: #0a2540;
            border-bottom: 1px solid #1a4a7a;
            gap: 10px;
        }
        .subtask-row:last-child { border-bottom: none; }
        .subtask-children {
            border-bottom: 1px solid #1a4a7a;
        }
        .subtask-children:last-child { border-bottom: none; }
        .kanban-board {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .kanban-board.active { display: grid; }
        .kanban-column {
            background: #0f3460;
            border-radius: 8px;
            padding: 12px;
            min-height: 400px;
        }
        .kanban-column.drag-over { background: #1a4a7a; border: 2px dashed #e94560; }
        .kanban-column h3 {
            text-align: center;
            padding: 10px;
            border-bottom: 2px solid #e94560;
            margin-bottom: 12px;
            font-size: 0.9em;
        }
        .kanban-card {
            background: #16213e;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
            cursor: grab;
        }
        .kanban-card.dragging { opacity: 0.5; }
        .kanban-card-header {
            padding: 10px 12px;
            background: #1a4a7a;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .kanban-card-header .title { 
            font-weight: 500; 
            font-size: 0.9em; 
            flex: 1;
            min-width: 100px;
        }
        .kanban-card-header .meta { display: flex; gap: 5px; flex-shrink: 0; }
        .kanban-card-header .assignees { 
            display: flex; 
            gap: 4px; 
            flex-shrink: 0; 
            flex-wrap: wrap; 
        }
        .kanban-children { 
            padding: 8px 12px; 
            background: #0f3460;
        }
        .kanban-child {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            margin-bottom: 6px;
            background: #16213e;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: grab;
        }
        .kanban-child:last-child { margin-bottom: 0; }
        .kanban-child.dragging { opacity: 0.5; }
        .kanban-child .name { 
            flex: 1; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap;
            min-width: 0;
        }
        .kanban-child .meta { display: flex; gap: 5px; flex-shrink: 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #16213e;
            padding: 25px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content h2 { color: #e94560; margin-bottom: 20px; font-size: 1.3em; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9em; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
            background: #0f3460;
            color: #eee;
            font-size: 13px;
        }
        .assignees-select {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 8px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 5px;
            max-height: 150px;
            overflow-y: auto;
        }
        .assignee-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 8px;
            background: #1a4a7a;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
            white-space: nowrap;
        }
        .assignee-checkbox:hover { background: #2a5a8a; }
        .assignee-checkbox.checked { background: #e94560; }
        .assignee-checkbox input { width: auto; }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        .hidden { display: none; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .auth-tabs button { flex: 1; }
        .assignees-panel {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .assignees-panel h3 { margin-bottom: 10px; font-size: 1em; color: #e94560; }
        .add-assignee-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .add-assignee-row input { flex: 1; }
        .assignee-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            background: #16213e;
            margin: 4px 0;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 20px;
            background: #0f3460;
            border-left: 4px solid #e94560;
            border-radius: 5px;
            z-index: 2000;
        }
        .toast.success { border-color: #4caf50; }
        .toast.error { border-color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏰 Ashes of Dominion</h1>
            <div class="header-controls">
                <div id="userContainer" class="user-info" style="display: none;">
                    <div class="user-badge" id="userBadge"></div>
                    <span id="userEmail"></span>
                    <button class="btn-small btn-secondary" onclick="logout()">Выйти</button>
                </div>
                <button id="loginBtn" class="btn-small btn-secondary" onclick="openAuthModal()">🔐 Вход</button>
                <button class="btn-small btn-secondary" onclick="openAssigneesPanel()">👥 Исполнители</button>
            </div>
        </header>

        <div class="controls">
            <div class="left-controls">
                <div class="view-toggle">
                    <button class="btn-secondary active" onclick="setView('list')">📋 Список</button>
                    <button class="btn-secondary" onclick="setView('kanban')">📊 Канбан</button>
                </div>
                <button class="btn-primary" onclick="openAddModal()" id="addTaskBtn" disabled>+ Задача</button>
            </div>
        </div>

        <div class="filters">
            <label>Исполнитель:
                <select id="filterAssignee" onchange="applyFilters()">
                    <option value="">Все</option>
                </select>
            </label>
            <label>Приоритет:
                <select id="filterPriority" onchange="applyFilters()">
                    <option value="">Все</option>
                    <option value="low">Низкий</option>
                    <option value="medium">Средний</option>
                    <option value="high">Высокий</option>
                    <option value="critical">Критичный</option>
                </select>
            </label>
            <label>Статус:
                <select id="filterStatus" onchange="applyFilters()">
                    <option value="">Все</option>
                    <option value="queue">В очереди</option>
                    <option value="progress">В работе</option>
                    <option value="review">На проверке</option>
                    <option value="done">Готово</option>
                </select>
            </label>
        </div>

        <div id="taskList" class="task-list">
            <div class="task-row header">
                <span></span>
                <span></span>
                <span>Задача</span>
                <span>Приоритет</span>
                <span>Статус</span>
                <span>Исполнители</span>
                <span>Действия</span>
            </div>
            <div id="tasksContainer"></div>
        </div>

        <div id="kanbanBoard" class="kanban-board">
            <div class="kanban-column" data-status="queue" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'queue')">
                <h3>📝 В очереди</h3>
                <div id="queueTasks"></div>
            </div>
            <div class="kanban-column" data-status="progress" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'progress')">
                <h3>🔄 В работе</h3>
                <div id="progressTasks"></div>
            </div>
            <div class="kanban-column" data-status="review" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'review')">
                <h3>👀 На проверке</h3>
                <div id="reviewTasks"></div>
            </div>
            <div class="kanban-column" data-status="done" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 'done')">
                <h3>✅ Готово</h3>
                <div id="doneTasks"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно задачи -->
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Задача</h2>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="taskPriority">
                        <option value="low">Низкий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="high">Высокий</option>
                        <option value="critical">Критичный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="taskStatus">
                        <option value="queue">В очереди</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнители</label>
                    <div id="taskAssigneesSelect" class="assignees-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно подзадачи -->
    <div id="subtaskModal" class="modal">
        <div class="modal-content">
            <h2 id="subtaskModalTitle">Подзадача</h2>
            <form id="subtaskForm">
                <input type="hidden" id="subtaskTaskId">
                <input type="hidden" id="subtaskParentId">
                <input type="hidden" id="subtaskId">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="subtaskTitle" required>
                </div>
                <div class="form-group">
                    <label>Приоритет</label>
                    <select id="subtaskPriority">
                        <option value="low">Низкий</option>
                        <option value="medium" selected>Средний</option>
                        <option value="high">Высокий</option>
                        <option value="critical">Критичный</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Статус</label>
                    <select id="subtaskStatus">
                        <option value="queue">В очереди</option>
                        <option value="progress">В работе</option>
                        <option value="review">На проверке</option>
                        <option value="done">Готово</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Исполнители</label>
                    <div id="subtaskAssigneesSelect" class="assignees-select"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeSubtaskModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно авторизации -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Вход</h2>
            <div class="auth-tabs">
                <button class="btn-secondary active" onclick="showAuthTab('login')">Вход</button>
                <button class="btn-secondary" onclick="showAuthTab('register')">Регистрация</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Войти</button>
                </div>
            </form>
            <form id="registerForm" class="hidden">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeAuthModal()">Отмена</button>
                    <button type="submit" class="btn-primary">Зарегистрироваться</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Панель исполнителей -->
    <div id="assigneesPanel" class="modal">
        <div class="modal-content">
            <h2>👥 Исполнители</h2>
            <div class="add-assignee-row">
                <input type="text" id="newAssigneeName" placeholder="Имя исполнителя">
                <button class="btn-primary" onclick="addAssignee()">Добавить</button>
            </div>
            <div id="assigneesList"></div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeAssigneesPanel()">Закрыть</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.0"></script>
    <script>
        const SUPABASE_URL = 'https://nrrqiedzcwmgzqkmaret.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1edDcYXXILaZ27t7oMEWMA_KIt2Ivck';
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let tasks = [], assignees = [], currentUser = null, canEdit = false;
        let expandedTasks = new Set();
        let expandedSubtasks = new Set();
        let draggedItem = null; // { type: 'task'|'subtask', taskId, subtaskId }
        let filterAssignee = '', filterPriority = '', filterStatus = '';

        // Порядок статусов: 0=самый ранний, 3=самый поздний
        const STATUS_ORDER = { queue: 0, progress: 1, review: 2, done: 3 };
        const STATUS_LABELS = { queue: 'В очереди', progress: 'В работе', review: 'На проверке', done: 'Готово' };
        const PRIORITY_LABELS = { low: 'Низкий', medium: 'Средний', high: 'Высокий', critical: 'Критичный' };

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadAssignees();
            await loadTasks();
        });

        async function checkAuth() {
            const { data: { session } } = await sbClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                const { data } = await sbClient.from('allowed_users').select('user_id').eq('user_id', currentUser.id).single();
                canEdit = !!data;
                updateUserUI();
                updateEditControls();
            }
        }

        function updateUserUI() {
            document.getElementById('userContainer').style.display = currentUser ? 'flex' : 'none';
            document.getElementById('loginBtn').style.display = currentUser ? 'none' : 'block';
            document.getElementById('userEmail').textContent = currentUser?.email;
            document.getElementById('userBadge').className = canEdit ? 'user-badge' : 'user-badge readonly';
        }

        function updateEditControls() {
            document.getElementById('addTaskBtn').disabled = !canEdit;
        }

        async function login(email, password) {
            const { data, error } = await sbClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            currentUser = data.user;
            const { data: perm } = await sbClient.from('allowed_users').select('user_id').eq('user_id', currentUser.id).single();
            canEdit = !!perm;
            updateUserUI();
            updateEditControls();
            showToast('Вход выполнен', 'success');
            closeAuthModal();
        }

        async function register(email, password) {
            const { error } = await sbClient.auth.signUp({ email, password });
            if (error) throw error;
            showToast('Проверьте email для подтверждения', 'success');
            closeAuthModal();
        }

        async function logout() {
            await sbClient.auth.signOut();
            currentUser = null;
            canEdit = false;
            updateUserUI();
            updateEditControls();
            showToast('Выход выполнен', 'success');
        }

        async function loadAssignees() {
            const { data } = await sbClient.from('assignees').select('*').order('name');
            assignees = data || [];
            renderAssigneesSelect();
            updateFilterAssignees();
        }

        function updateFilterAssignees() {
            const select = document.getElementById('filterAssignee');
            select.innerHTML = '<option value="">Все</option>' + assignees.map(a => 
                `<option value="${a.id}">${a.name}</option>`
            ).join('');
        }

        function renderAssigneesSelect(containerId = 'taskAssigneesSelect', selectedIds = []) {
            const container = document.getElementById(containerId);
            container.innerHTML = assignees.map(a => {
                const checked = selectedIds.includes(String(a.id)) ? 'checked' : '';
                const checkedClass = checked ? 'checked' : '';
                return `<label class="assignee-checkbox ${checkedClass}" onclick="this.classList.toggle('checked')">
                    <input type="checkbox" value="${a.id}" ${checked}>${a.name}
                </label>`;
            }).join('');
        }

        function getSelectedAssignees(containerId) {
            return Array.from(document.querySelectorAll(`#${containerId} input:checked`)).map(cb => cb.value);
        }

        function renderAssigneesList() {

                </div>

        async function addAssignee() {

            const name = input.value.trim();
            if (!name || !canEdit) return;
            await sbClient.from('assignees').insert([{ name }]);

        async function deleteAssignee(id) {
            if (!canEdit || !confirm('Удалить?')) return;

            await loadAssignees();
            renderAssigneesList();
            showToast('Удалён', 'success');
        }

        async function loadTasks() {
            const { data } = await sbClient.from('tasks').select('*').order('created_at', { ascending: false });
            tasks = (data || []).map(t => ({
                ...t,
                assignees: t.assignees ? t.assignees.split(',').filter(a => a) : [],
                subtasks: typeof t.subtasks === 'string' ? JSON.parse(t.subtasks || '[]') : (t.subtasks || [])
            }));
            // Обновляем статусы задач на основе подзадач
            // Assignees обновляем только если есть подзадачи (иначе сохраняем ручные)
            tasks.forEach(task => {
                task.status = calculateTaskStatus(task.subtasks);
                if (task.subtasks && task.subtasks.length > 0) {
                    task.assignees = calculateTaskAssignees(task.subtasks);
                }
            });
            renderTasks();
        }
        
        // Собирает всех исполнителей из подзадач рекурсивно
        function calculateTaskAssignees(subtasks) {
            const allAssignees = new Set();
            const collectAssignees = (nodes) => {
                for (const n of nodes) {
                    if (n.assignees) {
                        n.assignees.forEach(a => allAssignees.add(String(a)));
                    }
                    if (n.children) collectAssignees(n.children);
                }
            };
            collectAssignees(subtasks || []);
            return Array.from(allAssignees);
        }

        // Вычисляет статус задачи как МИНИМАЛЬНЫЙ среди всех подзадач
        // Если подзадач нет — 'queue'
        function calculateTaskStatus(subtasks) {
            if (!subtasks || subtasks.length === 0) return 'queue';
            
            const getAllSubtasks = (nodes) => {
                let result = [];
                for (const n of nodes) {
                    result.push(n);
                    if (n.children) result = result.concat(getAllSubtasks(n.children));
                }
                return result;
            };
            
            const allSubtasks = getAllSubtasks(subtasks);
            if (allSubtasks.length === 0) return 'queue';
            
            // Находим минимальный статус
            let minStatus = 'done';
            let minOrder = STATUS_ORDER.done;
            
            for (const sub of allSubtasks) {
                const order = STATUS_ORDER[sub.status] || 0;
                if (order < minOrder) {
                    minOrder = order;
                    minStatus = sub.status;
                }
            }
            
            return minStatus;
        }

        async function saveTask(taskData) {
            if (!canEdit) { showToast('Только для редакторов', 'error'); return false; }
            
            const task = tasks.find(t => t.id === taskData.id);
            let newSubtasks = taskData.subtasks;
            
            // Если меняем статус задачи на более поздний — поднимаем подзадачи того же статуса
            if (task && taskData.status !== task.status) {
                const oldOrder = STATUS_ORDER[task.status];
                const newOrder = STATUS_ORDER[taskData.status];
                
                if (newOrder > oldOrder) {
                    // Двигаем вперёд — поднимаем подзадачи с тем же статусом
                    newSubtasks = elevateSameStatusSubtasks(taskData.subtasks, task.status, taskData.status);
                }
            }
            
            // Если есть подзадачи — пересчитываем исполнителей из них, иначе сохраняем ручные
            let newAssignees;
            if (newSubtasks && newSubtasks.length > 0) {
                newAssignees = calculateTaskAssignees(newSubtasks);
            } else {
                newAssignees = taskData.assignees || [];
            }
            
            if (taskData.id) {
                await sbClient.from('tasks').update({
                    title: taskData.title,
                    priority: taskData.priority,
                    status: taskData.status,
                    assignees: newAssignees.join(','),
                    subtasks: JSON.stringify(newSubtasks)
                }).eq('id', taskData.id);
            } else {
                await sbClient.from('tasks').insert([{
                    title: taskData.title,
                    priority: taskData.priority,
                    status: taskData.status,
                    assignees: newAssignees.join(','),
                    subtasks: JSON.stringify(newSubtasks)
                }]);
            }
            await loadTasks();
            showToast('Сохранено', 'success');
            return true;
        }
        
        // Поднимает только подзадачи с указанным статусом на новый статус
        function elevateSameStatusSubtasks(subtasks, oldStatus, newStatus) {
            const elevate = (nodes) => nodes.map(n => {
                const newChildren = n.children ? elevate(n.children) : [];
                // Поднимаем только если текущий статус совпадает с oldStatus
                if (n.status === oldStatus) {
                    return { ...n, status: newStatus, children: newChildren };
                }
                return { ...n, children: newChildren };
            });
            return elevate(subtasks);
        }

        async function deleteTask(id) {
            if (!canEdit || !confirm('Удалить?')) return;
            await sbClient.from('tasks').delete().eq('id', id);
            await loadTasks();
            showToast('Удалено', 'success');
        }

        async function updateTaskStatus(taskId, newStatus) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const oldOrder = STATUS_ORDER[task.status];
            const newOrder = STATUS_ORDER[newStatus];
            
            let newSubtasks = task.subtasks;
            
            // Если двигаем вперёд — поднимаем подзадачи того же статуса
            if (newOrder > oldOrder) {
                newSubtasks = elevateSameStatusSubtasks(task.subtasks, task.status, newStatus);
            }
            
            const newAssignees = calculateTaskAssignees(newSubtasks);
            
            task.status = newStatus;
            task.subtasks = newSubtasks;
            
            await sbClient.from('tasks').update({
                status: newStatus,
                subtasks: JSON.stringify(newSubtasks),
                assignees: newAssignees.join(',')
            }).eq('id', taskId);
            await loadTasks();
        }

        async function updateSubtaskStatus(taskId, subtaskId, newStatus) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            const updateInTree = (nodes) => nodes.map(n => {
                if (n.id === subtaskId) {
                    return { ...n, status: newStatus };
                }
                if (n.children) {
                    return { ...n, children: updateInTree(n.children) };
                }
                return n;
            });
            
            task.subtasks = updateInTree(task.subtasks);
            task.status = calculateTaskStatus(task.subtasks);
            
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks)
            }).eq('id', taskId);
            await loadTasks();
        }

        async function saveSubtask(taskId, subtaskData) {
            if (!canEdit) { showToast('Только для редакторов', 'error'); return false; }
            const task = tasks.find(t => t.id === taskId);
            if (!task) return false;

            if (subtaskData.id) {
                const updateInTree = (nodes) => nodes.map(n => {
                    if (n.id === subtaskData.id) {
                        return { ...n, title: subtaskData.title, priority: subtaskData.priority, status: subtaskData.status, assignees: subtaskData.assignees };
                    }
                    if (n.children) return { ...n, children: updateInTree(n.children) };
                    return n;
                });
                task.subtasks = updateInTree(task.subtasks);
            } else {
                const newSubtask = {
                    id: Date.now(),
                    title: subtaskData.title,
                    priority: subtaskData.priority,
                    status: subtaskData.status,
                    assignees: subtaskData.assignees,
                    children: []
                };
                if (subtaskData.parentId) {
                    const addToParent = (nodes) => nodes.map(n => {
                        if (n.id === subtaskData.parentId) return { ...n, children: [...(n.children || []), newSubtask] };
                        if (n.children) return { ...n, children: addToParent(n.children) };
                        return n;
                    });
                    task.subtasks = addToParent(task.subtasks);
                } else {
                    task.subtasks.push(newSubtask);
                }
            }
            
            task.status = calculateTaskStatus(task.subtasks);
            
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks)
            }).eq('id', taskId);
            await loadTasks();
            showToast('Подзадача сохранена', 'success');
            return true;
        }

        async function deleteSubtask(taskId, subtaskId) {
            if (!canEdit || !confirm('Удалить?')) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            const deleteFromTree = (nodes) => nodes.filter(n => n.id !== subtaskId).map(n => ({
                ...n, children: n.children ? deleteFromTree(n.children) : []
            }));
            task.subtasks = deleteFromTree(task.subtasks);
            task.status = calculateTaskStatus(task.subtasks);
            await sbClient.from('tasks').update({
                status: task.status,
                subtasks: JSON.stringify(task.subtasks)
            }).eq('id', taskId);
            await loadTasks();
            showToast('Удалено', 'success');
        }

        function applyFilters() {
            filterAssignee = document.getElementById('filterAssignee').value;
            filterPriority = document.getElementById('filterPriority').value;
            filterStatus = document.getElementById('filterStatus').value;
            renderTasks();
        }

        function matchesFilters(task) {
            if (filterAssignee && !task.assignees.includes(filterAssignee)) return false;
            if (filterPriority && task.priority !== filterPriority) return false;
            if (filterStatus && task.status !== filterStatus) return false;
            return true;
        }

        function renderTasks() {
            const container = document.getElementById('tasksContainer');
            const filteredTasks = tasks.filter(matchesFilters);
            container.innerHTML = filteredTasks.map(task => renderTaskRow(task)).join('');
            renderKanban();
        }

        function renderTaskRow(task) {
            const assigneeNames = calculateNodeAssignees(task).map(id => { 
                const a = assignees.find(x => x.id == id); 
                return a ? a.name : id; 
            });
            const isExpanded = expandedTasks.has(task.id);
            const hasSubtasks = task.subtasks && task.subtasks.length > 0;
            
            return `
                <div class="task-row" id="task-${task.id}">
                    <div class="expand-btn" onclick="toggleTask(${task.id})">${hasSubtasks ? (isExpanded ? '▼' : '▶') : ''}</div>
                    <div class="task-title">${task.title}</div>
                    <div><span class="priority-badge priority-${task.priority || 'medium'}">${PRIORITY_LABELS[task.priority || 'medium']}</span></div>
                    <div><span class="status-badge status-${task.status}">${STATUS_LABELS[task.status]}</span></div>
                    <div class="assignees-list">${assigneeNames.map(a => `<span class="assignee-tag">${a}</span>`).join('')}</div>
                    <div class="task-actions">
                        ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${task.id}, null, null)" title="Добавить подзадачу">➕</button>` : ''}
                        ${canEdit ? `<button class="btn-icon" onclick="editTask(${task.id})" title="Редактировать">📝</button>` : ''}
                        ${canEdit ? `<button class="btn-icon" onclick="deleteTask(${task.id})" title="Удалить">🗑️</button>` : ''}
                    </div>
                </div>
                <div class="task-subtasks" id="subtasks-${task.id}" style="display:${isExpanded ? 'block' : 'none'}">
                    ${renderSubtaskTree(task.subtasks, task.id, 0)}
                </div>
            `;
        }

        function renderSubtaskTree(subtasks, taskId, level) {
            if (!subtasks || subtasks.length === 0) return '';
            return subtasks.map((sub, idx) => {
                const hasChildren = sub.children && sub.children.length > 0;
                const subAssignees = calculateNodeAssignees(sub).map(id => { 
                    const a = assignees.find(x => x.id == id); 
                    return a ? a.name : id; 
                });
                const isExpanded = expandedSubtasks.has(sub.id);
                const isLast = idx === subtasks.length - 1;
                const levelClass = 'subtask-level-' + Math.min(level, 3);
                const treeLine = level > 0 ? '<span class="tree-connector"></span>' : '';
                
                return `
                    <div class="subtask-children ${levelClass}">
                        ${renderTreeIndent(level, isLast)}
                        <div class="subtask-row-inline">
                            <div class="expand-btn" onclick="toggleSubtask(${sub.id})">${hasChildren ? (isExpanded ? '▼' : '▶') : ''}</div>
                            <div class="task-title">${sub.title}</div>
                            <div><span class="priority-badge priority-${sub.priority || 'medium'}">${PRIORITY_LABELS[sub.priority || 'medium']}</span></div>
                            <div><span class="status-badge status-${sub.status}">${STATUS_LABELS[sub.status]}</span></div>
                            <div class="assignees-list">${subAssignees.map(a => `<span class="assignee-tag">${a}</span>`).join('')}</div>
                            <div class="task-actions">
                                ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${taskId}, null, ${sub.id})" title="Добавить дочернюю">➕</button>` : ''}
                                ${canEdit ? `<button class="btn-icon" onclick="openSubtaskModal(${taskId}, ${sub.id})" title="Редактировать">📝</button>` : ''}
                                ${canEdit ? `<button class="btn-icon" onclick="deleteSubtask(${taskId}, ${sub.id})" title="Удалить">🗑️</button>` : ''}
                            </div>
                        </div>
                        ${isExpanded && hasChildren ? renderSubtaskTree(sub.children, taskId, level + 1) : ''}
                    </div>
                `;
            }).join('');
        }
        
        function renderTreeIndent(level, isLast) {
            let html = '';
            for (let i = 0; i < level; i++) {
                html += '<span class="tree-level"></span>';
            }
            html += '<span class="tree-node' + (isLast ? ' tree-node-last' : '') + '"></span>';
            return html;
        }

        function renderKanban() {
            const columns = { queue: [], progress: [], review: [], done: [] };
            
            tasks.filter(matchesFilters).forEach(task => {
                // Задача попадает в свою колонку
                columns[task.status].push({
                    type: 'task',
                    task: task
                });
                
                // Подзадачи попадают в свои колонки
                const collectSubtasks = (subtasks, parentTaskId) => {
                    subtasks.forEach(sub => {
                        columns[sub.status].push({
                            type: 'subtask',
                            task: sub,
                            parentTaskId: parentTaskId
                        });
                        if (sub.children) {
                            collectSubtasks(sub.children, parentTaskId);
                        }
                    });
                };
                collectSubtasks(task.subtasks, task.id);
            });
            
            Object.keys(columns).forEach(status => {
                const container = document.getElementById(status + 'Tasks');
                container.innerHTML = renderKanbanColumn(columns[status]);
            });
        }
        
        function renderKanbanColumn(items) {
            // Группируем: задачи и их подзадачи того же статуса
            const result = [];
            let i = 0;
            
            while (i < items.length) {
                const item = items[i];
                
                if (item.type === 'task') {
                    // Собираем подзадачи этого же статуса
                    const nestedSubtasks = [];
                    let j = i + 1;
                    while (j < items.length && items[j].type === 'subtask' && 
                           items[j].task.status === item.task.status) {
                        nestedSubtasks.push(items[j]);
                        j++;
                    }
                    
                    if (nestedSubtasks.length > 0) {
                        result.push({
                            type: 'nested',
                            task: item.task,
                            subtasks: nestedSubtasks
                        });
                    } else {
                        result.push({ type: 'task', task: item.task });
                    }
                    i = j;
                } else {
                    // Отдельная подзадача (другой статус)
                    result.push({ type: 'subtask', task: item.task, parentTaskId: item.parentTaskId });
                    i++;
                }
            }
            
            return result.map(function(item) {
                if (item.type === 'nested') {
                    return renderKanbanNested(item.task, item.subtasks);
                } else if (item.type === 'task') {
                    return renderKanbanCard(item.task, null);
                } else {
                    return renderKanbanCard(item.task, item.parentTaskId);
                }
            }).join('') || '<div class="kanban-empty">Пусто</div>';
        }
        
        function renderKanbanCard(task, parentTaskId) {
            const allAssignees = calculateNodeAssignees(task);
            const assigneeNames = allAssignees.map(function(id) { 
                const a = assignees.find(function(x) { return x.id == id; }); 
                return a ? a.name : id; 
            });
            
            const isTask = !parentTaskId;
            const cardClass = isTask ? 'kanban-card' : 'kanban-child';
            const clickHandler = isTask ? 'editTask(' + task.id + ')' : 'openSubtaskModal(' + parentTaskId + ',' + task.id + ')';
            const dragHandler = isTask ? 'handleTaskDragStart(event, ' + task.id + ')' : 'handleSubtaskDragStart(event, ' + parentTaskId + ', ' + task.id + ')';
            
            return '<div class="' + cardClass + '" draggable="' + (canEdit ? 'true' : 'false') + '" ' +
                   'onclick="' + clickHandler + '" ' +
                   'ondragstart="' + dragHandler + '" ' +
                   'ondragend="handleDragEnd(event)" ' +
                   'style="' + (canEdit ? 'cursor:pointer;' : '') + '" ' +
                   'title="' + task.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                '<div class="kanban-card-header">' +
                    '<div class="title" title="' + task.title + '">' + task.title + '</div>' +
                    '<div class="meta"><span class="priority-badge priority-' + (task.priority || 'medium') + '">' + PRIORITY_LABELS[task.priority || 'medium'] + '</span></div>' +
                    '<div class="assignees-list">' + assigneeNames.map(function(a) { return '<span class="assignee-tag">' + a + '</span>'; }).join('') + '</div>' +
                '</div>' +
            '</div>';
        }
        
        function renderKanbanNested(task, subtasks) {
            const allAssignees = calculateNodeAssignees(task);
            const assigneeNames = allAssignees.map(function(id) { 
                const a = assignees.find(function(x) { return x.id == id; }); 
                return a ? a.name : id; 
            });
            
            // Рекурсивно рендерим детей
            function renderChildren(subtasks, depth) {
                return subtasks.map(function(sub) {
                    const subAllAssignees = calculateNodeAssignees(sub);
                    const subAssigneeNames = subAllAssignees.map(function(id) { 
                        const a = assignees.find(function(x) { return x.id == id; }); 
                        return a ? a.name : id; 
                    });
                    
                    const depthColors = ['rgba(233, 69, 96, 0.1)', 'rgba(233, 69, 96, 0.2)', 'rgba(233, 69, 96, 0.3)'];
                    const bgColor = depthColors[Math.min(depth, 2)];
                    
                    // Проверяем есть ли дети с тем же статусом
                    const sameStatusChildren = (sub.children || []).filter(function(c) { return c.status === sub.status; });
                    
                    let html = '<div class="kanban-child" draggable="' + (canEdit ? 'true' : 'false') + '" ' +
                               'onclick="openSubtaskModal(' + task.id + ',' + sub.id + ')" ' +
                               'ondragstart="handleSubtaskDragStart(event, ' + task.id + ', ' + sub.id + ')" ' +
                               'ondragend="handleDragEnd(event)" ' +
                               'style="background:' + bgColor + ';' + (canEdit ? 'cursor:pointer;' : '') + '" ' +
                               'title="' + sub.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                        '<div class="name" title="' + sub.title + '">' + sub.title + '</div>' +
                        '<div class="meta"><span class="priority-badge priority-' + (sub.priority || 'medium') + '">' + PRIORITY_LABELS[sub.priority || 'medium'] + '</span></div>' +
                        '<div class="assignees-list">' + subAssigneeNames.map(function(a) { return '<span class="assignee-tag">' + a + '</span>'; }).join('') + '</div>' +
                    '</div>';
                    
                    // Если есть дети того же статуса - рендерим их внутри
                    if (sameStatusChildren.length > 0) {
                        html = '<div class="kanban-child-nested" style="background:' + bgColor + ';">' +
                            '<div class="kanban-child-header" draggable="' + (canEdit ? 'true' : 'false') + '" ' +
                               'onclick="openSubtaskModal(' + task.id + ',' + sub.id + ')" ' +
                               'ondragstart="handleSubtaskDragStart(event, ' + task.id + ', ' + sub.id + ')" ' +
                               'ondragend="handleDragEnd(event)" ' +
                               'style="' + (canEdit ? 'cursor:pointer;' : '') + '">' +
                                '<div class="name" title="' + sub.title + '">' + sub.title + '</div>' +
                                '<div class="meta"><span class="priority-badge priority-' + (sub.priority || 'medium') + '">' + PRIORITY_LABELS[sub.priority || 'medium'] + '</span></div>' +
                                '<div class="assignees-list">' + subAssigneeNames.map(function(a) { return '<span class="assignee-tag">' + a + '</span>'; }).join('') + '</div>' +
                            '</div>' +
                            '<div class="kanban-children">' + renderChildren(sameStatusChildren, depth + 1) + '</div>' +
                        '</div>';
                    }
                    
                    return html;
                }).join('');
            }
            
            return '<div class="kanban-card kanban-card-nested" draggable="' + (canEdit ? 'true' : 'false') + '" ' +
                   'onclick="editTask(' + task.id + ')" ' +
                   'ondragstart="handleTaskDragStart(event, ' + task.id + ')" ' +
                   'ondragend="handleDragEnd(event)" ' +
                   'style="' + (canEdit ? 'cursor:pointer;' : '') + '" ' +
                   'title="' + task.title + (canEdit ? ' (клик для редактирования)' : '') + '">' +
                '<div class="kanban-card-header">' +
                    '<div class="title" title="' + task.title + '">' + task.title + '</div>' +
                    '<div class="meta"><span class="priority-badge priority-' + (task.priority || 'medium') + '">' + PRIORITY_LABELS[task.priority || 'medium'] + '</span></div>' +
                    '<div class="assignees-list">' + assigneeNames.map(function(a) { return '<span class="assignee-tag">' + a + '</span>'; }).join('') + '</div>' +
                '</div>' +
                '<div class="kanban-children">' + renderChildren(subtasks, 0) + '</div>' +
            '</div>';
        }

        function toggleTask(id) {
            if (expandedTasks.has(id)) {
                expandedTasks.delete(id);
            } else {
                expandedTasks.add(id);
            }
            renderTasks();
        }

        function toggleSubtask(subtaskId) {
            if (expandedSubtasks.has(subtaskId)) {
                expandedSubtasks.delete(subtaskId);
            } else {
                expandedSubtasks.add(subtaskId);
            }
            renderTasks();
        }

                b.classList.toggle('active', (view === 'list') === (i === 0));
            });
        }

        function openAddModal() {
            if (!canEdit) return;
            document.getElementById('modalTitle').textContent = 'Задача';
            document.getElementById('taskForm').reset();
            document.getElementById('taskId').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskStatus').value = 'queue';
            renderAssigneesSelect('taskAssigneesSelect', []);
            document.getElementById('taskModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            document.getElementById('modalTitle').textContent = 'Редактировать';
            document.getElementById('taskId').value = task.id;
            document.getElementById('taskTitle').value = task.title;
            document.getElementById('taskPriority').value = task.priority || 'medium';
            document.getElementById('taskStatus').value = task.status;
            renderAssigneesSelect('taskAssigneesSelect', task.assignees);
            document.getElementById('taskModal').classList.add('active');
        }

        function openSubtaskModal(taskId, subtaskId = null, parentId = null) {
            if (!canEdit) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            document.getElementById('subtaskTaskId').value = taskId;
            document.getElementById('subtaskParentId').value = parentId || '';
            document.getElementById('subtaskId').value = subtaskId || '';

            let subtask = null;
            if (subtaskId) {
                const findInTree = (nodes) => {
                    for (const n of nodes) {
                        if (n.id === subtaskId) return n;
                        if (n.children) { const found = findInTree(n.children); if (found) return found; }
                    }
                    return null;
                };
                subtask = findInTree(task.subtasks);
                document.getElementById('subtaskModalTitle').textContent = 'Редактировать подзадачу';
            } else if (parentId) {
                document.getElementById('subtaskModalTitle').textContent = 'Дочерняя подзадача';
            } else {
                document.getElementById('subtaskModalTitle').textContent = 'Подзадача';
            }

            document.getElementById('subtaskTitle').value = subtask ? subtask.title : '';
            document.getElementById('subtaskPriority').value = subtask ? (subtask.priority || 'medium') : (task.priority || 'medium');
            document.getElementById('subtaskStatus').value = subtask ? (subtask.status || 'queue') : 'queue';
            
            const selectedAssignees = subtask ? (subtask.assignees || []) : task.assignees;
            renderAssigneesSelect('subtaskAssigneesSelect', selectedAssignees);

            document.getElementById('subtaskModal').classList.add('active');
        }

        function closeSubtaskModal() {
            document.getElementById('subtaskModal').classList.remove('active');
        }

        function openAuthModal() { document.getElementById('authModal').classList.add('active'); showAuthTab('login'); }
        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); }
        function showAuthTab(tab) {
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.querySelectorAll('.auth-tabs button').forEach((b, i) => b.classList.toggle('active', (tab === 'login') === (i === 0)));
        }

        function openAssigneesPanel() {
            renderAssigneesList();
            document.getElementById('assigneesPanel').classList.add('active');
        }
        function closeAssigneesPanel() { document.getElementById('assigneesPanel').classList.remove('active'); }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); }
            catch (err) { showToast(err.message, 'error'); }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await register(document.getElementById('registerEmail').value, document.getElementById('registerPassword').value); }
            catch (err) { showToast(err.message, 'error'); }
        });

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('taskId').value;
            const task = tasks.find(t => t.id == id);
            await saveTask({
                id: id ? parseInt(id) : null,
                title: document.getElementById('taskTitle').value,
                priority: document.getElementById('taskPriority').value,
                status: document.getElementById('taskStatus').value,
                assignees: getSelectedAssignees('taskAssigneesSelect'),
                subtasks: task ? task.subtasks : []
            });
            closeModal();
        });

        document.getElementById('subtaskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const taskId = parseInt(document.getElementById('subtaskTaskId').value);
            const subtaskId = document.getElementById('subtaskId').value;
            const parentId = document.getElementById('subtaskParentId').value;
            await saveSubtask(taskId, {
                id: subtaskId ? parseInt(subtaskId) : null,
                parentId: parentId ? parseInt(parentId) : null,
                title: document.getElementById('subtaskTitle').value,
                priority: document.getElementById('subtaskPriority').value,
                status: document.getElementById('subtaskStatus').value,
                assignees: getSelectedAssignees('subtaskAssigneesSelect')
            });
            closeSubtaskModal();
        });

        // Drag'n'drop
        function handleTaskDragStart(e, taskId) { 
            if (!canEdit) return; 
            draggedItem = { type: 'task', taskId }; 
            e.currentTarget.classList.add('dragging'); 
        }
        
        function handleSubtaskDragStart(e, taskId, subtaskId) { 
            if (!canEdit) return; 
            draggedItem = { type: 'subtask', taskId, subtaskId }; 
            e.currentTarget.classList.add('dragging'); 
        }
        
        function handleDragEnd(e) { 
            if (e.currentTarget) e.currentTarget.classList.remove('dragging'); 
            draggedItem = null;
            document.querySelectorAll('.kanban-column').forEach(c => c.classList.remove('drag-over')); 
        }
        
        function handleDragOver(e) { if (!canEdit) return; e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        
        async function handleDrop(e, status) { 
            if (!canEdit) return; 
            e.preventDefault(); 
            e.currentTarget.classList.remove('drag-over'); 
            
            if (draggedItem) {
                if (draggedItem.type === 'task') {
                    await updateTaskStatus(draggedItem.taskId, status);
                } else if (draggedItem.type === 'subtask') {
                    await updateSubtaskStatus(draggedItem.taskId, draggedItem.subtaskId, status);
                }
                draggedItem = null;
            }
        }

        function showToast(msg, type = 'info') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
